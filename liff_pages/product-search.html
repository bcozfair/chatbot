<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ค้นหาแค็ตตาล็อกสินค้า — PRIMUS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --green-dark:   #157015;
      --green:        #1e8f1e;
      --green-mid:    #27a827;
      --green-light:  #e6f5e6;
      --green-pale:   #f0faf0;
      --white:        #ffffff;
      --surface:      #f5f8f5;
      --border:       #d0e8d0;
      --border-strong:#a8cfa8;
      --text:         #0d2b0d;
      --text-mid:     #3a5c3a;
      --text-muted:   #6b8f6b;
      --text-light:   #9ab89a;
      --danger:       #d42b2b;
      --danger-bg:    #ffe7e7;
      --warning:      #b85c00;
      --shadow-sm:    0 1px 4px rgba(0,60,0,0.07);
      --shadow:       0 2px 12px rgba(0,60,0,0.10);
      --shadow-lg:    0 8px 32px rgba(0,60,0,0.14);
      --radius:       12px;
      --radius-sm:    8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { font-size: 16px; }

    body {
      font-family: 'Sarabun', -apple-system, sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 84px;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HEADER ─── */
    .app-header {
      background: var(--white);
      border-bottom: 2px solid var(--green);
      padding: 10px 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .header-logo { height: 36px; width: auto; flex-shrink: 0; }
    .header-titles { flex: 1; min-width: 0; }
    .header-titles h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--green-dark);
      letter-spacing: -0.2px;
      line-height: 1.2;
    }
    .header-titles p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ─── SEARCH ─── */
    .search-wrap {
      position: relative;
      padding-bottom: 10px;
    }
    .search-wrap input {
      width: 100%;
      padding: 11px 14px 11px 42px;
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--green-pale);
      font-family: 'Sarabun', sans-serif;
      font-size: 16px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-wrap input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(30,143,30,0.12);
      background: var(--white);
    }
    .search-wrap input::placeholder { color: var(--text-light); }
    .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-60%);
      color: var(--green-mid);
      font-size: 18px;
      pointer-events: none;
    }
    .search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-60%);
      background: var(--border);
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--text-mid);
      cursor: pointer;
    }
    .search-wrap input:not(:placeholder-shown) ~ .search-clear { display: flex; }

    /* ─── CONTAINER ─── */
    .container { max-width: 520px; margin: 0 auto; padding: 12px 12px 10px; }
    .result-meta { font-size: 13px; color: var(--text-muted); padding: 0 2px 8px; }

    /* ─── PRODUCT CARDS ─── */
    .product-list { display: flex; flex-direction: column; gap: 8px; }

    .product-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 13px;
      box-shadow: var(--shadow-sm);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      transition: border-color 0.15s;
    }
    .product-card:active { transform: scale(0.995); }
    .product-card.in-cart { border-color: var(--green-mid); background: var(--green-pale); }

    .prod-left { min-width: 0; }
    .prod-top-row {
      display: flex;
      align-items: baseline;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 3px;
    }
    .prod-code {
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--green-dark);
    }
    .prod-stock-badge {
      font-size: 12px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
    }
    .prod-stock-badge.ok  { background: rgba(30,143,30,0.10); color: var(--green-dark); }
    .prod-stock-badge.low { background: rgba(184,92,0,0.10);  color: var(--warning); }
    .prod-stock-badge.out { background: var(--danger-bg);     color: var(--danger); }

    .prod-name {
      font-size: 13px;
      color: var(--text-mid);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ─── PRODUCT RIGHT ─── */
    .prod-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
      width: 112px;
      flex-shrink: 0;
    }
    .prod-price {
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--green-dark);
      white-space: nowrap;
    }
    .prod-price-unit { font-family: 'Sarabun', sans-serif; font-size: 12px; font-weight: 400; color: var(--text-muted); }

    /* ─── ADD BUTTON ─── */
    .btn-add {
      width: 100%;
      height: 33px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--green);
      color: #fff;
      font-family: 'Sarabun', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-add:active { background: var(--green-dark); }

    /* ─── QTY STEPPER ─── */
    .qty-stepper {
      display: flex;
      align-items: center;
      width: 100%;
      height: 33px;
      border: 1.5px solid var(--green-mid);
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--white);
    }
    .qty-btn {
      flex: 0 0 30px;
      height: 100%;
      background: transparent;
      border: none;
      font-size: 18px;
      font-weight: 700;
      color: var(--green-dark);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s;
    }
    .qty-btn:active { background: var(--green-light); }
    .qty-val {
      flex: 1;
      text-align: center;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--green-dark);
      border: none;
      background: transparent;
      outline: none;
      min-width: 0;
      -moz-appearance: textfield;
      appearance: textfield;
    }
    .qty-val::-webkit-inner-spin-button,
    .qty-val::-webkit-outer-spin-button { -webkit-appearance: none; }

    /* ─── EMPTY STATES ─── */
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
    .empty-state p { font-size: 15px; line-height: 1.6; }

    /* ─── LOADER ─── */
    .loader-screen {
      position: fixed; inset: 0;
      background: var(--white);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 999; transition: opacity 0.35s;
    }
    .loader-logo { height: 54px; margin-bottom: 20px; opacity: 0.9; }
    .loader-spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--green-light);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 14px; color: var(--text-muted); }

    /* ─── CART BAR ─── */
    .cart-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--white);
      border-top: 2px solid var(--green);
      padding: 10px 16px 14px;
      display: none;
      align-items: center;
      gap: 10px;
      z-index: 200;
      box-shadow: 0 -4px 20px rgba(0,60,0,0.12);
    }
    @media (min-width: 520px) {
      .cart-bar { left: 50%; transform: translateX(-50%); width: 520px; border-radius: 16px 16px 0 0; }
    }
    .cart-bar-info { flex: 1; min-width: 0; cursor: pointer; }
    .cart-bar-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .cart-bar-count { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .btn-draft {
      flex-shrink: 0;
      height: 42px;
      padding: 0 18px;
      border: none;
      border-radius: var(--radius);
      background: var(--green);
      color: #fff;
      font-family: 'Sarabun', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-draft:hover { background: var(--green-dark); }
    .btn-draft:disabled { background: var(--text-light); cursor: not-allowed; }

    /* ─── BOTTOM SHEET ─── */
    .sheet-overlay {
      position: fixed; inset: 0;
      background: rgba(0,30,0,0.45);
      z-index: 300;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .sheet {
      width: 100%; max-width: 520px;
      background: var(--white);
      border-radius: 20px 20px 0 0;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
    }
    .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--border);
    }
    .sheet-title { font-size: 16px; font-weight: 700; color: var(--text); }
    .btn-close {
      width: 30px; height: 30px;
      border: none; border-radius: 50%;
      background: var(--surface); color: var(--text-muted);
      font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .sheet-items {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overscroll-behavior: contain;
    }
    .sheet-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sheet-item-info { flex: 1; min-width: 0; }
    .sheet-item-code {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: var(--green-dark);
      letter-spacing: -0.2px;
    }
    .sheet-item-price { font-size: 13px; color: var(--text-mid); margin-top: 3px; }
    .sheet-stock-status { font-size: 14px; font-weight: 700; margin-top: 4px; }
    .sheet-item-actions { display: flex; align-items: center; gap: 7px; }
    .btn-remove {
      width: 30px; height: 30px;
      border: none; border-radius: 7px;
      background: var(--danger-bg); color: var(--danger);
      font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sheet-footer {
      padding: 10px 14px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .sheet-total-row { display: flex; justify-content: space-between; align-items: baseline; }
    .sheet-total-label { font-size: 13px; color: var(--text-muted); }
    .sheet-total-value { font-family: 'Outfit', sans-serif; font-size: 19px; font-weight: 700; color: var(--green-dark); }
    .btn-submit-full {
      height: 48px;
      border: none;
      border-radius: var(--radius);
      background: var(--green);
      color: #fff;
      font-family: 'Sarabun', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 6px;
      transition: background 0.15s;
    }
    .btn-submit-full:hover { background: var(--green-dark); }
    .btn-submit-full:disabled { background: var(--text-light); cursor: not-allowed; }

    /* ─── ALERT ─── */
    .alert-overlay {
      position: fixed; inset: 0;
      background: rgba(0,30,0,0.5);
      backdrop-filter: blur(3px);
      display: none; align-items: center; justify-content: center;
      z-index: 500;
      opacity: 0; transition: opacity 0.2s;
    }
    .alert-overlay.show { opacity: 1; }
    .alert-card {
      background: var(--white);
      border-radius: 16px;
      padding: 20px;
      width: 88%; max-width: 340px;
      box-shadow: var(--shadow-lg);
      animation: popIn 0.25s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes popIn { from { transform: scale(0.88); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .alert-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .alert-icon { font-size: 22px; }
    .alert-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .alert-body { font-size: 14px; color: var(--danger); line-height: 1.55; margin-bottom: 16px; word-break: break-word; white-space: pre-line; }
    .alert-btn {
      float: right;
      padding: 9px 20px;
      border: none; border-radius: 8px;
      background: var(--green); color: #fff;
      font-family: 'Sarabun', sans-serif;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }

    /* ─── SUCCESS MODAL (ตาข่ายรองตอนส่ง trigger เข้าแชทไม่ได้) ───
       ใช้ .alert-overlay/.alert-card ร่วมกับ alert ปกติ แต่ต้องมี 2 ปุ่ม
       จึงใช้ .alert-actions แทน .alert-btn ที่เป็น float:right */
    .alert-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }
    .alert-actions .alert-btn { float: none; }
    .alert-btn.secondary { background: var(--text-muted); }

    /* .alert-body เดิมเป็นสีแดง + pre-line (ไว้ใช้กับ error) — โมดัลนี้เป็นข่าวดีจึงต้องทับทั้งคู่ */
    .alert-body-info { color: var(--text); white-space: normal; }

    .trigger-box {
      display: none;
      margin-top: 6px;
      padding: 6px 8px;
      background: var(--white);
      border: 1px dashed var(--border-strong);
      border-radius: 6px;
      font-size: 11px;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .alert-diag {
      margin-top: 8px;
      font-size: 10px;
      color: var(--text-light);
      word-break: break-word;
    }
  </style>
</head>

          options.headers = {};
        }
        if (options.headers instanceof Headers) {
          options.headers.set('ngrok-skip-browser-warning', 'true');
        } else if (Array.isArray(options.headers)) {
          options.headers.push(['ngrok-skip-browser-warning', 'true']);
        } else {
          options.headers['ngrok-skip-browser-warning'] = 'true';
        }
        return originalFetch(url, options);
      };
    })();

    // คัดลอกข้อความลง clipboard (fallback: textarea + execCommand สำหรับ webview เก่า)
    // ⚠️ mirror ของ copyToClipboard() ใน quote-edit.html — แก้ที่นั่นแล้วต้องมา sync ที่นี่ด้วยมือ
    async function copyToClipboard(text) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch (e) {}
      try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand('copy');
        ta.remove();
        return ok;
      } catch (e) {
        return false;
      }
    }

    // ส่ง trigger เข้าแชท — ยิงจริงทุกแพลตฟอร์มแล้วค่อยดูผล ไม่เดาจาก OS
    //
    // ทดสอบแล้ว: LINE PC เปิดหน้า LIFF ใน "เบราว์เซอร์ภายนอก" เสมอ (LIFF URL เป็น
    // universal/app link เฉพาะ iOS/Android — ดู https://developers.line.biz/en/docs/liff/opening-liff-app/)
    // → isInClient() เป็น false → sendMessages() ใช้บน PC ไม่ได้อย่างถาวร ต้องตกไปใช้ modal คัดลอก
    // ที่ยังยิงอยู่คือทางของมือถือ (และเผื่อ LINE PC รองรับ LIFF browser ในอนาคต)
    //
    // reason เป็นข้อความพร้อมแสดงผล (มี icon ในตัว)
    // ⚠️ mirror ของ trySendTrigger() ใน quote-edit.html — แก้ที่นั่นแล้วต้องมา sync ที่นี่ด้วยมือ
    async function trySendTrigger(text) {
      try {
        if (!liff.isInClient()) {
          return {
            ok: false,
            reason: 'ℹ️ LINE PC เปิดหน้านี้ในเบราว์เซอร์ภายนอกเสมอ จึงส่งเข้าแชทให้อัตโนมัติไม่ได้ (เป็นข้อจำกัดของ LINE PC ไม่ใช่ข้อผิดพลาด)'
          };
        }
        await liff.sendMessages([{ type: 'text', text }]);
        return { ok: true };
      } catch (e) {
        console.error('sendMessages error:', e);
        const code = (e && e.code) || '';
        const msg = (e && e.message) || String(e);
        return { ok: false, reason: `⚠️ ส่งเข้าแชทอัตโนมัติไม่สำเร็จ: ${code ? `${code} — ${msg}` : msg}` };
      }
    }

    // ตาข่ายรองตอนส่ง trigger เข้าแชทไม่สำเร็จ — ให้ผู้ใช้คัดลอกไปวางในแชทเอง
    // บอทจะ reply Flex สรุปร่าง ซึ่งมีปุ่มเข้าหน้าแก้ไข/กรอกข้อมูลลูกค้าให้ต่อ
    // failReason โชว์ไว้ให้วินิจฉัยหน้างานโดยไม่ต้องเปิด devtools
    function showDraftSuccessModal(triggerMessage, failReason) {
      successBody.innerHTML = `
        <div style="font-weight:700;color:var(--green-dark);">สร้างร่างใบเสนอราคาเรียบร้อยแล้ว</div>
        <div style="margin-top:8px;font-size:12px;color:var(--text-muted);">📋 คัดลอกข้อความ → วางส่งในแชท เพื่อดูสรุปร่างและกรอกข้อมูลลูกค้าต่อ</div>
        <div id="successTriggerBox" class="trigger-box">${triggerMessage || ''}</div>
      `;

      // ต่อด้วย textContent (ไม่ใช่ innerHTML) เพราะ reason มาจาก error ของ SDK
      if (failReason) {
        const diag = document.createElement('div');
        diag.className = 'alert-diag';
        diag.textContent = failReason;
        successBody.appendChild(diag);
      }

      successCopy.disabled = false;
      successCopy.textContent = '📋 คัดลอกข้อความ';
      successCopy.onclick = async () => {
        const ok = await copyToClipboard(triggerMessage);
        if (ok) {
          successCopy.textContent = '✓ คัดลอกแล้ว';
        } else {
          // คัดลอกอัตโนมัติไม่ได้ → เผยกล่องข้อความให้ select เอง
          successCopy.textContent = '⚠️ คัดลอกเองจากกล่องด้านบน';
          const box = document.getElementById('successTriggerBox');
          if (box) {
            box.style.display = 'block';
            const range = document.createRange();
            range.selectNodeContents(box);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
          }
        }
      };

      successClose.onclick = () => {
        try { liff.closeWindow(); } catch (e) {}
        successOverlay.classList.remove('show');
        setTimeout(() => successOverlay.style.display = 'none', 200);
      };

      successOverlay.style.display = 'flex';
      setTimeout(() => successOverlay.classList.add('show'), 10);
    }

    let searchTimer = null;
    function clearSearchState() {
        clearTimeout(searchTimer);
        productsList = [];
        prodContainer.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <p>พิมพ์รหัสสินค้า หรือ ชื่อสินค้า<br>เพื่อเริ่มค้นหา</p>
          </div>`;
        resultMeta.style.display = 'none';
      }

      // จากนั้นเรียกใช้ในจุดต่างๆ เช่น
      searchInput.addEventListener('input', e => {
        const q = e.target.value.trim();
        if (!q) {
          clearSearchState(); // <-- เรียกใช้

        }
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => doSearch(q), 280);
      });

    async function doSearch(q) {
      prodContainer.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><p>กำลังค้นหา...</p></div>';
      resultMeta.style.display = 'none';
      try {
        const res = await fetch(`/api/products/search?q=${encodeURIComponent(q)}`);
        if (!res.ok) throw new Error('Search failed');
        productsList = await res.json();
        renderProducts();
      } catch(err) {
        prodContainer.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p style="color:var(--danger)">ค้นหาล้มเหลว: ${err.message}</p></div>`;
      }
    }

    function renderProducts() {
      prodContainer.innerHTML = '';
      if (!productsList.length) {
        prodContainer.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>ไม่พบสินค้าที่ค้นหา</p></div>';
        resultMeta.style.display = 'none';
        return;
      }
      resultMeta.textContent = `พบ ${productsList.length} รายการ`;
      resultMeta.style.display = 'block';

      productsList.forEach(prod => {
        const ci = cart.find(c => (c.model || c.product_code) === prod.code);
        const price = Number(prod.price) || 0;
        const stock = Number(prod.stock) || 0;
        const safeCode = prod.code.replace(/"/g, '&quot;');

        let badgeCls, badgeTxt;
        if (stock <= 0)                          { badgeCls = 'out'; badgeTxt = 'สินค้าหมด'; }
        else if (ci && ci.quantity > stock)      { badgeCls = 'low'; badgeTxt = `ไม่พอ (เหลือ ${stock})`; }
        else                                     { badgeCls = 'ok';  badgeTxt = `พร้อมส่ง ${stock}`; }

        const actionHtml = ci
          ? `<div class="qty-stepper">
               <button class="qty-btn btn-dec" data-code="${safeCode}">−</button>
               <input type="number" class="qty-val qty-input" value="${ci.quantity}" min="1" data-code="${safeCode}">
               <button class="qty-btn btn-inc" data-code="${safeCode}">+</button>
             </div>`
          : `<button class="btn-add btn-addcart" data-code="${safeCode}">🛒 ใส่ตะกร้า</button>`;

        const card = document.createElement('div');
        card.className = 'product-card' + (ci ? ' in-cart' : '');
        card.innerHTML = `
          <div class="prod-left">
            <div class="prod-top-row">
              <span class="prod-code">${prod.code}</span>
              <span class="prod-stock-badge ${badgeCls}">${badgeTxt}</span>
            </div>
            <div class="prod-name">${prod.name}</div>
          </div>
          <div class="prod-right">
            <div class="prod-price">${price.toLocaleString('th-TH', {minimumFractionDigits:2,maximumFractionDigits:2})} <span class="prod-price-unit">บ.</span></div>
            ${actionHtml}
          </div>`;
        prodContainer.appendChild(card);
      });
    }

    async function addToCart(code) {
      const prod = productsList.find(p => p.code === code);
      if (!prod) return;

      // ตรวจสอบว่าสินค้าถูกล็อกการเสนอราคาหรือไม่
      try {
        const checkRes = await fetch(`/api/products/${encodeURIComponent(code)}/blocked`);
        if (checkRes.ok) {
          const checkData = await checkRes.json();
          if (checkData.blocked) {
            showAlert(checkData.message);
            return;
          }
        }
      } catch (err) {
        console.error('Error checking blocked status:', err);
      }

      const stock = Number(prod.stock) || 0;
      if (stock <= 0) {
        showAlert(`ระวัง: สินค้า ${code} หมดสต็อก (พร้อมส่ง 0 ชิ้น) จะต้องรอการผลิตหรือสั่งซื้อ`);
      }
      cart.push({ product_code: code, model: code, name: prod.name, price: Number(prod.price)||0, quantity: 1, stock });
      renderProducts();
      updateCartBar();
    }

    function changeQty(code, delta) {
      const idx = cart.findIndex(c => (c.model || c.product_code) === code);
      if (idx < 0) return;
      const item = cart[idx];
      const newQty = item.quantity + delta;
      if (newQty <= 0) { cart.splice(idx, 1); renderProducts(); updateCartBar(); return; }
      if (item.quantity <= item.stock && newQty > item.stock) {
        showAlert(`ระวัง: สินค้าไม่เพียงพอ (พร้อมส่ง ${item.stock} ชิ้น, ต้องการ ${newQty} ชิ้น) ขาดอีก ${newQty - item.stock} ชิ้น`);
      }
      item.quantity = newQty;
      renderProducts();
      updateCartBar();
      if (sheetOverlay.style.display === 'flex') renderSheet();
    }

    function setQty(code, val) {
      const idx = cart.findIndex(c => (c.model || c.product_code) === code);
      if (idx < 0) return;
      const item = cart[idx];
      const newQty = Math.max(1, val);
      if (item.quantity <= item.stock && newQty > item.stock) {
        showAlert(`ระวัง: สินค้าไม่เพียงพอ (พร้อมส่ง ${item.stock} ชิ้น, ต้องการ ${newQty} ชิ้น) ขาดอีก ${newQty - item.stock} ชิ้น`);
      }
      item.quantity = newQty;
      renderProducts();
      updateCartBar();
      if (sheetOverlay.style.display === 'flex') renderSheet();
    }

    function removeFromCart(code) {
      cart = cart.filter(c => (c.model || c.product_code) !== code);
      renderProducts();
      updateCartBar();
      renderSheet();
    }

    prodContainer.addEventListener('click', e => {
      const addBtn = e.target.closest('.btn-addcart');
      if (addBtn) { addToCart(addBtn.dataset.code); return; }
      const dec = e.target.closest('.btn-dec');
      if (dec) { changeQty(dec.dataset.code, -1); return; }
      const inc = e.target.closest('.btn-inc');
      if (inc) { changeQty(inc.dataset.code, 1); return; }
    });
    prodContainer.addEventListener('change', e => {
      if (e.target.classList.contains('qty-input')) setQty(e.target.dataset.code, parseInt(e.target.value) || 1);
    });
    sheetItems.addEventListener('click', e => {
      const dec = e.target.closest('.btn-dec');
      if (dec) { changeQty(dec.dataset.code, -1); return; }
      const inc = e.target.closest('.btn-inc');
      if (inc) { changeQty(inc.dataset.code, 1); return; }
      const del = e.target.closest('.btn-remove');
      if (del) { removeFromCart(del.dataset.code); return; }
    });
    sheetItems.addEventListener('change', e => {
      if (e.target.classList.contains('qty-input')) setQty(e.target.dataset.code, parseInt(e.target.value) || 1);
    });

    function updateCartBar() {
      if (!cart.length) {
        cartBar.style.display = 'none';
        btnDraft.disabled = true;
        if (sheetOverlay.style.display === 'flex') closeSheet();
        return;
      }
      cartBar.style.display = 'flex';
      btnDraft.disabled = false;
      btnSheetSubmit.disabled = false;
      const total = cart.reduce((s, i) => s + i.quantity, 0);
      cartBarCount.textContent = `${cart.length} รายการ · รวม ${total} ชิ้น`;
    }

    function openSheet() { renderSheet(); sheetOverlay.style.display = 'flex'; }
    function closeSheet() { sheetOverlay.style.display = 'none'; }

    cartBarInfo.addEventListener('click', openSheet);
    btnCloseSheet.addEventListener('click', closeSheet);
    sheetOverlay.addEventListener('click', e => { if (e.target === sheetOverlay) closeSheet(); });

    function renderSheet() {
      sheetItems.innerHTML = '';
      if (!cart.length) { sheetItems.innerHTML = '<div class="empty-state"><p>ไม่มีสินค้าในตะกร้า</p></div>'; }
      let totalVal = 0;
      cart.forEach(item => {
        const itemKey = item.model || item.product_code;
        const safeCode = itemKey.replace(/"/g, '&quot;');
        const remaining = item.stock - item.quantity;
        const stockColor = remaining < 0 ? 'var(--danger)' : 'var(--green-dark)';
        const stockText  = remaining < 0
          ? `⚠️ สินค้าไม่พอ (เหลือ ${item.stock} ชิ้น)`
          : `✓ พร้อมส่ง ${item.stock} ชิ้น`;
        const lineTotal = item.price * item.quantity;
        totalVal += lineTotal;
        const div = document.createElement('div');
        div.className = 'sheet-item';
        div.innerHTML = `
          <div class="sheet-item-info">
            <div class="sheet-item-code">${itemKey}</div>
            <div class="sheet-item-price">${item.price.toLocaleString('th-TH',{minimumFractionDigits:2})} บ./ชิ้น · รวม ${lineTotal.toLocaleString('th-TH',{minimumFractionDigits:2})} บ.</div>
            <div class="sheet-stock-status" style="color:${stockColor}">${stockText}</div>
          </div>
          <div class="sheet-item-actions">
            <div class="qty-stepper" style="width:90px">
              <button class="qty-btn btn-dec" data-code="${safeCode}">−</button>
              <input type="number" class="qty-val qty-input" value="${item.quantity}" min="1" data-code="${safeCode}">
              <button class="qty-btn btn-inc" data-code="${safeCode}">+</button>
            </div>
            <button class="btn-remove" data-code="${safeCode}">🗑️</button>
          </div>`;
        sheetItems.appendChild(div);
      });
      sheetTotal.textContent = '฿' + totalVal.toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2});
    }

    // แปลง violation จาก /api/quotation/draft-cart (422 VALIDATION_ERROR) เป็นข้อความที่อ่านรู้เรื่อง
    // ไม่งั้นผู้ใช้จะเห็นแค่คำว่า "VALIDATION_ERROR" ไม่รู้ว่าติดกฎอะไรที่รายการไหน
    // ⚠️ mirror ของ formatViolation() ใน quote-edit.html — แก้ที่นั่นแล้วต้องมา sync ที่นี่ด้วยมือ
    function formatViolation(v) {
      if (!v) return '';
      const model = v.model || v.product_code || '-';
      if (v.type === 'OUT_OF_STOCK') {
        const optionalNote = v.is_optional && v.linked_to_model ? ` (สินค้าเสริมของ ${v.linked_to_model})` : '';
        return `📦 ห้ามเสนอราคาเมื่อไม่มีสินค้า รายการ ${model}${optionalNote}`;
      }
      if (v.type === 'MOQ_VIOLATION') {
        const detail = v.warn_msg
          ? `: ${v.warn_msg}`
          : ` (สั่งขั้นต่ำ ${v.min_order_qty ?? '-'} ชิ้น, ใส่มา ${v.qty ?? '-'} ชิ้น)`;
        return `⬇️ จำนวนไม่ถึงขั้นต่ำ รายการ ${model}${detail}`;
      }
      return v.warn_msg || v.message || '';
    }

    async function submitCart() {
      if (!cart.length || !userId) return;
      btnDraft.disabled = true;
      btnSheetSubmit.disabled = true;
      loaderText.textContent = 'กำลังสร้างใบเสนอราคาแบบร่าง...';
      loader.style.opacity = '1';
      loader.style.display = 'flex';
      try {
        const res = await fetch('/api/quotation/draft-cart', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, items: cart })
        });
        const result = await res.json();
        if (result.success) {
          // ⚠️ ข้อความต้องตรงตัวอักษรเดิม — lineHandler.ts match ด้วย startsWith('💾 ร่างใบเสนอราคา') + regex 'รหัส:'
          const triggerMessage = `💾 ร่างใบเสนอราคา (${cart.length} รายการ)
(รหัส: ${result.quoteIds})`;

          // ยิงเข้าแชทจริงทุกแพลตฟอร์ม (ไม่เดาจาก OS) ส่งผ่าน = ปิดหน้าเลย
          const sent = await trySendTrigger(triggerMessage);
          if (sent.ok) {
            loaderText.innerHTML = '<span style="color:var(--green)">✓</span> สร้างร่างสำเร็จ!';
            setTimeout(() => liff.closeWindow(), 900);
            return;
          }

          // ส่งไม่สำเร็จ → เด้ง modal ให้คัดลอกไปวางเอง (ต้องซ่อน loader ก่อน ไม่งั้น modal โดนบัง)
          // ตะกร้าคงไว้ไม่ล้าง + ปลดล็อกปุ่ม เผื่อผู้ใช้ต้องลองใหม่
          loader.style.display = 'none';
          btnDraft.disabled = false;
          btnSheetSubmit.disabled = false;
          showDraftSuccessModal(triggerMessage, sent.reason);
        } else {
          const violations = Array.isArray(result.violations)
            ? result.violations.map(formatViolation).filter(Boolean)
            : [];
          showAlert(
            violations.length
              ? 'ยังสร้างร่างไม่ได้ ตามเงื่อนไขด้านล่าง\n\n' + violations.join('\n')
              : (result.error || 'เกิดข้อผิดพลาด กรุณาลองใหม่')
          );
          loader.style.display = 'none';
          btnDraft.disabled = false;
          btnSheetSubmit.disabled = false;
        }
      } catch(err) {
        showAlert('เชื่อมต่อไม่ได้: ' + err.message);
        loader.style.display = 'none';
        btnDraft.disabled = false;
        btnSheetSubmit.disabled = false;
      }
    }
    btnDraft.addEventListener('click', submitCart);
    btnSheetSubmit.addEventListener('click', submitCart);

    async function initLIFF() {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        let urlUserId = urlParams.get('userId');
        await liff.init({ liffId: '__LIFF_ID__' });
        // liff.init() อาจ rewrite URL (กิน liff.state แล้วคืน query จริง) — อ่านซ้ำหลัง init
        // เหมือนที่ register.html ทำ ไม่งั้นบางแพลตฟอร์มจะพลาด userId จาก URL แล้วตกไปใช้ getProfile()
        if (!urlUserId) {
          urlUserId = new URLSearchParams(window.location.search).get('userId');
        }
        if (!urlUserId) {
          const state = urlParams.get('liff.state') || new URLSearchParams(window.location.search).get('liff.state');
          if (state) {
            const qi = state.indexOf('?');
            if (qi !== -1) urlUserId = new URLSearchParams(state.substring(qi)).get('userId');
          }
        }
        if (!liff.isLoggedIn()) { liff.login(); return; }
        let profile = null;
        try { profile = await liff.getProfile(); } catch {}
        userId = urlUserId || profile?.userId || null;
        if (!userId) throw new Error('ระบุ User ID ไม่ได้');
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 350);
        const q = urlParams.get('q');
        if (q) { searchInput.value = q; doSearch(q); }
      } catch(err) {
        loaderText.innerHTML = `<span style="color:var(--danger)">⚠️ ${err.message}</span>`;
      }
    }
    window.addEventListener('load', initLIFF);
  </script>
</body>
</html>
