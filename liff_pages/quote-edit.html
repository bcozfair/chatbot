<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>แก้ไขใบเสนอราคา 📄</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Outfit:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --green-dark: #157015;
        --green: #1e8f1e;
        --green-mid: #27a827;
        --green-light: #e6f5e6;
        --green-pale: #f0faf0;
        --white: #ffffff;
        --surface: #f5f8f5;
        --border: #d0e8d0;
        --border-strong: #a8cfa8;
        --text: #0d2b0d;
        --text-mid: #3a5c3a;
        --text-muted: #6b8f6b;
        --text-light: #9ab89a;
        --danger: #d42b2b;
        --danger-bg: #fff0f0;
        --warning: #b85c00;
        --warning-bg: rgba(184, 92, 0, 0.08);
        --success: #1e8f1e;
        --success-hover: #157015;
        --shadow-sm: 0 1px 4px rgba(0, 60, 0, 0.07);
        --shadow: 0 2px 12px rgba(0, 60, 0, 0.1);
        --shadow-lg: 0 8px 32px rgba(0, 60, 0, 0.14);
        --radius: 12px;
        --radius-sm: 8px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      html {
        font-size: 16px;
      }

      body {
        font-family:
          "Sarabun",
          -apple-system,
          sans-serif;
        background: var(--surface);
        color: var(--text);
        min-height: 100vh;
        padding: 12px 12px 100px;
        -webkit-font-smoothing: antialiased;
      }

      /* ─── LOADER ─── */
      .loader-screen {
        position: fixed;
        inset: 0;
        background: var(--white);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 999;
        transition: opacity 0.35s;
      }

      .loader {
        width: 36px;
        height: 36px;
        border: 3px solid var(--green-light);
        border-top-color: var(--green);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 14px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loader-text {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-muted);
        text-align: center;
      }

      /* ─── ANIMATIONS ─── */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-8px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* ─── CONTAINER ─── */
      .container {
        width: 100%;
        max-width: 520px;
        margin: 0 auto;
        animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }

      /* ─── QUOTE CARD ─── */
      .quote-card {
        background: var(--white);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-sm);
        margin-bottom: 10px;
        overflow: visible;
        animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }

      /* ─── CARD HEADER ─── */
      .card-header {
        padding: 10px 14px;
        color: var(--white);
        font-family: "Outfit", sans-serif;
        font-weight: 700;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .card-header.pm {
        background: linear-gradient(135deg, var(--green-dark), var(--green));
      }
      .card-header.tht {
        background: linear-gradient(135deg, #9c2121, #e26868);
      }

      /* customer info header */
      .card-header.customer-hdr {
        background: linear-gradient(135deg, #0f2b0f, var(--green-dark));
      }

      /* ─── CARD BODY ─── */
      .card-body {
        padding: 10px 12px;
      }

      /* ─── INFO GRID ─── */
      .info-grid {
        display: grid;
        gap: 7px;
      }

      .info-row {
        display: flex;
        gap: 8px;
        align-items: flex-start;
        font-size: 13px;
        line-height: 1.5;
      }
      .info-label {
        color: var(--text-light);
        min-width: 90px;
        flex-shrink: 0;
      }
      .info-value {
        color: var(--text);
        font-weight: 600;
        word-break: break-word;
      }

      .info-note {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 10px;
        padding: 7px 11px;
        background: var(--green-pale);
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
      }

      /* ─── SECTION TITLE ─── */
      .section-title {
        font-weight: 700;
        font-size: 13px;
        color: var(--text-mid);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      /* ══════════════════════════════════════════
       ─── ITEM CARD — redesigned for mobile ───
       ══════════════════════════════════════════ */
      .item-card {
        background: var(--white);
        border: 1.5px solid var(--border);
        border-radius: 10px;
        margin-bottom: 8px;
        overflow: hidden;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
        animation: slideIn 0.25s ease;
      }
      .item-card:hover {
        border-color: var(--border-strong);
        box-shadow: var(--shadow-sm);
      }

      /* top strip: index + code + delete button */
      .item-top-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px 6px;
        border-bottom: 1px solid var(--border);
        background: var(--green-pale);
      }

      .item-index {
        font-family: "Outfit", sans-serif;
        font-weight: 800;
        font-size: 11px;
        color: var(--white);
        background: var(--green);
        width: 20px;
        height: 20px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .item-code {
        font-family: "Outfit", sans-serif;
        font-weight: 700;
        font-size: 13px;
        color: var(--green-dark);
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .item-stock-badge {
        font-size: 10px;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 20px;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .item-stock-badge.in-stock {
        background: rgba(30, 143, 30, 0.12);
        color: var(--green-dark);
      }
      .item-stock-badge.out-of-stock {
        background: var(--danger-bg);
        color: var(--danger);
      }

      /* ─── ITEM BODY ─── */
      .item-body {
        padding: 8px 10px;
        display: flex;
        flex-direction: column;
        gap: 7px;
      }

      /* price × qty row */
      .item-pq-row {
        display: flex;
        align-items: flex-end;
        gap: 12px;
      }

      .item-pq-col {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }
      .item-pq-col.price-col {
        flex: 1;
      }
      .item-pq-col.qty-col {
        flex: 1;
      }

      .item-total-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px 8px;
      }

      .item-field-label {
        font-size: 10px;
        color: var(--text-light);
        white-space: nowrap;
        flex-shrink: 0;
      }

      /* total price — right side, prominent */
      .item-total-chip {
        font-family: "Outfit", sans-serif;
        font-size: 14px;
        font-weight: 800;
        color: var(--green-dark);
        background: var(--green-light);
        padding: 4px 10px;
        border-radius: 20px;
        white-space: nowrap;
        flex-shrink: 0;
      }

      /* discount row */
      .item-disc-row {
        display: flex;
        align-items: center;
        gap: 5px;
        background: var(--surface);
        border-radius: 7px;
        padding: 5px 8px;
      }

      .disc-inputs-group {
        display: flex;
        align-items: center;
        gap: 4px;
        flex: 1;
      }

      .disc-separator {
        font-size: 11px;
        font-weight: 700;
        color: var(--text-muted);
      }
      .disc-unit {
        font-size: 10px;
        color: var(--text-muted);
      }

      .item-discount-baht-chip {
        font-size: 10px;
        font-weight: 700;
        color: var(--warning);
        background: var(--warning-bg);
        padding: 2px 7px;
        border-radius: 20px;
        white-space: nowrap;
        margin-left: auto;
      }

      /* ─── EDIT INPUTS ─── */
      .edit-input {
        font-family: "Outfit", sans-serif;
        font-size: 13px;
        font-weight: 600;
        padding: 7px 10px;
        border: 1.5px solid var(--border-strong);
        border-radius: var(--radius-sm);
        background: var(--white);
        color: var(--text);
        width: 100%;
        max-width: 120px;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
        -moz-appearance: textfield;
        appearance: textfield;
        outline: none;
      }
      .edit-input::placeholder {
        color: var(--text-light);
      }
      .edit-input:focus {
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(30, 143, 30, 0.12);
        background: var(--green-pale);
      }
      .edit-input::-webkit-outer-spin-button,
      .edit-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        appearance: none;
        margin: 0;
      }

      /* compact field sizes used inside item cards */
      .edit-input.inp-price {
        width: 100%;
        min-width: 60px;
        height: 30px;
        padding: 0 6px;
        font-size: 12px;
        text-align: right;
        border-radius: 7px;
        max-width: none;
      }
      .edit-input.inp-disc {
        width: 42px;
        min-width: 42px;
        height: 28px;
        padding: 0 4px;
        font-size: 11px;
        text-align: center;
        border-radius: 7px;
        max-width: none;
      }
      .edit-input.inp-remark {
        width: 100%;
        max-width: none;
        height: 30px;
        padding: 0 8px;
        font-size: 11px;
        border-radius: 7px;
        background: var(--white);
        border-color: var(--border);
      }
      .edit-input.inp-remark:focus {
        border-color: var(--green);
        background: var(--green-pale);
      }

      select.edit-input {
        background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%236b8f6b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3E%3C/svg%3E");
        background-position: right 10px center;
        background-repeat: no-repeat;
        background-size: 15px;
        padding-right: 28px;
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        cursor: pointer;
      }

      /* ─── QTY CONTROL ─── */
      .qty-control {
        display: flex;
        align-items: center;
        background: var(--white);
        border: 1.5px solid var(--border-strong);
        border-radius: var(--radius-sm);
        overflow: hidden;
        max-width: 110px;
      }
      .qty-btn {
        background: transparent;
        border: none;
        color: var(--green-dark);
        font-size: 14px;
        font-weight: 700;
        width: 28px;
        height: 28px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        transition: background 0.1s;
      }
      .qty-btn:hover {
        background: var(--green-light);
      }
      .qty-btn:active {
        background: var(--green-light);
      }

      .qty-control .edit-input {
        border: none;
        border-radius: 0;
        text-align: center;
        width: 40px;
        height: 28px;
        padding: 0;
        max-width: none;
        box-shadow: none;
        font-size: 13px;
      }
      .qty-control .edit-input:focus {
        box-shadow: none;
        background: transparent;
      }

      .qty-control.compact {
        width: 100%;
        max-width: none;
        height: 30px;
        border-radius: 7px;
      }
      .qty-control.compact .qty-btn {
        width: 26px;
        height: 28px;
        font-size: 13px;
      }
      .qty-control.compact .edit-input {
        flex: 1;
        width: 100%;
        height: 28px;
        font-size: 12px;
      }

      /* ─── DISCOUNT GROUP (global) ─── */
      .disc-group {
        display: flex;
        align-items: center;
        gap: 4px;
        flex: 1;
      }
      .disc-group .edit-input {
        max-width: 65px;
        text-align: center;
      }
      .disc-sep {
        color: var(--text-muted);
        font-weight: 700;
        font-size: 13px;
      }

      /* ─── DELETE BUTTON ─── */
      .btn-delete-item {
        font-family: "Sarabun", sans-serif;
        font-size: 12px;
        font-weight: 600;
        padding: 4px 6px;
        border: none;
        background: transparent;
        color: var(--danger);
        cursor: pointer;
        transition: background 0.15s;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 3px;
        border-radius: 5px;
        flex-shrink: 0;
      }
      .btn-delete-item:hover {
        background: var(--danger-bg);
      }

      /* ─── STOCK BADGES (legacy — kept for search dropdown) ─── */
      .prod-stock {
        font-weight: 600;
        padding: 2px 6px;
        border-radius: 6px;
        font-size: 10px;
      }
      .prod-stock.in-stock {
        background: rgba(30, 143, 30, 0.1);
        color: var(--green-dark);
      }
      .prod-stock.out-of-stock {
        background: var(--danger-bg);
        color: var(--danger);
      }

      /* ─── TOTAL BAR ─── */
      .total-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 11px 14px;
        background: var(--green-light);
        border-top: 1.5px solid var(--border);
      }
      .total-label {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-mid);
      }
      .total-value {
        font-family: "Outfit", sans-serif;
        font-size: 15px;
        font-weight: 700;
        color: var(--green-dark);
      }

      /* ─── SAVE STATUS ─── */
      .save-status {
        font-size: 11px;
        font-weight: 600;
        padding: 3px 9px;
        border-radius: 20px;
        transition: all 0.25s;
        display: inline-flex;
        align-items: center;
        gap: 3px;
        margin-left: auto;
      }
      .save-status.saving {
        background: rgba(255, 255, 255, 0.2);
        color: #ffffff;
        border: 1px solid rgba(255, 255, 255, 0.4);
      }
      .save-status.saved {
        background: rgba(255, 255, 255, 0.35);
        color: #ffffff;
        border: 1px solid rgba(255, 255, 255, 0.6);
      }
      .save-status.error {
        background: #d42b2b;
        color: #ffffff;
        border: 1px solid #ffffff;
      }

      /* ─── ADD PRODUCT SECTION ─── */
      .add-product-section {
        background: var(--green-pale);
        border-radius: var(--radius-sm);
        padding: 12px;
        margin-top: 10px;
        margin-bottom: 10px;
        border: 1.5px dashed var(--border-strong);
      }

      /* ─── SEARCH DROPDOWN ─── */
      .search-wrapper {
        position: relative;
        width: 100%;
      }

      .search-results-dropdown {
        position: absolute;
        top: calc(100% + 5px);
        left: 0;
        right: 0;
        background: var(--white);
        border: 1.5px solid var(--border-strong);
        border-radius: var(--radius);
        box-shadow: var(--shadow-lg);
        z-index: 200;
        max-height: 200px;
        overflow-y: auto;
        display: none;
      }
      .search-results-dropdown::-webkit-scrollbar {
        width: 4px;
      }
      .search-results-dropdown::-webkit-scrollbar-track {
        background: transparent;
      }
      .search-results-dropdown::-webkit-scrollbar-thumb {
        background: var(--border-strong);
        border-radius: 99px;
      }

      .dropdown-item {
        padding: 9px 13px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 2px;
        border-bottom: 1px solid var(--border);
        transition: background 0.12s;
      }
      .dropdown-item:last-child {
        border-bottom: none;
      }
      .dropdown-item:hover {
        background: var(--green-light);
      }
      .dropdown-item.out-of-stock-item:hover {
        background: transparent !important;
      }

      .dropdown-item-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .dropdown-item .prod-code {
        font-family: "Outfit", sans-serif;
        font-weight: 700;
        font-size: 13px;
        color: var(--green-dark);
      }
      .dropdown-item .prod-price {
        font-family: "Outfit", sans-serif;
        font-weight: 700;
        font-size: 13px;
        color: var(--green-dark);
        white-space: nowrap;
      }
      .dropdown-item .prod-name {
        font-size: 11px;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* ─── STICKY FOOTER ─── */
      .sticky-footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--white);
        border-top: 2px solid var(--green);
        padding: 10px 14px 14px;
        display: flex;
        gap: 8px;
        z-index: 100;
        box-shadow: 0 -4px 20px rgba(0, 60, 0, 0.1);
      }

      /* ─── BUTTONS ─── */
      .btn {
        font-family: "Sarabun", sans-serif;
        font-weight: 700;
        font-size: 14px;
        padding: 12px 14px;
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        transition:
          background 0.15s,
          opacity 0.15s;
        flex: 1;
      }
      .btn:active {
        opacity: 0.88;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-confirm {
        background: var(--green);
        color: var(--white);
        box-shadow: 0 3px 10px rgba(30, 143, 30, 0.22);
      }
      .btn-confirm:hover:not(:disabled) {
        background: var(--green-dark);
      }

      .btn-cancel {
        background: transparent;
        color: var(--danger);
        border: 1.5px solid var(--danger);
      }
      .btn-cancel:hover {
        background: var(--danger);
        color: var(--white);
      }

      /* ─── TOAST ─── */
      .toast {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.9);
        padding: 24px 30px;
        border-radius: var(--radius);
        font-size: 15px;
        font-weight: 600;
        z-index: 1000;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: var(--shadow-lg);
        max-width: 90%;
        width: 400px;
        text-align: center;
        pointer-events: none;
      }

      .toast.show {
        opacity: 1;
        visibility: visible;
        transform: translate(-50%, -50%) scale(1);
        pointer-events: auto;
      }

      .toast.success {
        background: var(--green);
        color: var(--white);
      }

      .toast.error {
        background: var(--danger);
        color: var(--white);
      }

      .toast .toast-message {
        margin-bottom: 16px;
        line-height: 1.5;
      }

      .toast .toast-close-btn {
        background: rgba(255, 255, 255, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.4);
        color: white;
        padding: 8px 24px;
        border-radius: var(--radius-sm);
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.15s;
        font-family: "Sarabun", sans-serif;
      }

      .toast .toast-close-btn:hover {
        background: rgba(255, 255, 255, 0.4);
      }

      .toast .toast-close-btn:active {
        transform: scale(0.95);
      }

      /* ─── EMPTY STATE ─── */
      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--text-muted);
      }
      .empty-state .icon {
        font-size: 44px;
        margin-bottom: 10px;
        opacity: 0.5;
      }
      .empty-state .msg {
        font-size: 14px;
      }

      .footer-note {
        text-align: center;
        font-size: 11px;
        color: var(--text-light);
        margin-top: 14px;
        margin-bottom: 8px;
      }

      /* ─── REVISION BADGE ─── */
      .revision-banner {
        background: var(--warning-bg);
        border: 1px solid rgba(184, 92, 0, 0.25);
        border-radius: var(--radius-sm);
        padding: 9px 12px;
        margin-bottom: 14px;
        font-size: 13px;
        font-weight: 600;
        color: var(--warning);
        display: flex;
        align-items: center;
        gap: 7px;
      }

      /* ─── ALERT MODAL ─── */
      .alert-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 30, 0, 0.45);
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        opacity: 0;
        transition: opacity 0.22s;
      }
      .alert-modal-overlay.show {
        opacity: 1;
      }

      .alert-modal-card {
        background: var(--white);
        border: 1.5px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow-lg);
        width: 90%;
        max-width: 360px;
        padding: 20px;
        animation: alertPop 0.28s cubic-bezier(0.16, 1, 0.3, 1);
      }

      @keyframes alertPop {
        from {
          transform: scale(0.88);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .alert-modal-header {
        display: flex;
        align-items: center;
        gap: 9px;
        margin-bottom: 10px;
      }
      .alert-modal-icon {
        font-size: 22px;
      }
      .alert-modal-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
      }

      .alert-modal-body {
        font-size: 13px;
        line-height: 1.6;
        color: var(--danger);
        margin-bottom: 16px;
        word-break: break-word;
      }

      .alert-modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .alert-modal-btn {
        font-family: "Sarabun", sans-serif;
        background: var(--green);
        color: var(--white);
        border: none;
        padding: 8px 16px;
        border-radius: var(--radius-sm);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.15s;
      }
      .alert-modal-btn:hover {
        background: var(--green-dark);
      }

      /* ─── GLOBAL DISCOUNT CHECKBOX ─── */
      .use-global-discount-checkbox {
        accent-color: var(--green);
      }

      /* ─── CUSTOMER SELECTION ─── */
      .customer-selection-box {
        margin-bottom: 14px;
        border-bottom: 1.5px solid var(--border);
        padding-bottom: 14px;
      }

      /* item remark input override */
      .item-remark-input {
        background: var(--white) !important;
        border-color: var(--border) !important;
      }
      .item-remark-input:focus {
        border-color: var(--green) !important;
        background: var(--green-pale) !important;
      }
      /* ─── SEARCH CLEAR BUTTON ─── */
      .search-clear {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        background: var(--border);
        border: none;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: var(--text-mid);
        cursor: pointer;
        z-index: 5;
      }
      .search-wrapper input:not(:placeholder-shown) ~ .search-clear {
        display: flex;
      }
    </style>
  </head>

  <body>
    <!-- Loader -->
    <div id="loaderScreen" class="loader-screen">
      <div class="loader"></div>
      <div class="loader-text" id="loaderText">
        กำลังโหลดข้อมูลใบเสนอราคา...
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Alert Modal -->
    <div id="alertModal" class="alert-modal-overlay" style="display: none">
      <div class="alert-modal-card">
        <div class="alert-modal-header">
          <span class="alert-modal-icon">⚠️</span>
          <h3 class="alert-modal-title">แจ้งเตือนสินค้าพร้อมส่งไม่พอ</h3>
        </div>
        <div class="alert-modal-body" id="alertModalMessage">
          ข้อความเตือน...
        </div>
        <div class="alert-modal-footer">
          <button class="alert-modal-btn" id="alertModalClose">รับทราบ</button>
        </div>
      </div>
    </div>
    <!-- Confirm Modal -->
    <div id="confirmModal" class="alert-modal-overlay" style="display: none">
      <div class="alert-modal-card">
        <div class="alert-modal-header">
          <span class="alert-modal-icon" id="confirmModalIcon">❓</span>
          <h3 class="alert-modal-title" id="confirmModalTitle">
            ยืนยันการดำเนินการ
          </h3>
        </div>
        <div
          class="alert-modal-body"
          id="confirmModalMessage"
          style="color: var(--text); font-size: 13px; line-height: 1.6"
        >
          ข้อความยืนยัน...
        </div>
        <div
          class="alert-modal-footer"
          style="display: flex; justify-content: flex-end; gap: 8px"
        >
          <button
            class="alert-modal-btn"
            id="confirmModalCancel"
            style="background: var(--text-muted)"
          >
            ยกเลิก
          </button>
          <button
            class="alert-modal-btn"
            id="confirmModalOk"
            style="background: var(--danger)"
          >
            ยืนยัน
          </button>
        </div>
      </div>
    </div>

    <!-- Success Modal (หลังยืนยันสำเร็จ — ใช้ได้ทุกแพลตฟอร์ม) -->
    <div id="successModal" class="alert-modal-overlay" style="display: none">
      <div class="alert-modal-card">
        <div class="alert-modal-header">
          <span class="alert-modal-icon">✅</span>
          <h3 class="alert-modal-title">ยืนยันใบเสนอราคาสำเร็จ</h3>
        </div>
        <div
          class="alert-modal-body"
          id="successModalBody"
          style="color: var(--text); font-size: 13px; line-height: 1.7"
        ></div>
        <div
          class="alert-modal-footer"
          style="display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap"
        >
          <button
            class="alert-modal-btn"
            id="successModalClose"
            style="background: var(--text-muted)"
          >
            ปิด
          </button>
          <button class="alert-modal-btn" id="successModalCopy">
            📋 คัดลอกข้อความ
          </button>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="container" id="mainContent" style="display: none">
      <div id="quotesContainer"></div>
      <div class="footer-note">Powered by Primus Co., Ltd.</div>
    </div>

    <!-- Sticky Footer -->
    <div class="sticky-footer" id="stickyFooter" style="display: none">
      <button class="btn btn-cancel" id="btnCancel">❌ ยกเลิก</button>
      <button class="btn btn-confirm" id="btnConfirm">✅ ยืนยัน</button>
    </div>

    <!-- LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
      // Override global fetch to automatically inject ngrok skip header
      (function() {
        const originalFetch = window.fetch;
        window.fetch = function(url, options = {}) {
          if (!options.headers) {
            options.headers = {};
          }
          if (options.headers instanceof Headers) {
            options.headers.set('ngrok-skip-browser-warning', 'true');
          } else if (Array.isArray(options.headers)) {
            options.headers.push(['ngrok-skip-browser-warning', 'true']);
          } else {
            options.headers['ngrok-skip-browser-warning'] = 'true';
          }
          return originalFetch(url, options);
        };
      })();

      // ── State ──
      let quotesData = [];
      let originalData = [];
      let globalContacts = [];
      let userId = null;
      let hasChanges = false;

      function showCustomAlert(message) {
        const modal = document.getElementById("alertModal");
        const msgEl = document.getElementById("alertModalMessage");
        const closeBtn = document.getElementById("alertModalClose");
        if (!modal || !msgEl || !closeBtn) {
          alert(message);
          return;
        }
        msgEl.textContent = message;
        modal.style.display = "flex";
        setTimeout(() => modal.classList.add("show"), 10);
        const closeModal = () => {
          modal.classList.remove("show");
          setTimeout(() => (modal.style.display = "none"), 250);
        };
        closeBtn.onclick = closeModal;
        modal.onclick = (e) => {
          if (e.target === modal) closeModal();
        };
      }

      function showCustomConfirm(title, message, options = {}) {
        return new Promise((resolve) => {
          const modal = document.getElementById("confirmModal");
          const iconEl = document.getElementById("confirmModalIcon");
          const titleEl = document.getElementById("confirmModalTitle");
          const msgEl = document.getElementById("confirmModalMessage");
          const btnOk = document.getElementById("confirmModalOk");
          const btnCancel = document.getElementById("confirmModalCancel");

          if (!modal || !titleEl || !msgEl || !btnOk || !btnCancel) {
            resolve(confirm(message));
            return;
          }

          if (options.icon) iconEl.textContent = options.icon;
          else iconEl.textContent = "❓";

          titleEl.textContent = title || "ยืนยันการดำเนินการ";
          msgEl.textContent = message;

          if (options.okText) btnOk.textContent = options.okText;
          else btnOk.textContent = "ยืนยัน";

          if (options.cancelText) btnCancel.textContent = options.cancelText;
          else btnCancel.textContent = "ยกเลิก";

          if (options.isDestructive) {
            btnOk.style.background = "var(--danger)";
          } else {
            btnOk.style.background = "var(--green)";
          }

          modal.style.display = "flex";
          setTimeout(() => modal.classList.add("show"), 10);

          const close = (result) => {
            modal.classList.remove("show");
            setTimeout(() => {
              modal.style.display = "none";
              resolve(result);
            }, 250);
          };

          btnOk.onclick = () => close(true);
          btnCancel.onclick = () => close(false);
          modal.onclick = (e) => {
            if (e.target === modal) close(false);
          };
        });
      }

      // เปิดลิงก์ (PDF) ให้รองรับทั้งใน LINE client และเบราว์เซอร์ปกติ
      function openExternal(url) {
        try {
          if (liff.isInClient() && liff.openWindow) {
            liff.openWindow({ url, external: true });
            return;
          }
        } catch (e) {}
        window.open(url, "_blank");
      }

      // คัดลอกข้อความลง clipboard (fallback: textarea + execCommand สำหรับ webview เก่า)
      async function copyToClipboard(text) {
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
            return true;
          }
        } catch (e) {}
        try {
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.select();
          const ok = document.execCommand("copy");
          ta.remove();
          return ok;
        } catch (e) {
          return false;
        }
      }

      // Success modal หลังยืนยัน — path ของ LINE PC / เบราว์เซอร์ (liff.sendMessages ใช้ไม่ได้)
      // ให้ user คัดลอกข้อความ trigger ไปส่งในแชทเอง → บอท reply ปุ่ม PDF = มีประวัติในแชทเหมือนมือถือ
      // results = [{ quotation_no, pdf_link }, ...]; triggerMessage = ข้อความกระตุ้นให้บอท reply PDF
      function showConfirmSuccessModal(results, triggerMessage) {
        const modal = document.getElementById("successModal");
        const body = document.getElementById("successModalBody");
        const btnCopy = document.getElementById("successModalCopy");
        const btnClose = document.getElementById("successModalClose");
        if (!modal || !body) return;

        const list = (results || []).filter(Boolean);
        const nos = list
          .map((r) => r.quotation_no)
          .filter(Boolean)
          .join(", ");

        // ลิงก์ดาวน์โหลด PDF ตรง — แสดงเป็นตัวเลือกเสริมเสมอ
        const pdfLinksHtml = list
          .filter((r) => r.pdf_link)
          .map(
            (r) =>
              `<a href="#" class="success-pdf-link" data-url="${r.pdf_link}" style="display:inline-flex;align-items:center;gap:4px;margin:4px 6px 0 0;padding:6px 12px;border-radius:8px;background:var(--green-light);color:var(--green-dark);font-weight:700;font-size:12px;text-decoration:none;">📥 ${r.quotation_no || "ดาวน์โหลด PDF"}</a>`,
          )
          .join("");

        body.innerHTML = `
          <div style="font-weight:700;color:var(--green-dark);">เลขที่: ${nos || "-"}</div>
          <div style="margin-top:8px;font-size:12px;color:var(--text-muted);">📋 คัดลอกข้อความ → วางส่งในแชท เพื่อรับลิงก์ PDF</div>
          <div id="successTriggerBox" style="display:none;margin-top:6px;padding:6px 8px;background:var(--white);border:1px dashed var(--border-strong);border-radius:6px;font-size:11px;color:var(--text);white-space:pre-wrap;word-break:break-word;">${triggerMessage || ""}</div>
          <div id="successPdfWrap" style="margin-top:10px;">${pdfLinksHtml}</div>
        `;

        // ผูก event ลิงก์ PDF
        body.querySelectorAll(".success-pdf-link").forEach((a) => {
          a.addEventListener("click", (e) => {
            e.preventDefault();
            openExternal(a.dataset.url);
          });
        });

        const closeModal = () => {
          modal.classList.remove("show");
          setTimeout(() => (modal.style.display = "none"), 250);
        };

        // ปุ่ม "คัดลอกข้อความ" → copy trigger ไว้ให้ user วางส่งในแชทเอง
        if (btnCopy) {
          btnCopy.style.display = triggerMessage ? "" : "none";
          btnCopy.disabled = false;
          btnCopy.textContent = "📋 คัดลอกข้อความ";
          btnCopy.onclick = async () => {
            const ok = await copyToClipboard(triggerMessage);
            if (ok) {
              btnCopy.textContent = "✓ คัดลอกแล้ว";
            } else {
              // คัดลอกอัตโนมัติไม่ได้ → เผยกล่องข้อความให้ select เอง
              btnCopy.textContent = "⚠️ คัดลอกเองจากกล่องด้านบน";
              const box = document.getElementById("successTriggerBox");
              if (box) {
                box.style.display = "block";
                const range = document.createRange();
                range.selectNodeContents(box);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
              }
            }
          };
        }

        if (btnClose) {
          btnClose.onclick = () => {
            try {
              liff.closeWindow();
            } catch (e) {}
            closeModal();
          };
        }

        modal.style.display = "flex";
        setTimeout(() => modal.classList.add("show"), 10);
      }

      // ── Elements ──
      const loaderScreen = document.getElementById("loaderScreen");
      const loaderText = document.getElementById("loaderText");
      const mainContent = document.getElementById("mainContent");
      const quotesContainer = document.getElementById("quotesContainer");
      const stickyFooter = document.getElementById("stickyFooter");
      const btnConfirm = document.getElementById("btnConfirm");
      const btnCancel = document.getElementById("btnCancel");
      const toastEl = document.getElementById("toast");

      // ── Toast ──
      function showToast(message, type = "success") {
        // ลบ Toast เดิมถ้ามี
        const existingToast = document.querySelector(".toast");
        if (existingToast && existingToast.id !== "toast") {
          existingToast.remove();
        }

        // ซ่อน toast เดิม (id="toast") ก่อน
        toastEl.classList.remove("show");
        toastEl.style.display = "none";

        // สร้าง Toast ใหม่
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;

        // ข้อความ
        const msgSpan = document.createElement("div");
        msgSpan.className = "toast-message";
        msgSpan.textContent = message;
        toast.appendChild(msgSpan);

        // ปุ่มปิด (เฉพาะ error)
        if (type === "error") {
          const closeBtn = document.createElement("button");
          closeBtn.className = "toast-close-btn";
          closeBtn.textContent = "รับทราบ";
          closeBtn.addEventListener("click", () => {
            toast.classList.remove("show");
            setTimeout(() => toast.remove(), 300);
          });
          toast.appendChild(closeBtn);
        }

        document.body.appendChild(toast);

        // แสดง Toast
        requestAnimationFrame(() => {
          toast.classList.add("show");
        });

        // สำหรับ success: ปิดอัตโนมัติหลังจาก 2.5 วินาที
        if (type === "success") {
          setTimeout(() => {
            toast.classList.remove("show");
            setTimeout(() => toast.remove(), 300);
          }, 2500);
        }
      }

      function formatNumber(n, decimals = 0) {
        return n.toLocaleString("en-US", {
          minimumFractionDigits: decimals,
          maximumFractionDigits: decimals,
        });
      }

      function parseCustomerMeta(quote) {
        if (!quote)
          return {
            company: "ลูกค้าทั่วไป",
            contact: "-",
            phone: "-",
            email: "-",
            address: "-",
            delivery: "-",
            revise_from: null,
          };
        const fullName = quote.customer_name || "";
        const parts = fullName.split(" | ");
        if (parts.length > 1) {
          const company = parts[0] ? parts[0].trim() : "ลูกค้าทั่วไป";
          const contact = parts[1] ? parts[1].trim() : "-";
          let meta = {};
          if (parts[2]) {
            try {
              meta = Object.fromEntries(new URLSearchParams(parts[2]));
            } catch (e) {}
          }
          return {
            company,
            contact,
            phone:
              meta.phone ||
              (quote.contact_phone !== undefined ? quote.contact_phone : "-"),
            email:
              meta.email ||
              (quote.contact_email !== undefined ? quote.contact_email : "-"),
            address:
              meta.address ||
              (quote.contact_address !== undefined
                ? quote.contact_address
                : "-"),
            delivery:
              meta.delivery ||
              meta.address ||
              (quote.delivery_address !== undefined
                ? quote.delivery_address
                : "-"),
            revise_from: meta.revise_from || quote.revise_from || null,
          };
        }
        if (quote.contact_name) {
          return {
            company: fullName || "ลูกค้าทั่วไป",
            contact: quote.contact_name || "-",
            phone: quote.contact_phone || "-",
            email: quote.contact_email || "-",
            address: quote.contact_address || "-",
            delivery: quote.delivery_address || "-",
            revise_from: quote.revise_from || null,
          };
        }
        return {
          company: fullName || "ลูกค้าทั่วไป",
          contact: "-",
          phone: "-",
          email: "-",
          address: "-",
          delivery: "-",
          revise_from: null,
        };
      }

      // ⚠️ mirror ของ calcNetPrice()/calcLineTotal() ใน utils/pricing.ts
      // หน้านี้เป็น vanilla JS ไม่มี bundler (ตาม AGENTS.md) จึง import ไม่ได้
      // เป็น duplication จุดเดียวที่ยอมรับโดยตั้งใจ — แก้สูตรที่ utils/pricing.ts แล้วต้องมา sync ที่นี่ด้วยมือ
      function calcItemTotal(item) {
        const net =
          item.price *
          (1 - (item.discount_1 || 0) / 100) *
          (1 - (item.discount_2 || 0) / 100);
        return item.quantity * net;
      }
      function calcQuoteTotal(quote) {
        return quote.items.reduce((s, i) => s + calcItemTotal(i), 0);
      }

      function shouldUseGlobalDiscount(quote) {
        if (!quote.items || quote.items.length === 0) return true;
        const d1 = quote.items[0].discount_1 || 0;
        const d2 = quote.items[0].discount_2 || 0;
        for (let i = 1; i < quote.items.length; i++) {
          if (
            (quote.items[i].discount_1 || 0) !== d1 ||
            (quote.items[i].discount_2 || 0) !== d2
          )
            return false;
        }
        return true;
      }

      function checkDirty() {
        hasChanges =
          JSON.stringify(quotesData.map((q) => q.items)) !==
            JSON.stringify(originalData.map((q) => q.items)) ||
          JSON.stringify(quotesData.map((q) => q.customer_name)) !==
            JSON.stringify(originalData.map((q) => q.customer_name));
      }

      // ── Render ──
      function render() {
        quotesContainer.innerHTML = "";
        if (quotesData.length === 0) {
          quotesContainer.innerHTML = `<div class="empty-state"><div class="icon">📭</div><div class="msg">ไม่พบข้อมูลใบเสนอราคา</div></div>`;
          return;
        }

        const firstQuote = quotesData[0];
        const meta = parseCustomerMeta(firstQuote);
        const isRevision = !!meta.revise_from;

        let revisionIndicatorHtml = "";
        if (isRevision) {
          revisionIndicatorHtml = `
          <div class="revision-banner">
            🔄 แก้ไขใบเสนอราคาเลขที่: <b>${meta.revise_from}</b>
          </div>`;
        }

        const custCard = document.createElement("div");
        custCard.className = "quote-card";
        custCard.innerHTML = `
        <div class="card-header customer-hdr">
          <span>🏢 ข้อมูลลูกค้า / Customer Info</span>
        </div>
        <div class="card-body">
          ${revisionIndicatorHtml}
          <div class="customer-selection-box">
            <div class="section-title" style="font-size:13px; margin-bottom:8px;">🏢 ค้นหาและเลือกลูกค้า</div>
            <div class="search-wrapper" style="margin-bottom:10px;">
              <input type="text" class="edit-input company-search-input" id="company-search-global"
                placeholder="🔍 พิมพ์ชื่อบริษัทเพื่อค้นหา..."
                style="max-width:none; width:100%; font-size:13px; padding-right:34px;"
                value="${meta.company !== "ลูกค้าทั่วไป" ? meta.company : ""}"
                ${isRevision ? 'disabled style="opacity:0.6;cursor:not-allowed;pointer-events:none;background:var(--green-pale);"' : ""}>
              <button class="search-clear" id="clear-company-global" style="${isRevision ? "display:none !important;" : ""}">✕</button>
              <div class="search-results-dropdown company-search-dropdown" id="company-results-global"></div>
            </div>
            <div class="contact-selection-wrapper">
              <div class="section-title" style="font-size:12px; margin-bottom:4px;">👤 เลือกผู้ติดต่อ</div>
              <select class="edit-input contact-select" id="contact-select-global"
                style="max-width:none; width:100%; font-size:13px;"
                ${isRevision ? 'disabled style="opacity:0.6;cursor:not-allowed;pointer-events:none;background:var(--green-pale);"' : ""}>
                <option value="">-- กำลังโหลดผู้ติดต่อ... --</option>
              </select>
              <div id="contact-warning-global" style="display:none; color:var(--danger); font-size:11px; font-weight:700; margin-top:4px;"></div>
            </div>
          </div>
          <div class="info-grid" id="customer-details-global"></div>

              <div class="disc-group">

                  value="${quote.items[0]?.discount_2 || 0}" data-q="${qIdx}" data-field="discount_2" placeholder="0"
                  ${isGlobalActive ? "" : "disabled"}>

            searchInput.addEventListener("focus", onSearchInput);

        validateContactsAndEnableConfirm();

      function renderItems(qIdx) {
        const container = document.getElementById(`items-${qIdx}`);
        const quote = quotesData[qIdx];
        if (quote.useGlobalDiscount === undefined)
          quote.useGlobalDiscount = shouldUseGlobalDiscount(quote);

        container.innerHTML = "";

        if (quote.items.length === 0) {
          container.innerHTML = `
          <div class="empty-state" style="padding:24px 16px;">
            <div class="icon">🛒</div>
            <div class="msg">ยังไม่มีสินค้าในใบนี้<br>ค้นหาด้านล่างเพื่อเพิ่มสินค้า</div>

          return;
        }

        quote.items.forEach((item, idx) => {
          const itemTotal = calcItemTotal(item);

          const discountText = formatNumber(originalTotal - itemTotal, 2);

          const remaining = stock - item.quantity;
          const stockClass = remaining < 0 ? "out-of-stock" : "in-stock";

            remaining < 0
              ? `ไม่พอคงเหลือ ${stock} ชิ้น`
              : `พร้อมส่ง ${stock}`;

          const itemEl = document.createElement("div");

            <span class="item-index">${idx + 1}</span>
            <span class="item-code">${item.model || item.product_code}</span>
            <span class="stock-warning-container">
              <span class="item-stock-badge ${stockClass}">${stockText}</span>
            </span>
            <button type="button" class="btn-delete-item" data-q="${qIdx}" data-i="${idx}" title="ลบรายการ">🗑️</button>
          </div>

          <!-- BODY -->
          <div class="item-body">

            <!-- ROW 1: ราคา/หน่วย + จำนวน (2 คอลัมน์เคียงคู่กัน) -->

              <div class="item-pq-col price-col">
                <span class="item-field-label">ราคา/หน่วย</span>
                <input type="number" class="edit-input inp-price item-price-input"
                  min="0" step="any"
                  value="${item.price}"
                  data-q="${qIdx}" data-i="${idx}" data-field="price">
              </div>
              <div class="item-pq-col qty-col">
                <span class="item-field-label">จำนวน</span>
                <div class="qty-control compact">
                  <button type="button" class="qty-btn btn-minus" data-q="${qIdx}" data-i="${idx}">−</button>
                  <input type="number" class="edit-input qty-input" min="1"
                    value="${item.quantity}" data-q="${qIdx}" data-i="${idx}" data-field="quantity">
                  <button type="button" class="qty-btn btn-plus" data-q="${qIdx}" data-i="${idx}">+</button>
                </div>
              </div>
            </div>

            <!-- ROW 2: ส่วนลด -->
            <div class="item-disc-row">
              <span class="item-field-label" style="flex-shrink:0;">ส่วนลด</span>
              <div class="disc-inputs-group">
                <input type="number" class="edit-input inp-disc item-discount-input"
                  min="0" max="100" step="0.1"
                  value="${item.discount_1 || 0}"
                  data-q="${qIdx}" data-i="${idx}" data-field="discount_1" placeholder="0"
                  ${isGlobalActive ? "disabled" : ""}>
                <span class="disc-separator">+</span>
                <input type="number" class="edit-input inp-disc item-discount-input"
                  min="0" max="100" step="0.1"
                  value="${item.discount_2 || 0}"
                  data-q="${qIdx}" data-i="${idx}" data-field="discount_2" placeholder="0"
                  ${isGlobalActive ? "disabled" : ""}>
                <span class="disc-unit">%</span>
              </div>
              <span class="item-discount-baht item-discount-baht-chip">-฿${discountText}</span>
            </div>

            <!-- ROW 3: ยอดรวม -->
            <div class="item-total-row">
              <span class="item-field-label" style="font-weight: 600; color: var(--text-mid);">ยอดรวม</span>
              <span class="item-total item-total-chip">฿${formatNumber(itemTotal, 2)}</span>
            </div>

            <!-- ROW 4: หมายเหตุ -->
            <input type="text" class="edit-input inp-remark item-remark-input"
              placeholder="📝 หมายเหตุ / รายละเอียดเพิ่มเติม..."
              value="${item.remark || ""}"
              data-q="${qIdx}" data-i="${idx}" data-field="remark">

          </div>
        `;
          container.appendChild(itemEl);
        });

        container
          .querySelectorAll(".edit-input")
          .forEach((input) => input.addEventListener("input", onFieldChange));
        container
          .querySelectorAll(".btn-delete-item")
          .forEach((btn) => btn.addEventListener("click", onDeleteItem));
        container
          .querySelectorAll(".btn-minus")
          .forEach((btn) => btn.addEventListener("click", onQtyMinus));
        container
          .querySelectorAll(".btn-plus")
          .forEach((btn) => btn.addEventListener("click", onQtyPlus));
      }

      function onQtyMinus(e) {
        const input = e.currentTarget.parentNode.querySelector(".qty-input");
        let v = parseInt(input.value) || 1;
        if (v > 1) {
          input.value = v - 1;
          input.dispatchEvent(new Event("input", { bubbles: true }));
        }
      }
      function onQtyPlus(e) {
        const input = e.currentTarget.parentNode.querySelector(".qty-input");
        let v = parseInt(input.value) || 1;
        input.value = v + 1;
        input.dispatchEvent(new Event("input", { bubbles: true }));
      }

      function onGlobalDiscountChange(e) {
        const qIdx = parseInt(e.target.dataset.q);
        const field = e.target.dataset.field;
        let val = Math.max(0, Math.min(100, parseFloat(e.target.value) || 0));
        quotesData[qIdx].items.forEach((item) => {
          if (field === "discount_1") item.discount_1 = val;
          else if (field === "discount_2") item.discount_2 = val;
        });
        renderItems(qIdx);
        const totalEl = document.getElementById(`total-${qIdx}`);
        if (totalEl)
          totalEl.textContent = `฿${formatNumber(calcQuoteTotal(quotesData[qIdx]), 2)}`;
        checkDirty();
        triggerAutoSave();
      }

      function onCheckboxChange(e) {
        const qIdx = parseInt(e.target.dataset.q);
        const quote = quotesData[qIdx];
        quote.useGlobalDiscount = e.target.checked;

        if (e.target.checked) {
          const d1 = quote.items[0]?.discount_1 || 0;
          const d2 = quote.items[0]?.discount_2 || 0;
          quote.items.forEach((item) => {
            item.discount_1 = d1;
            item.discount_2 = d2;
          });
        }

        // Refactor จากเดิมที่เป็น render(); ให้กลายเป็น:
        renderItems(qIdx);

        // คอยอัปเดตสถานะการปิด/เปิดใช้งาน Input ของส่วนลดหลักประจำการ์ดนั้นๆ
        const card = e.target.closest(".quote-card");
        if (card) {
          card.querySelectorAll(".global-discount-input").forEach((input) => {
            input.disabled = !e.target.checked;
          });
        }

        triggerAutoSave();
      }

      function onFieldChange(e) {
        const qIdx = parseInt(e.target.dataset.q);
        const iIdx = parseInt(e.target.dataset.i);
        const field = e.target.dataset.field;
        if (field === "remark") {
          quotesData[qIdx].items[iIdx].remark = e.target.value;
          checkDirty();
          triggerAutoSave();
          return;
        }
        let val = parseFloat(e.target.value) || 0;
        if (field === "quantity") {
          val = Math.max(1, Math.round(val));
          const item = quotesData[qIdx].items[iIdx];
          if (
            item.quantity <= (Number(item.stock) || 0) &&
            val > (Number(item.stock) || 0)
          ) {
            showCustomAlert(
              `ระวัง: สินค้าไม่เพียงพอ (พร้อมส่ง ${item.stock} ชิ้น, ต้องการ ${val} ชิ้น) ขาดอีก ${val - item.stock} ชิ้นจะต้องรอการผลิตหรือสั่งซื้อ`,
            );
          }
          item.quantity = val;
        } else if (field === "price") {
          val = Math.max(0, val);
          quotesData[qIdx].items[iIdx].price = val;
        } else if (field === "discount_1") {
          val = Math.max(0, Math.min(100, val));
          quotesData[qIdx].items[iIdx].discount_1 = val;
        } else if (field === "discount_2") {
          val = Math.max(0, Math.min(100, val));
          quotesData[qIdx].items[iIdx].discount_2 = val;
        }

        const totalEl = document.getElementById(`total-${qIdx}`);
        if (totalEl)
          totalEl.textContent = `฿${formatNumber(calcQuoteTotal(quotesData[qIdx]), 2)}`;

        const itemTotal = calcItemTotal(quotesData[qIdx].items[iIdx]);
        const itemCard = e.target.closest(".item-card");
        if (itemCard) {
          const el = itemCard.querySelector(".item-total");
          if (el) el.textContent = `฿${formatNumber(itemTotal, 2)}`;
          const item = quotesData[qIdx].items[iIdx];
          const discEl = itemCard.querySelector(".item-discount-baht");
          if (discEl)
            discEl.textContent = `-฿${formatNumber(item.price * item.quantity - itemTotal, 2)}`;
          const stock = Number(item.stock) || 0;
          const stockEl = itemCard.querySelector(".item-stock-badge");
          if (stockEl) {
            const rem = stock - item.quantity;
            stockEl.className = `item-stock-badge ${rem < 0 ? "out-of-stock" : "in-stock"}`;
            stockEl.textContent =
              rem < 0 ? `ไม่พอคงเหลือ ${stock} ชิ้น` : `พร้อมส่ง ${stock}`;
          }
        }
        checkDirty();
        triggerAutoSave();
      }

      async function onDeleteItem(e) {
        const qIdx = parseInt(e.target.dataset.q);
        const iIdx = parseInt(e.target.dataset.i);
        const item = quotesData[qIdx].items[iIdx];
        const confirmed = await showCustomConfirm(
          "ลบรายการสินค้า",
          `ต้องการลบรายการ "${item.model || item.product_code}" ออกจากใบเสนอราคานี้หรือไม่?`,
          { isDestructive: true, okText: "ลบรายการ", icon: "🗑️" },
        );
        if (!confirmed) return;
        quotesData[qIdx].items.splice(iIdx, 1);
        // ไม่ยกเลิกใบอัตโนมัติเมื่อสินค้าหมด — เก็บการ์ดไว้ในสถานะว่างให้เพิ่มสินค้ากลับได้
        // (ใบว่างจะถูกเก็บกวาดตอนกดยืนยัน ดู confirmQuotes)
        render();
        triggerAutoSave();
      }

      // fetch ที่มี timeout กันหน้าค้างไม่รู้จบเมื่อ backend ช้า/ตัน (default 20 วิ)
      async function fetchWithTimeout(url, options = {}, ms = 20000) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), ms);
        try {
          return await fetch(url, { ...options, signal: controller.signal });
        } finally {
          clearTimeout(timer);
        }
      }

      async function cancelSingleQuote(quoteId) {
        try {
          await fetchWithTimeout(`/api/quotation/${quoteId}/cancel`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userId }),
          });
        } catch (e) {
          console.error("Cancel quote error:", e);
        }
      }

      let autoSaveTimeout = null,
        isSaving = false;

      function triggerAutoSave() {
        updateAllSaveStatus("⏳ กำลังบันทึก...", "saving");
        hasChanges = true;
        if (autoSaveTimeout) clearTimeout(autoSaveTimeout);
        autoSaveTimeout = setTimeout(async () => {
          try {
            await silentSaveChanges();
            updateAllSaveStatus("✓ บันทึกสำเร็จ", "saved");
            await refetchQuotationDataSilently();
          } catch (err) {
            if (err && err.isConflict) {
              // ใบถูกยืนยัน/ยกเลิกไปแล้ว — โหลดหน้าใหม่ ไม่ปล่อยให้ค้างแก้ไขต่อไม่ได้
              hasChanges = false;
              updateAllSaveStatus("⚠️ ใบถูกยืนยัน/ยกเลิกแล้ว", "error");
              showToast(err.message + " กำลังโหลดใหม่...", "error");
              setTimeout(() => location.reload(), 2000);
              return;
            }
            updateAllSaveStatus("⚠️ บันทึกไม่สำเร็จ", "error");
          }
        }, 1000);
      }

      function updateAllSaveStatus(text, cls) {
        quotesData.forEach((_, qIdx) => {
          const el = document.getElementById(`save-status-${qIdx}`);
          if (el) {
            el.textContent = text;
            el.className = `save-status ${cls}`;
          }
        });
      }

      async function silentSaveChanges() {
        isSaving = true;
        try {
          for (const quote of quotesData) {
            const totalSum = calcQuoteTotal(quote);
            const meta = parseCustomerMeta(quote);
            const companyEl = document.getElementById("company-search-global");
            const contactEl = document.getElementById("contact-select-global");
            let cleanCompany = companyEl ? companyEl.value.trim() : "";
            let cleanContact = contactEl ? contactEl.value.trim() : "";
            if (!companyEl || !contactEl) {
              cleanCompany = meta.company;
              cleanContact = meta.contact;
            }
            if (!cleanCompany) cleanCompany = "ลูกค้าทั่วไป";
            if (!cleanContact) cleanContact = "-";
            const payload = {
              items: quote.items,
              total_sum: totalSum,
              customer_id: quote.customer_id || null,
              contact_id: quote.contact_id || null,
              userId,
            };
            payload.customer_name = meta.revise_from
              ? `${cleanCompany} | ${cleanContact} | revise_from=${meta.revise_from}`
              : `${cleanCompany} | ${cleanContact}`;
            const resp = await fetchWithTimeout(`/api/quotation/${quote.id}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            if (resp.status === 409) {
              // ใบถูกยืนยัน/ยกเลิกไปแล้วระหว่างแก้ไข — แจ้งผู้ใช้แล้วปิดหน้า ไม่ปล่อยให้ค้าง
              const body = await resp.json().catch(() => ({}));
              const conflictErr = new Error(body.error || "ใบเสนอราคานี้ถูกยืนยันหรือยกเลิกไปแล้ว");
              conflictErr.isConflict = true;
              throw conflictErr;
            }
            if (!resp.ok) throw new Error("Network response was not ok");
          }
          originalData = JSON.parse(JSON.stringify(quotesData));
          hasChanges = false;
        } catch (err) {
          console.error("Silent save error:", err);
          throw err;
        } finally {
          isSaving = false;
        }
      }

      function updateCustomerDetailsUI() {
        if (!quotesData.length) return;
        const meta = parseCustomerMeta(quotesData[0]);
        const container = document.getElementById("customer-details-global");
        if (!container) return;
        container.innerHTML = `
        <div class="info-row"><span class="info-label">🏢 บริษัท</span><span class="info-value">${meta.company}</span></div>
        <div class="info-row"><span class="info-label">👤 ผู้ติดต่อ</span><span class="info-value">${meta.contact}</span></div>
        <div class="info-row"><span class="info-label">📞 โทรศัพท์</span><span class="info-value">${meta.phone}</span></div>
        <div class="info-row"><span class="info-label">📧 อีเมล</span><span class="info-value">${meta.email}</span></div>
        <div class="info-row"><span class="info-label">🏠 ที่อยู่</span><span class="info-value">${meta.address}</span></div>
        <div class="info-row"><span class="info-label">🚚 สถานที่ส่ง</span><span class="info-value">${meta.delivery}</span></div>
      `;
      }

      async function fetchAndRenderContacts(customerId, selectedContactName) {
        const selectEl = document.getElementById("contact-select-global");
        const warningEl = document.getElementById("contact-warning-global");
        if (!selectEl) return;
        const meta = parseCustomerMeta(quotesData[0]);
        const isRevision = !!meta.revise_from;
        if (!customerId) {
          if (isRevision && selectedContactName) {
            selectEl.innerHTML = `<option value="${selectedContactName}" selected>${selectedContactName}</option>`;
            if (warningEl) warningEl.style.display = "none";
          } else {
            selectEl.innerHTML =
              '<option value="">-- กรุณาเลือกบริษัทก่อน --</option>';
            if (warningEl) {
              warningEl.textContent = "⚠️ กรุณาค้นหาและเลือกบริษัทจากระบบ";
              warningEl.style.display = "block";
            }
          }
          validateContactsAndEnableConfirm();
          return;
        }
        try {
          const resp = await fetch(`/api/customer/${customerId}/contacts`);
          if (!resp.ok) throw new Error("Failed to fetch contacts");
          const contacts = await resp.json();
          globalContacts = contacts || [];
          selectEl.innerHTML = "";
          const defOpt = document.createElement("option");
          defOpt.value = "";
          defOpt.textContent = "-- เลือกผู้ติดต่อ --";
          selectEl.appendChild(defOpt);
          let matched = false;
          contacts.forEach((c) => {
            const opt = document.createElement("option");
            opt.value = c.name;
            opt.textContent = c.name;
            if (c.name === selectedContactName) {
              opt.selected = true;
              matched = true;
              quotesData.forEach(q => q.contact_id = c.id);
            }
            selectEl.appendChild(opt);
          });
          if (!matched && selectedContactName) {
            const opt = document.createElement("option");
            opt.value = selectedContactName;
            opt.textContent = selectedContactName;
            opt.selected = true;
            selectEl.appendChild(opt);
            matched = true;
          }
          if (contacts.length === 0 && !isRevision) {
            selectEl.innerHTML =
              '<option value="">-- ไม่พบข้อมูลผู้ติดต่อในระบบ --</option>';
            if (warningEl) {
              warningEl.textContent =
                "⚠️ ไม่พบข้อมูลผู้ติดต่อของบริษัทนี้ในระบบ กรุณาติดต่อแอดมินเพื่อเพิ่มข้อมูล";
              warningEl.style.display = "block";
            }
          } else if (warningEl) {
            warningEl.style.display = "none";
          }
        } catch (err) {
          console.error("Error fetching contacts:", err);
          if (isRevision && selectedContactName)
            selectEl.innerHTML = `<option value="${selectedContactName}" selected>${selectedContactName}</option>`;
          else
            selectEl.innerHTML =
              '<option value="">-- เกิดข้อผิดพลาดในการโหลดผู้ติดต่อ --</option>';
        } finally {
          validateContactsAndEnableConfirm();
        }
      }

      function validateContactsAndEnableConfirm() {
        const selectEl = document.getElementById("contact-select-global");
        const warningEl = document.getElementById("contact-warning-global");
        if (!quotesData[0]) return;
        const meta = parseCustomerMeta(quotesData[0]);
        // ต้องมีสินค้าอย่างน้อย 1 รายการในบางใบ ถึงจะกดยืนยันได้
        const hasAnyItems = quotesData.some(
          (q) => q.items && q.items.length > 0,
        );
        if (meta.revise_from) {
          if (warningEl) warningEl.style.display = "none";
          if (btnConfirm) {
            btnConfirm.disabled = !hasAnyItems;
            btnConfirm.style.opacity = hasAnyItems ? "1" : "0.5";
            btnConfirm.style.pointerEvents = hasAnyItems ? "auto" : "none";
          }
          return;
        }
        let allValid = hasAnyItems;
        if (!quotesData[0].customer_id) {
          allValid = false;
          if (warningEl) {
            warningEl.textContent = "⚠️ กรุณาค้นหาและเลือกบริษัทจากระบบ";
            warningEl.style.display = "block";
          }
        } else {
          const contactVal = selectEl ? selectEl.value : "";
          if (!contactVal) {
            allValid = false;
            if (warningEl) {
              warningEl.textContent =
                selectEl && selectEl.options.length <= 1
                  ? "⚠️ ไม่พบข้อมูลผู้ติดต่อของบริษัทนี้ในระบบ กรุณาติดต่อแอดมินเพื่อเพิ่มข้อมูล"
                  : "⚠️ กรุณาเลือกผู้ติดต่อจากดรอปดาวน์";
              warningEl.style.display = "block";
            }
          } else if (warningEl) {
            warningEl.style.display = "none";
          }
        }
        if (btnConfirm) {
          btnConfirm.disabled = !allValid;
          btnConfirm.style.opacity = allValid ? "1" : "0.5";
          btnConfirm.style.pointerEvents = allValid ? "auto" : "none";
        }
      }

      async function refetchQuotationDataSilently() {
        try {
          const quoteIds = quotesData.map((q) => q.id).join(",");
          const resp = await fetch(
            `/api/quotations?ids=${encodeURIComponent(quoteIds)}`,
          );
          if (resp.ok) {
            const data = await resp.json();
            data.forEach((updated) => {
              const local = quotesData.find((q) => q.id === updated.id);
              if (local) {
                Object.assign(local, {
                  customer_name: updated.customer_name,
                  customer_id: updated.customer_id,
                  contact_id: updated.contact_id,
                  customer_code: updated.customer_code,
                  customer_tax_id: updated.customer_tax_id,
                  contact_name: updated.contact_name,
                  contact_phone: updated.contact_phone,
                  contact_email: updated.contact_email,
                  contact_address: updated.contact_address,
                  delivery_address: updated.delivery_address,
                });
              }
            });
            originalData = JSON.parse(JSON.stringify(quotesData));
            updateCustomerDetailsUI();
          }
        } catch (err) {
          console.error("Refetch error:", err);
        }
      }

      async function addProductToQuote(prod, qIdx) {
        const targetIsTht = prod.quote_company === "THT";

        const targetQIdx = quotesData.findIndex((q) => {
          return (q.quote_company === "THT") === targetIsTht;
        });

        // สร้าง item ใหม่ก่อน (ใช้ item แรกของใบเป้าหมายเพื่อ inherit ส่วนลด; ใบใหม่ = 0)
        const stock = Number(prod.stock) || 0;
        const refQuote = targetQIdx !== -1 ? quotesData[targetQIdx] : null;
        const first = refQuote && refQuote.items ? refQuote.items[0] : null;
        const newItem = {
          product_id: prod.product_id, // ★ กุญแจหลักที่ backend ใช้คัดกรอง/validate — ห้ามหาย
          internal_reference: prod.internal_reference || "",
          brand: prod.brand || "",
          product_code: prod.code,
          model: prod.code,
          name: prod.name,
          quantity: 1,
          price: prod.price,
          discount_1: first ? first.discount_1 || 0 : 0,
          discount_2: first ? first.discount_2 || 0 : 0,
          production: prod.production || "",
          stock,
          product_sub_category: prod.category || "",
          sales_description: prod.sales_description || "",
        };
        if (1 > stock)
          showCustomAlert(
            `ระวัง: สินค้าไม่เพียงพอ (พร้อมส่ง ${stock} ชิ้น, ต้องการ 1 ชิ้น) ขาดอีก ${1 - stock} ชิ้นจะต้องรอการผลิตหรือสั่งซื้อ`,
          );

        // ── ไม่มีใบของบริษัทสินค้านี้ → แยกใบใหม่ (สร้างพร้อมสินค้าเลย + ห้ามลบ draft เดิม) ──
        if (targetQIdx === -1) {
          updateAllSaveStatus("⏳ กำลังแยกใบเสนอราคาใหม่...", "saving");
          try {
            const firstQuote = quotesData[0];
            const meta = parseCustomerMeta(firstQuote);
            const companyEl = document.getElementById("company-search-global");
            const contactEl = document.getElementById("contact-select-global");
            let cleanCompany = companyEl ? companyEl.value.trim() : "";
            let cleanContact = contactEl ? contactEl.value.trim() : "";
            if (!companyEl || !contactEl) {
              cleanCompany = meta.company;
              cleanContact = meta.contact;
            }
            if (!cleanCompany) cleanCompany = "ลูกค้าทั่วไป";
            if (!cleanContact) cleanContact = "-";

            const customerName = meta.revise_from
              ? `${cleanCompany} | ${cleanContact} | revise_from=${meta.revise_from}`
              : `${cleanCompany} | ${cleanContact}`;

            const resp = await fetch("/api/quotations", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                userId: firstQuote.user_id || userId, // ★ สร้างใบใหม่ภายใต้เจ้าของใบเดิม (salesperson ที่ valid) ไม่ใช่ผู้เปิด LIFF (กัน FK 23503)
                customerName,
                customerId: firstQuote.customer_id || null,
                contactId: firstQuote.contact_id || null,
                status: "draft",
                items: [newItem], // ★ ส่งสินค้าไปกับการสร้างเลย (กัน 500 จาก items ว่าง)
                preserveDrafts: true, // ★ ห้ามลบ draft เดิม (ใบที่กำลังแก้อยู่)
              }),
            });
            if (!resp.ok)
              throw new Error("Failed to create new quotation on server");

            const newQuote = await resp.json();
            quotesData.push(newQuote); // ใบใหม่มีสินค้าอยู่แล้ว ไม่ต้อง push ซ้ำ

            const url = new URL(window.location);
            url.searchParams.set(
              "quoteIds",
              quotesData.map((q) => q.id).join(","),
            );
            window.history.replaceState({}, "", url);

            showToast(
              "➕ แยกใบเสนอราคาใหม่สำหรับสินค้า " +
                (targetIsTht ? "THT" : "PM"),
            );
            render();
            triggerAutoSave();
          } catch (err) {
            console.error("Create new quotation error:", err);
            showToast("❌ ไม่สามารถแยกใบเสนอราคาได้: " + err.message, "error");
            updateAllSaveStatus("⚠️ บันทึกไม่สำเร็จ", "error");
          }
          return;
        }

        // ── มีใบของบริษัทนี้แล้ว → เพิ่มเข้าใบนั้น ──
        const quote = quotesData[targetQIdx];
        if (!quote.items) quote.items = [];
        quote.items.push(newItem);
        render();
        triggerAutoSave();
      }

          });
        }

        // 🏢 2. สำหรับดร็อปดาวน์ค้นหาบริษัทลูกค้า
        // ถ้าไม่ได้คลิกที่ช่อง Input บริษัท และไม่ได้คลิก "ภายใน" กล่องดร็อปดาวน์บริษัท -> ให้สั่งปิด
        if (

            "company-results-global",
