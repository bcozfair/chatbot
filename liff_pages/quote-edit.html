      async function confirmQuotes() {
        // ต้องมีสินค้าอย่างน้อย 1 รายการ (backup เผื่อสถานะปุ่มไม่ sync)
        if (!quotesData.some((q) => q.items && q.items.length > 0)) {
          showCustomAlert("กรุณาเพิ่มสินค้าอย่างน้อย 1 รายการก่อนยืนยัน");
          return;
        }
        if (autoSaveTimeout || hasChanges) {
          if (autoSaveTimeout) clearTimeout(autoSaveTimeout);
          updateAllSaveStatus("⏳ กำลังบันทึก...", "saving");
          try {
            await silentSaveChanges();
            updateAllSaveStatus("✓ บันทึกสำเร็จ", "saved");
          } catch (err) {
            updateAllSaveStatus("⚠️ บันทึกไม่สำเร็จ", "error");
            showToast(
              "❌ ไม่สามารถยืนยันได้เนื่องจากบันทึกข้อมูลล้มเหลว: " +
                err.message,
              "error",
            );
            return;
          }
        }
        btnConfirm.disabled = true;
        btnConfirm.innerHTML = "⏳ กำลังยืนยัน...";
        loaderText.textContent = "กำลังยืนยันและออกเลขที่ใบเสนอราคา...";
        loaderScreen.style.opacity = "1";
        loaderScreen.style.pointerEvents = "auto";
        loaderScreen.style.display = "flex";
        try {
          // เก็บกวาดใบที่ว่าง (เช่นเคส PM+THT ที่ล้างสินค้าไปใบหนึ่ง) ก่อนยืนยัน
          const emptyQuotes = quotesData.filter(
            (q) => !q.items || q.items.length === 0,
          );
          for (const q of emptyQuotes) {
            await cancelSingleQuote(q.id);
          }
          if (emptyQuotes.length > 0) {
            const emptyIds = new Set(emptyQuotes.map((q) => q.id));
            quotesData = quotesData.filter((q) => !emptyIds.has(q.id));
            originalData = originalData.filter((q) => !emptyIds.has(q.id));
          }
          // ยืนยันทีละใบ แต่ไม่ทิ้งใบที่สำเร็จเมื่อใบถัดไปพัง (การยืนยันเป็น idempotent ฝั่ง server
          // อยู่แล้ว ลองใหม่ได้ปลอดภัย) — เก็บผลสำเร็จไว้ ส่วนใบที่พังค่อยเตือนตอนท้าย
          const results = [];
          const failures = [];
          for (const quote of quotesData) {
            try {
              const resp = await fetchWithTimeout(`/api/quotation/${quote.id}/confirm`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ userId }),
              });
              if (!resp.ok) {
                const errBody = await resp.json().catch(() => ({}));
                failures.push(errBody.error || `เซิร์ฟเวอร์ตอบกลับรหัสสถานะ: ${resp.status}`);
                continue;
              }
              results.push(await resp.json());
            } catch (e) {
              failures.push(
                e.name === "AbortError" ? "หมดเวลาเชื่อมต่อ กรุณาลองใหม่อีกครั้ง" : (e.message || String(e)),
              );
            }
          }
          if (results.length === 0) {
            // ไม่มีใบไหนสำเร็จเลย → โยน error ให้ catch ด้านล่างแสดงผล
            throw new Error(failures[0] || "ยืนยันไม่สำเร็จ");
          }
          if (failures.length > 0) {
            showToast("⚠️ บางใบยืนยันไม่สำเร็จ: " + failures.join("; "), "error");
          }
          const quoteNos = results
            .map((r) => r.quotation_no)
            .filter(Boolean)
            .join(", ");
          const triggerMessage = `📄 ยืนยันใบเสนอราคาสำเร็จ\n(เลขที่: ${quoteNos})`;

          // ── แจ้งผล/ปิดหน้าต่าง ให้ได้ผลลัพธ์เหมือนกันทั้งมือถือ & LINE PC ──
          const os = (() => {
            try {
              return liff.getOS();
            } catch (e) {
              return "web";
            }
          })();
          const mobileInClient =
            liff.isInClient() && (os === "ios" || os === "android");

          if (mobileInClient) {
            // มือถือใน LINE: auto ส่ง trigger (บอท reply PDF) แล้วปิดหน้าเอง
            let sent = false;
            try {
              await liff.sendMessages([{ type: "text", text: triggerMessage }]);
              sent = true;
            } catch (e) {
              console.error("sendMessages error:", e);
            }
            if (sent) {
              liff.closeWindow();
              return;
            }
            // auto ส่งไม่ได้ → ตกไปแสดง modal (กันหน้าค้าง)
          }

          // LINE PC / web / เบราว์เซอร์นอก (หรือมือถือที่ auto ส่งไม่ได้):
          // แสดง modal ให้ผู้ใช้กดปุ่มส่งเข้าแชทเอง (user gesture) + มีลิงก์ PDF สำรอง
          loaderScreen.style.display = "none";
          showConfirmSuccessModal(results, triggerMessage);
        } catch (err) {
          console.error("Confirm error:", err);
          showToast("❌ ยืนยันไม่สำเร็จ: " + err.message, "error");
          loaderScreen.style.display = "none";
          btnConfirm.disabled = false;
          btnConfirm.innerHTML = "✅ ยืนยัน";
        }
      }

      async function cancelQuotes() {
        const confirmed = await showCustomConfirm(
          "ยกเลิกใบเสนอราคา",
          "ต้องการยกเลิกใบเสนอราคาทั้งหมดหรือไม่? การดำเนินการนี้ไม่สามารถย้อนกลับได้",
          {
            isDestructive: true,
            okText: "ยกเลิก",
            cancelText: "ย้อนกลับ",
            icon: "⚠️",
          },
        );
        if (!confirmed) return;
        btnCancel.disabled = true;
        loaderText.textContent = "กำลังยกเลิก...";
        loaderScreen.style.opacity = "1";
        loaderScreen.style.pointerEvents = "auto";
        loaderScreen.style.display = "flex";
        try {
          for (const quote of quotesData)
            await fetchWithTimeout(`/api/quotation/${quote.id}/cancel`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ userId }),
            });
          if (liff.isInClient()) {
            try {
              await liff.sendMessages([
                {
                  type: "text",
                  text: "❌ ยกเลิกการออกใบเสนอราคาเรียบร้อยแล้ว",
                },
              ]);
            } catch (e) {
              console.error("sendMessages error:", e);
            }
          }
          loaderText.innerHTML =
            '<span style="color:var(--danger)">❌</span> ยกเลิกเรียบร้อยแล้ว';
          setTimeout(() => {
            if (liff.isInClient()) {
              liff.closeWindow();
            } else {
              window.open("", "_self", "");
              window.close();
            }
          }, 1200);
        } catch (err) {
          console.error("Cancel error:", err);
          showToast("❌ ยกเลิกไม่สำเร็จ", "error");
          loaderScreen.style.display = "none";
          btnCancel.disabled = false;
        }
      }

      btnConfirm.addEventListener("click", confirmQuotes);
      btnCancel.addEventListener("click", cancelQuotes);

      async function initLIFF() {
        try {
          let urlParams = new URLSearchParams(window.location.search);
          let quoteIds = urlParams.get("quoteIds");
          await liff.init({ liffId: "__LIFF_ID__" });
          if (!quoteIds) {
            urlParams = new URLSearchParams(window.location.search);
            quoteIds = urlParams.get("quoteIds");
          }
          if (!quoteIds) {
            const stateQuery = new URLSearchParams(window.location.search).get(
              "liff.state",
            );
            if (stateQuery) {
              const qi = stateQuery.indexOf("?");
              if (qi !== -1)
                quoteIds = new URLSearchParams(stateQuery.substring(qi)).get(
                  "quoteIds",
                );
            }
          }
          if (!quoteIds)
            throw new Error("ไม่พบข้อมูลใบเสนอราคา (quoteIds missing)");
          if (!liff.isLoggedIn()) {
            liff.login();
            return;
          }
          let urlUserId = urlParams.get("userId");
          if (urlUserId) userId = urlUserId;
          if (!userId) {
            try {
              const profile = await liff.getProfile();
              userId = profile.userId;
            } catch (e) {
              console.error("getProfile error:", e);
            }
          }
          loaderText.textContent = "กำลังโหลดข้อมูลใบเสนอราคา...";
          const resp = await fetch(
            `/api/quotations?ids=${encodeURIComponent(quoteIds)}`,
          );
          if (!resp.ok) throw new Error("ไม่สามารถโหลดข้อมูลได้");
          const data = await resp.json();
          if (!data || data.length === 0)
            throw new Error("ไม่พบข้อมูลใบเสนอราคา");
          const finalized = data.find(
            (q) => q.status === "confirmed" || q.status === "cancelled",
          );
          if (finalized)
            throw new Error(
              `ใบเสนอราคานี้ได้รับการ${finalized.status === "confirmed" ? "ยืนยันและออกเอกสาร" : "ยกเลิก"}ไปแล้ว ไม่สามารถแก้ไขได้`,
            );
          quotesData = data;
          originalData = JSON.parse(JSON.stringify(data));
          mainContent.style.display = "block";
          stickyFooter.style.display = "flex";
          render();
          loaderScreen.style.opacity = "0";
          setTimeout(() => (loaderScreen.style.display = "none"), 400);
        } catch (err) {
          console.error("LIFF init error:", err);
          loaderText.innerHTML = `<span style="color:var(--danger)">⚠️ โหลดระบบผิดพลาด</span><br><small style="font-size:11px;font-weight:normal">${err.message}</small>`;
        }
      }

      window.addEventListener("load", initLIFF);
    </script>
  </body>
</html>
