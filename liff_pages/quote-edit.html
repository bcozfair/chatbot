      // แปลง violation จาก /api/quotation/:id (422 VALIDATION_ERROR) เป็นข้อความที่บอกได้ว่า
      // "ติดกฎอะไร ที่รายการไหน" — warn_msg ดิบเป็นแค่ท่อนสั้น ๆ ("สินค้าหมดสต็อก") ไม่มีรุ่นสินค้า
      // ใช้ถ้อยคำชุดเดียวกับที่ flow ใน LINE ใช้ (processQuotationRequest ใน quotationService.ts)
      function formatViolation(v) {
        if (!v) return "";
        const model = v.model || v.product_code || "-";
        if (v.type === "OUT_OF_STOCK") {
          const optionalNote =
            v.is_optional && v.linked_to_model
              ? ` (สินค้าเสริมของ ${v.linked_to_model})`
              : "";
          return `📦 ห้ามเสนอราคาเมื่อไม่มีสินค้า รายการ ${model}${optionalNote}`;
        }
        if (v.type === "MIN_PRICE_VIOLATION") {
          const price = Number(v.price ?? 0).toLocaleString("en-US", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          });
          const minPrice = Number(v.min_price ?? 0).toLocaleString("en-US", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          });
          return `💰 ห้ามขายต่ำกว่าราคาขั้นต่ำ รายการ ${model} (ราคาหลังลด ฿${price} < ขั้นต่ำ ฿${minPrice})`;
        }
        if (v.type === "MOQ_VIOLATION") {
          // warn_msg ของ MOQ เป็นข้อความที่แอดมินตั้งเองในตาราง product_moq_rules — ใช้ของแอดมินก่อน
          const detail = v.warn_msg
            ? `: ${v.warn_msg}`
            : ` (สั่งขั้นต่ำ ${v.min_order_qty ?? "-"} ชิ้น, ใส่มา ${v.qty ?? "-"} ชิ้น)`;
          return `⬇️ จำนวนไม่ถึงขั้นต่ำ รายการ ${model}${detail}`;
        }
        return v.warn_msg || v.message || "";
      }

      // บันทึกทุกใบขึ้น server — เรียกจากปุ่ม "บันทึก" เท่านั้น (ไม่มี auto-save แล้ว)
      async function saveChangesToServer() {
        try {
          for (const quote of quotesData) {
            const totalSum = calcQuoteTotal(quote);
            const meta = parseCustomerMeta(quote);
            const companyEl = document.getElementById("company-search-global");
            const contactEl = document.getElementById("contact-select-global");
            let cleanCompany = companyEl ? companyEl.value.trim() : "";
            let cleanContact = contactEl ? contactEl.value.trim() : "";
            if (!companyEl || !contactEl) {
              cleanCompany = meta.company;
              cleanContact = meta.contact;
            }
            // ระบบอนุญาตเฉพาะลูกค้าที่มีในฐานข้อมูล — ไม่เติมชื่อ default ให้อีกแล้ว
            if (!cleanCompany || !cleanContact) {
              throw new Error(
                "กรุณาเลือกบริษัทและผู้ติดต่อจากระบบก่อนบันทึกครับ",
              );
            }
            const payload = {
              items: quote.items,
              total_sum: totalSum,
              customer_id: quote.customer_id || null,
              contact_id: quote.contact_id || null,
              // null = ให้ server กลับไปใช้ค่าที่คำนวณจากกฎ (ปุ่ม "ค่าอัตโนมัติ")
              delivery_days_override: deliveryOverrideDays(quote),
              userId,
            };
            payload.customer_name = meta.revise_from
              ? `${cleanCompany} | ${cleanContact} | revise_from=${meta.revise_from}`
              : `${cleanCompany} | ${cleanContact}`;
            const resp = await fetchWithTimeout(`/api/quotation/${quote.id}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            if (resp.status === 409) {
              // ใบถูกยืนยัน/ยกเลิกไปแล้วระหว่างแก้ไข — แจ้งผู้ใช้แล้วปิดหน้า ไม่ปล่อยให้ค้าง
              const body = await resp.json().catch(() => ({}));
              const conflictErr = new Error(body.error || "ใบเสนอราคานี้ถูกยืนยันหรือยกเลิกไปแล้ว");
              conflictErr.isConflict = true;
              throw conflictErr;
            }
            if (resp.status === 403) {
              // userId ที่หน้านี้ใช้ ไม่ตรงกับเจ้าของใบ (isQuotationOwner ฝั่ง server)
              throw new Error(
                "ไม่มีสิทธิ์เข้าถึงใบเสนอราคานี้ — บัญชี LINE ที่เปิดหน้านี้ไม่ตรงกับเจ้าของใบ กรุณาเปิดจากปุ่มในแชทของบัญชีที่สร้างใบนี้",
              );
            }
            if (!resp.ok) {
              // ดึงสาเหตุจริงจาก backend มาแสดง (เช่น 422 = ผิดกฎ MOQ/สต๊อก, 400 = สินค้าถูกบล็อก)
              const errBody = await resp.json().catch(() => ({}));
              const violations = Array.isArray(errBody.violations)
                ? errBody.violations.map(formatViolation).filter(Boolean)
                : [];
              throw new Error(
                violations.length
                  ? violations.join("\n")
                  : errBody.error || `เซิร์ฟเวอร์ตอบกลับรหัสสถานะ: ${resp.status}`,
              );
            }
          }
          originalData = JSON.parse(JSON.stringify(quotesData));
          hasChanges = false;
        } catch (err) {
          console.error("Save error:", err);
          throw err;
        }
      }

      async function fetchAndRenderContacts(customerId, selectedContactName) {
        const selectEl = document.getElementById("contact-select-global");
        const warningEl = document.getElementById("contact-warning-global");
        if (!selectEl) return;
        const meta = parseCustomerMeta(quotesData[0]);
        const isRevision = !!meta.revise_from;
        if (!customerId) {
          if (isRevision && selectedContactName) {
            selectEl.innerHTML = `<option value="${selectedContactName}" selected>${selectedContactName}</option>`;
            if (warningEl) warningEl.style.display = "none";
          } else {
            selectEl.innerHTML =
              '<option value="">-- กรุณาเลือกบริษัทก่อน --</option>';
            if (warningEl) {
              warningEl.textContent = "⚠️ กรุณาค้นหาและเลือกบริษัทจากระบบ";
              warningEl.style.display = "block";
            }
          }
          validateContactsAndEnableSave();
          return;
        }
        try {
          const resp = await fetch(`/api/customer/${customerId}/contacts`);
          if (!resp.ok) throw new Error("Failed to fetch contacts");
          const contacts = await resp.json();
          globalContacts = contacts || [];
          selectEl.innerHTML = "";
          const defOpt = document.createElement("option");
          defOpt.value = "";
          defOpt.textContent = "-- เลือกผู้ติดต่อ --";
          selectEl.appendChild(defOpt);
          let matched = false;
          contacts.forEach((c) => {
            const opt = document.createElement("option");
            opt.value = c.name;
            opt.textContent = c.name;
            if (c.name === selectedContactName) {
              opt.selected = true;
              matched = true;
              quotesData.forEach(q => q.contact_id = c.id);
            }
            selectEl.appendChild(opt);
          });
          if (!matched && selectedContactName) {
            const opt = document.createElement("option");
            opt.value = selectedContactName;
            opt.textContent = selectedContactName;
            opt.selected = true;
            selectEl.appendChild(opt);
            matched = true;
          }
          if (contacts.length === 0 && !isRevision) {
            selectEl.innerHTML =
              '<option value="">-- ไม่พบข้อมูลผู้ติดต่อในระบบ --</option>';
            if (warningEl) {
              warningEl.textContent =
                "⚠️ ไม่พบข้อมูลผู้ติดต่อของบริษัทนี้ในระบบ กรุณาติดต่อแอดมินเพื่อเพิ่มข้อมูล";
              warningEl.style.display = "block";
            }
          } else if (warningEl) {
            warningEl.style.display = "none";
          }
        } catch (err) {
          console.error("Error fetching contacts:", err);
          if (isRevision && selectedContactName)
            selectEl.innerHTML = `<option value="${selectedContactName}" selected>${selectedContactName}</option>`;
          else
            selectEl.innerHTML =
              '<option value="">-- เกิดข้อผิดพลาดในการโหลดผู้ติดต่อ --</option>';
        } finally {
          validateContactsAndEnableSave();
        }
      }

      function validateContactsAndEnableSave() {
        const selectEl = document.getElementById("contact-select-global");
        const warningEl = document.getElementById("contact-warning-global");
        if (!quotesData[0]) return;
        const meta = parseCustomerMeta(quotesData[0]);
        // ต้องมีสินค้าอย่างน้อย 1 รายการในบางใบ ถึงจะกดบันทึกได้
        const hasAnyItems = quotesData.some(
          (q) => q.items && q.items.length > 0,
        );
        if (meta.revise_from) {
          if (warningEl) warningEl.style.display = "none";
          if (btnSave) {
            btnSave.disabled = !hasAnyItems;
            btnSave.style.opacity = hasAnyItems ? "1" : "0.5";
            btnSave.style.pointerEvents = hasAnyItems ? "auto" : "none";
          }
          return;
        }
        let allValid = hasAnyItems;
        if (!quotesData[0].customer_id) {
          allValid = false;
          if (warningEl) {
            warningEl.textContent = "⚠️ กรุณาค้นหาและเลือกบริษัทจากระบบ";
            warningEl.style.display = "block";
          }
        } else {
          const contactVal = selectEl ? selectEl.value : "";
          if (!contactVal) {
            allValid = false;
            if (warningEl) {
              warningEl.textContent =
                selectEl && selectEl.options.length <= 1
                  ? "⚠️ ไม่พบข้อมูลผู้ติดต่อของบริษัทนี้ในระบบ กรุณาติดต่อแอดมินเพื่อเพิ่มข้อมูล"
                  : "⚠️ กรุณาเลือกผู้ติดต่อจากดรอปดาวน์";
              warningEl.style.display = "block";
            }
          } else if (warningEl) {
            warningEl.style.display = "none";
          }
        }
        if (btnSave) {
          btnSave.disabled = !allValid;
          btnSave.style.opacity = allValid ? "1" : "0.5";
          btnSave.style.pointerEvents = allValid ? "auto" : "none";
        }
      }

      // อัปเดตข้อมูลติดต่อใน state จากผู้ติดต่อที่เลือก (ไม่ยิง server — หน้านี้บันทึกตอนกดปุ่มเท่านั้น)
      // ค่าที่ได้มาจาก /api/customer/:id/contacts ตอน fetchAndRenderContacts จึงตรงกับที่ backend จะ snapshot ให้
      function applyContactDetailsToState(contact) {

            : "";

        quotesData.forEach((quote) => {
          quote.customer_id = cust.id;
          quote.customer_name = `${cust.display_name} | `;
          // เครดิตเป็นของระดับบริษัท เปลี่ยนบริษัทแล้วต้องเปลี่ยนตาม
          // (ค่านี้มากับ /api/customers/search — ดู searchCustomersAdmin ใน db/repositories.ts)

      function onContactSelectChange(e) {
        const selectVal = e.target.value;
        const matchedContact = globalContacts.find((c) => c.name === selectVal);

      // ── Product sheet (ช่องค้นหาสินค้าเดียวของทั้งหน้า) ──
      // สินค้าถูกจัดเข้าใบ PM/THT อัตโนมัติจาก prod.quote_company (ดู addProductToQuote)
      // จึงไม่ต้องมีช่องค้นหาแยกรายการ์ด และ sheet อยู่นอก #quotesContainer จึงรอด render()
      const sheetOverlay = document.getElementById("productSheetOverlay");
      const sheetInput = document.getElementById("productSheetInput");
      const sheetResultsEl = document.getElementById("productSheetResults");

      let searchTimeout = null;

      function openProductSheet() {

          return;
        }
        if (searchTimeout) clearTimeout(searchTimeout);
        searchTimeout = setTimeout(async () => {
          try {
            const resp = await fetch(
              `/api/products/search?q=${encodeURIComponent(query)}`,
            );
            if (!resp.ok) throw new Error("Search failed");
            renderSheetResults(await resp.json());
          } catch (err) {
            console.error("Search error:", err);
          }

      // สินค้าตัวหนึ่งอยู่ได้ใบเดียวเสมอ (จัดตาม quote_company) จึงคืนตัวแรกที่เจอพอ
      // product_id เป็นกุญแจหลัก ส่วน model/product_code เป็น fallback ให้ใบเก่าที่ไม่มี id
      function findQuoteItem(prod) {
        for (let q = 0; q < quotesData.length; q++) {
          const items = quotesData[q].items || [];
          for (let i = 0; i < items.length; i++) {
            const it = items[i];
            const sameId =
              prod.product_id != null &&
              it.product_id != null &&
              String(it.product_id) === String(prod.product_id);
            const sameCode =
              (it.model || it.product_code) === (prod.model || prod.code);
            if (sameId || sameCode) return { q, i, item: it };
          }
        }
        return null;
      }

      function sheetActionHtml(qty) {
        if (qty > 0)
          return `
          <div class="qty-control compact">
            <button type="button" class="qty-btn btn-sheet-dec">−</button>
            <input type="number" class="edit-input sheet-qty" min="0" value="${qty}">
            <button type="button" class="qty-btn btn-sheet-inc">+</button>
          </div>`;
        return `<button type="button" class="btn-add-cart">+ เพิ่ม</button>`;
      }

      function renderSheetResults(products) {
        if (!sheetResultsEl) return;
        sheetResults = Array.isArray(products) ? products : [];
        sheetResultsEl.innerHTML = "";
        if (sheetResults.length === 0) {
          sheetResultsEl.innerHTML =
            '<div class="sheet-empty">ไม่พบสินค้า</div>';
          return;
        }
        sheetResults.forEach((prod, i) => {
          const stock = Number(prod.stock) || 0;
          const isTht = prod.quote_company === "THT";
          const found = findQuoteItem(prod);
          const qty = found ? found.item.quantity : 0;
          const row = document.createElement("div");
          row.className = "sheet-result" + (qty > 0 ? " in-quote" : "");
          row.dataset.idx = i;
          row.innerHTML = `
          <div class="sheet-result-info">
            <div class="sheet-result-main">
              <span class="prod-code">${prod.model || prod.code}</span>
              <span class="prod-price">฿${formatNumber(prod.price, 2)}</span>
            </div>
            <div class="sheet-result-sub">
              <span class="prod-name">${prod.name || ""}</span>
              <span class="target-chip ${isTht ? "tht" : "pm"}">${isTht ? "THT" : "PM"}</span>
              <span class="prod-stock ${stock > 0 ? "in-stock" : "out-of-stock"}">${stock > 0 ? `คงเหลือ ${stock}` : "สินค้าหมด"}</span>
            </div>
          </div>
          <div class="sheet-action">${sheetActionHtml(qty)}</div>`;
          sheetResultsEl.appendChild(row);
        });
      }

      // อัปเดตตัวนับในแต่ละแถวให้ตรงกับ quotesData โดยไม่ rebuild ทั้งลิสต์
      // (rebuild จะทำให้ช่องที่กำลังพิมพ์อยู่หลุด focus กลางคัน)
      function syncSheetRows() {
        if (!sheetResultsEl) return;
        sheetResultsEl.querySelectorAll(".sheet-result").forEach((row) => {
          const prod = sheetResults[Number(row.dataset.idx)];
          if (!prod) return;
          const found = findQuoteItem(prod);
          const qty = found ? found.item.quantity : 0;
          row.classList.toggle("in-quote", qty > 0);
          const cell = row.querySelector(".sheet-action");
          const input = cell.querySelector(".sheet-qty");
          // สลับหน้าตาเฉพาะตอนโหมดเปลี่ยน (ปุ่ม ↔ ตัวนับ) ไม่งั้นแค่เขียนตัวเลขทับ
          if (qty > 0 && input) {
            if (document.activeElement !== input) input.value = qty;
          } else if (qty > 0 || input) {
            cell.innerHTML = sheetActionHtml(qty);
          }
        });
      }

      // กันแตะรัว ๆ ระหว่างที่ path "แยกใบใหม่" ยังยิง POST ไม่เสร็จ (จะได้ใบซ้ำ)
      let isAddingProduct = false;

      async function onSheetStep(prod, delta) {
        const found = findQuoteItem(prod);

        if (!found) {
          if (delta <= 0) return;
          if (isAddingProduct) return;
          isAddingProduct = true;
          try {
            await addProductToQuote(prod);
          } finally {
            isAddingProduct = false;
          }
          syncSheetRows();
          return;
        }

        const next = found.item.quantity + delta;
        if (next <= 0) {
          // ลดจนเหลือ 0 = เอาออกจากใบ (ให้ความรู้สึกเหมือนหยิบของออกจากตะกร้า)
          quotesData[found.q].items.splice(found.i, 1);
          render();
          syncSheetRows();
          showToast(`🗑️ เอา ${prod.model || prod.code} ออกจากใบแล้ว`);
          return;
        }

        // ยิงผ่าน input จริงของการ์ด → ได้ logic เดียวกับที่ผู้ใช้พิมพ์เอง
        // (อัปเดต state + ยอดรวม + ป้ายสต๊อก + เตือนของไม่พอ + checkDirty) โดยไม่ต้อง render() ทั้งหน้า
        const qtyInput = document.querySelector(
          `#items-${found.q} .qty-input[data-i="${found.i}"]`,
        );
        if (qtyInput) {
          qtyInput.value = next;
          qtyInput.dispatchEvent(new Event("input", { bubbles: true }));
        } else {
          found.item.quantity = next;
          render();
        }
        syncSheetRows();
      }

      // ผูก listener ครั้งเดียวบน container ที่อยู่ใน static HTML (ไม่ถูกสร้างใหม่)
      if (sheetResultsEl) {
        sheetResultsEl.addEventListener("click", (e) => {
          const row = e.target.closest(".sheet-result");
          if (!row) return;
          const prod = sheetResults[Number(row.dataset.idx)];
          if (!prod) return;
          if (e.target.closest(".btn-add-cart")) onSheetStep(prod, 1);
          else if (e.target.closest(".btn-sheet-inc")) onSheetStep(prod, 1);
          else if (e.target.closest(".btn-sheet-dec")) onSheetStep(prod, -1);
        });
        // พิมพ์จำนวนเองในช่อง → ตั้งค่าตอน change (blur/enter) ไม่ใช่ทุกตัวอักษร
        sheetResultsEl.addEventListener("change", (e) => {
          if (!e.target.classList.contains("sheet-qty")) return;
          const row = e.target.closest(".sheet-result");
          const prod = sheetResults[Number(row.dataset.idx)];
          const found = findQuoteItem(prod);
          if (!prod || !found) return;
          const want = Math.max(0, Math.round(Number(e.target.value) || 0));
          onSheetStep(prod, want - found.item.quantity);
        });
      }

      if (sheetInput) sheetInput.addEventListener("input", onSheetSearchInput);

      const btnOpenSheet = document.getElementById("btnOpenProductSheet");
      if (btnOpenSheet)
        btnOpenSheet.addEventListener("click", openProductSheet);

      const btnCloseSheet = document.getElementById("productSheetClose");
      if (btnCloseSheet)
        btnCloseSheet.addEventListener("click", closeProductSheet);

      const btnClearSheet = document.getElementById("productSheetClear");
      if (btnClearSheet)
        btnClearSheet.addEventListener("click", () => {
          if (!sheetInput) return;
          sheetInput.value = "";
          sheetInput.focus();
          sheetResults = [];
          if (sheetResultsEl) sheetResultsEl.innerHTML = "";
        });

      if (sheetOverlay)
        sheetOverlay.addEventListener("click", (e) => {
          if (e.target === sheetOverlay) closeProductSheet();
        });

      document.addEventListener("keydown", (e) => {
        if (
          e.key === "Escape" &&
          sheetOverlay &&
          sheetOverlay.classList.contains("show")
        )
          closeProductSheet();
      });

      async function addProductToQuote(prod) {
        const targetIsTht = prod.quote_company === "THT";

        const targetQIdx = quotesData.findIndex((q) => {
          return (q.quote_company === "THT") === targetIsTht;
        });

        // สร้าง item ใหม่ก่อน (ใช้ item แรกของใบเป้าหมายเพื่อ inherit ส่วนลด; ใบใหม่ = 0)
        const stock = Number(prod.stock) || 0;
        const refQuote = targetQIdx !== -1 ? quotesData[targetQIdx] : null;
        const first = refQuote && refQuote.items ? refQuote.items[0] : null;
        const newItem = {
          product_id: prod.product_id, // ★ กุญแจหลักที่ backend ใช้คัดกรอง/validate — ห้ามหาย
          internal_reference: prod.internal_reference || "",
          brand: prod.brand || "",
          product_code: prod.code,
          model: prod.code,
          name: prod.name,
          quantity: 1,
          price: prod.price,
          discount_1: first ? first.discount_1 || 0 : 0,
          discount_2: first ? first.discount_2 || 0 : 0,
          production: prod.production || "",
          stock,
          product_sub_category: prod.category || "",
          sales_description: prod.sales_description || "",
        };
        if (1 > stock)
          showCustomAlert(
            `สินค้าไม่เพียงพอ (พร้อมส่ง ${stock} ชิ้น)`,
          );

        // ── ไม่มีใบของบริษัทสินค้านี้ → แยกใบใหม่ (สร้างพร้อมสินค้าเลย + ห้ามลบ draft เดิม) ──
        if (targetQIdx === -1) {
          updateAllSaveStatus("⏳ กำลังแยกใบเสนอราคาใหม่...", "saving");
          try {
            const firstQuote = quotesData[0];
            const meta = parseCustomerMeta(firstQuote);
            const companyEl = document.getElementById("company-search-global");
            const contactEl = document.getElementById("contact-select-global");
            let cleanCompany = companyEl ? companyEl.value.trim() : "";
            let cleanContact = contactEl ? contactEl.value.trim() : "";
            if (!companyEl || !contactEl) {
              cleanCompany = meta.company;
              cleanContact = meta.contact;
            }
            // ระบบอนุญาตเฉพาะลูกค้าที่มีในฐานข้อมูล — ไม่เติมชื่อ default ให้อีกแล้ว
            if (!cleanCompany || !cleanContact) {
              throw new Error(
                "กรุณาเลือกบริษัทและผู้ติดต่อจากระบบก่อนเพิ่มสินค้าครับ",
              );
            }

            const customerName = meta.revise_from
              ? `${cleanCompany} | ${cleanContact} | revise_from=${meta.revise_from}`
              : `${cleanCompany} | ${cleanContact}`;

            const resp = await fetch("/api/quotations", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                userId: firstQuote.user_id || userId, // ★ สร้างใบใหม่ภายใต้เจ้าของใบเดิม (salesperson ที่ valid) ไม่ใช่ผู้เปิด LIFF (กัน FK 23503)
                customerName,
                customerId: firstQuote.customer_id || null,
                contactId: firstQuote.contact_id || null,
                status: "draft",
                items: [newItem], // ★ ส่งสินค้าไปกับการสร้างเลย (กัน 500 จาก items ว่าง)
                preserveDrafts: true, // ★ ห้ามลบ draft เดิม (ใบที่กำลังแก้อยู่)
              }),
            });
            if (!resp.ok)
              throw new Error("Failed to create new quotation on server");

            const newQuote = await resp.json();
            quotesData.push(newQuote); // ใบใหม่มีสินค้าอยู่แล้ว ไม่ต้อง push ซ้ำ
            // ใบใหม่มาพร้อมวันจัดส่งที่ server คำนวณให้ตรงกับสินค้าชิ้นนั้นแล้ว
            deliverySigByQuote[newQuote.id] = deliverySignature(newQuote);

            const url = new URL(window.location);
            url.searchParams.set(
              "quoteIds",
              quotesData.map((q) => q.id).join(","),
            );
            window.history.replaceState({}, "", url);

            showToast(
              "➕ แยกใบเสนอราคาใหม่สำหรับสินค้า " +
                (targetIsTht ? "THT" : "PM"),
            );
            render();
          } catch (err) {
            console.error("Create new quotation error:", err);
            showToast("❌ ไม่สามารถแยกใบเสนอราคาได้: " + err.message, "error");
            updateAllSaveStatus("⚠️ แยกใบไม่สำเร็จ", "error");
          }
          return;
        }

        // ── มีใบของบริษัทนี้แล้ว → เพิ่มเข้าใบนั้น ──
        const quote = quotesData[targetQIdx];
        if (!quote.items) quote.items = [];
        quote.items.push(newItem);
        render();
      }

      document.addEventListener("click", (e) => {
        // ✕ clearBtn สำหรับช่องค้นหาบริษัท
        if (
          e.target.id === "clear-company-global" ||
          e.target.closest("#clear-company-global")
        ) {
          const companyInput = document.getElementById("company-search-global");
          if (companyInput) {
            companyInput.value = "";
            companyInput.focus();
            // อัปเดตข้อมูลลูกค้าใน state เป็นค่าว่าง (ยังไม่ได้ผูกลูกค้า)
            quotesData.forEach((quote) => {
              quote.customer_id = "";
              quote.customer_name = " | ";
              quote.payment_terms = "";
            });
            // สั่งปิด dropdown และอัปเดต UI รายละเอียดลูกค้า
            const compDropdown = document.getElementById(
              "company-results-global",
            );
            if (compDropdown) {
              compDropdown.style.display = "none";
              compDropdown.innerHTML = "";
            }
            // ล้างข้อมูลติดต่อในหน้าจอ (ยังไม่บันทึก — รอผู้ใช้กดปุ่มบันทึก)
            applyContactDetailsToState(null);
            checkDirty();
            fetchAndRenderContacts("", "");
          }
          return;
        }

        // 🏢 สำหรับดร็อปดาวน์ค้นหาบริษัทลูกค้า
        // ถ้าไม่ได้คลิกที่ช่อง Input บริษัท และไม่ได้คลิก "ภายใน" กล่องดร็อปดาวน์บริษัท -> ให้สั่งปิด
        if (
          !e.target.classList.contains("company-search-input") &&
          !e.target.closest(".company-search-dropdown")
        ) {
          const compDropdown = document.getElementById(
            "company-results-global",
          );
          if (compDropdown) {
            compDropdown.style.display = "none";
            compDropdown.innerHTML = "";
          }
        }
      });

      // ── บันทึก ──
      // บันทึกอย่างเดียว ไม่ออกใบเสนอราคา → ส่ง trigger ให้บอทตอบ Flex "สรุปร่างใบเสนอราคา"
      // การยืนยันออกเอกสารทำผ่านปุ่มใน Flex นั้นเท่านั้น
      async function saveQuotes() {
        // กันกดซ้ำ — render() ระหว่างบันทึกจะปลดล็อกปุ่มให้เอง (validateContactsAndEnableSave)
        if (isSaving) return;
        // ต้องมีสินค้าอย่างน้อย 1 รายการ (backup เผื่อสถานะปุ่มไม่ sync)
        if (!quotesData.some((q) => q.items && q.items.length > 0)) {
          showCustomAlert("กรุณาเพิ่มสินค้าอย่างน้อย 1 รายการก่อนบันทึก");
          return;
        }
        isSaving = true;
        btnSave.disabled = true;
        btnSave.innerHTML = "⏳ กำลังบันทึก...";
        updateAllSaveStatus("⏳ กำลังบันทึก...", "saving");
        loaderText.textContent = "กำลังบันทึกร่างใบเสนอราคา...";
        loaderScreen.style.opacity = "1";
        loaderScreen.style.pointerEvents = "auto";
        loaderScreen.style.display = "flex";
        try {
          // เก็บกวาดใบที่ว่าง (เช่นเคส PM+THT ที่ล้างสินค้าไปใบหนึ่ง) ก่อนบันทึก
          // เพื่อไม่ให้ใบเปล่าหลุดไปอยู่ใน Flex สรุปแล้วถูกกดยืนยัน
          const emptyQuotes = quotesData.filter(
            (q) => !q.items || q.items.length === 0,
          );
          for (const q of emptyQuotes) {
            await cancelSingleQuote(q.id);
          }
          if (emptyQuotes.length > 0) {
            const emptyIds = new Set(emptyQuotes.map((q) => q.id));
            quotesData = quotesData.filter((q) => !emptyIds.has(q.id));
            originalData = originalData.filter((q) => !emptyIds.has(q.id));
            render();
          }

          await saveChangesToServer();
          updateAllSaveStatus("✓ บันทึกสำเร็จ", "saved");
        } catch (err) {
          console.error("Save error:", err);
          isSaving = false;
          loaderScreen.style.display = "none";
          btnSave.disabled = false;
          btnSave.innerHTML = "💾 บันทึก";
          if (err && err.isConflict) {
            // ใบถูกยืนยัน/ยกเลิกไปแล้ว — โหลดหน้าใหม่ ไม่ปล่อยให้ค้างแก้ไขต่อไม่ได้
            hasChanges = false;
            updateAllSaveStatus("⚠️ ใบถูกยืนยัน/ยกเลิกแล้ว", "error");
            showToast(err.message + " กำลังโหลดใหม่...", "error");
            setTimeout(() => location.reload(), 2000);
            return;
          }
          updateAllSaveStatus("⚠️ บันทึกไม่สำเร็จ", "error");
          showToast("❌ บันทึกไม่สำเร็จ: " + err.message, "error");
          return;
        }

        // trigger ให้บอท reply Flex สรุปร่างใบเสนอราคา (มีปุ่มยืนยัน/ยกเลิก/แก้ไข)
        const triggerMessage = `📝 บันทึกร่างใบเสนอราคาแล้ว\n(รหัส: ${quotesData
          .map((q) => q.id)
          .join(",")})`;

        // ยิงเข้าแชทจริงทุกแพลตฟอร์ม (ไม่เดาจาก OS อีกแล้ว) ส่งผ่าน = ปิดหน้าเลย
        const sent = await trySendTrigger(triggerMessage);
        if (sent.ok) {
          liff.closeWindow();
          return;
        }

        // ส่งเข้าแชทไม่สำเร็จ (เบราว์เซอร์นอก LINE / ติดเงื่อนไข sendMessages):
        // ให้ผู้ใช้คัดลอกข้อความไปวางในแชทเอง เพื่อให้บอทตอบ Flex สรุป
        isSaving = false;
        loaderScreen.style.display = "none";
        btnSave.disabled = false;
        btnSave.innerHTML = "💾 บันทึก";
        showSaveSuccessModal(triggerMessage, sent.reason);
      }

      // ── ยกเลิก = ปิดหน้าแก้ไขเฉย ๆ (ไม่ยกเลิกร่างใบเสนอราคา) ──
      // ถ้ายังมีของที่แก้ค้างไว้ ต้องเตือนก่อนว่าจะไม่ถูกบันทึก
      async function closeEditor() {
        if (hasChanges) {
          const confirmed = await showCustomConfirm(
            "ปิดหน้าแก้ไข",
            "การแก้ไขนี้ยังไม่ถูกบันทึก หากปิดตอนนี้ข้อมูลที่แก้ไขจะหายไป (ร่างใบเสนอราคาเดิมยังอยู่ในระบบ) ต้องการปิดหน้าแก้ไขหรือไม่?",
            {
              isDestructive: true,
              okText: "ปิดโดยไม่บันทึก",
              cancelText: "แก้ไขต่อ",
              icon: "⚠️",
            },
          );
          if (!confirmed) return;
        }
        try {
          if (liff.isInClient()) {
            liff.closeWindow();
            return;
          }
        } catch (e) {}
        window.open("", "_self", "");
        window.close();
      }

      btnSave.addEventListener("click", saveQuotes);
      btnCancel.addEventListener("click", closeEditor);

      async function initLIFF() {
        try {
          let urlParams = new URLSearchParams(window.location.search);
          let quoteIds = urlParams.get("quoteIds");
          let urlUserId = urlParams.get("userId");
          await liff.init({ liffId: "__LIFF_ID__" });
          if (!quoteIds) {
            urlParams = new URLSearchParams(window.location.search);
            quoteIds = urlParams.get("quoteIds");
            urlUserId = urlUserId || urlParams.get("userId");
          }
          if (!quoteIds) {
            // เปิดผ่าน liff.line.me → LINE ส่ง query เดิมมาใน liff.state (ต้องดึง userId ด้วย
            // ไม่ใช่แค่ quoteIds ไม่งั้นตกไปพึ่ง getProfile() ที่พลาดได้ → บันทึกไม่ผ่าน 403)
            const stateQuery = new URLSearchParams(window.location.search).get(
              "liff.state",
            );
            if (stateQuery) {
              const qi = stateQuery.indexOf("?");
              if (qi !== -1) {
                const stateParams = new URLSearchParams(
                  stateQuery.substring(qi),
                );
                quoteIds = stateParams.get("quoteIds");
                urlUserId = urlUserId || stateParams.get("userId");
              }
            }
          }
          if (!quoteIds)
            throw new Error("ไม่พบข้อมูลใบเสนอราคา (quoteIds missing)");
          if (!liff.isLoggedIn()) {
            liff.login();
            return;
          }
          if (urlUserId) userId = urlUserId;
          if (!userId) {
            try {
              const profile = await liff.getProfile();
              userId = profile.userId;
            } catch (e) {
              console.error("getProfile error:", e);
            }
          }
          // ไม่รู้ว่าใครเป็นคนแก้ = บันทึกไม่ผ่านแน่นอน (403 จาก isQuotationOwner)
          // ต้องหยุดตั้งแต่ตอนโหลด ไม่ปล่อยให้แก้ไปเรื่อย ๆ แล้วเสียงานตอนกดบันทึก
          if (!userId)
            throw new Error(
              "ระบุตัวตนผู้ใช้ไม่ได้ กรุณาเปิดหน้านี้จากปุ่มในแชท LINE อีกครั้ง",
            );
          loaderText.textContent = "กำลังโหลดข้อมูลใบเสนอราคา...";
          const resp = await fetch(
            `/api/quotations?ids=${encodeURIComponent(quoteIds)}`,
          );
          if (!resp.ok) throw new Error("ไม่สามารถโหลดข้อมูลได้");
          const data = await resp.json();
          if (!data || data.length === 0)
            throw new Error("ไม่พบข้อมูลใบเสนอราคา");
          const finalized = data.find(
            (q) => q.status === "confirmed" || q.status === "cancelled",
          );
          if (finalized)
            throw new Error(
              `ใบเสนอราคานี้ได้รับการ${finalized.status === "confirmed" ? "ยืนยันและออกเอกสาร" : "ยกเลิก"}ไปแล้ว ไม่สามารถแก้ไขได้`,
            );
          quotesData = data;
          originalData = JSON.parse(JSON.stringify(data));
          // ค่าที่ server ส่งมาตรงกับรายการปัจจุบันอยู่แล้ว — จำไว้กัน render() แรกยิงถามซ้ำฟรี ๆ
          seedDeliverySignatures();
          mainContent.style.display = "block";
          stickyFooter.style.display = "flex";
          render();
          loaderScreen.style.opacity = "0";
          setTimeout(() => (loaderScreen.style.display = "none"), 400);
        } catch (err) {
          console.error("LIFF init error:", err);
          loaderText.innerHTML = `<span style="color:var(--danger)">⚠️ โหลดระบบผิดพลาด</span><br><small style="font-size:11px;font-weight:normal">${err.message}</small>`;
        }
      }

      window.addEventListener("load", initLIFF);
    </script>
  </body>
</html>
