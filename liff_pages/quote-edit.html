<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>แก้ไขใบเสนอราคา 📄</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Outfit:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --green-dark: #157015;
        --green: #1e8f1e;
        --green-mid: #27a827;
        --green-light: #e6f5e6;
        --green-pale: #f0faf0;
        --white: #ffffff;
        --surface: #f5f8f5;
        --border: #d0e8d0;
        --border-strong: #a8cfa8;
        --text: #0d2b0d;
        --text-mid: #3a5c3a;
        --text-muted: #6b8f6b;
        --text-light: #9ab89a;
        --danger: #d42b2b;
        --danger-bg: #fff0f0;
        /* น้ำเงิน = "เพิ่มสินค้า" — แยกจากเขียว (บันทึก) และแดง (ยกเลิก) ให้ชัดว่าเป็นคนละงาน */
        --blue: #1565c0;
        --blue-dark: #0d47a1;
        --warning: #b85c00;
        --warning-bg: rgba(184, 92, 0, 0.08);
        --success: #1e8f1e;
        --success-hover: #157015;
        --shadow-sm: 0 1px 4px rgba(0, 60, 0, 0.07);
        --shadow: 0 2px 12px rgba(0, 60, 0, 0.1);
        --shadow-lg: 0 8px 32px rgba(0, 60, 0, 0.14);
        --radius: 12px;
        --radius-sm: 8px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      html {
        font-size: 16px;
      }

      body {
        font-family:
          "Sarabun",
          -apple-system,
          sans-serif;
        background: var(--surface);
        color: var(--text);
        min-height: 100vh;
        padding: 12px 12px 100px;
        -webkit-font-smoothing: antialiased;
      }

      /* ─── LOADER ─── */
      .loader-screen {
        position: fixed;
        inset: 0;
        background: var(--white);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 999;
        transition: opacity 0.35s;
      }

      .loader {
        width: 36px;
        height: 36px;
        border: 3px solid var(--green-light);
        border-top-color: var(--green);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 14px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loader-text {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-muted);
        text-align: center;
      }

      /* ─── ANIMATIONS ─── */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-8px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* ─── CONTAINER ─── */
      .container {
        width: 100%;
        max-width: 520px;
        margin: 0 auto;
        animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }

      /* ─── QUOTE CARD ─── */
      .quote-card {
        background: var(--white);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-sm);
        margin-bottom: 10px;
        overflow: visible;
        animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }

      /* ─── CARD HEADER ─── */
      .card-header {
        padding: 10px 14px;
        color: var(--white);
        font-family: "Outfit", sans-serif;
        font-weight: 700;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .card-header.pm {
        background: linear-gradient(135deg, var(--green-dark), var(--green));
      }
      .card-header.tht {
        background: linear-gradient(135deg, #9c2121, #e26868);
      }

      /* customer info header */
      .card-header.customer-hdr {
        background: linear-gradient(135deg, #0f2b0f, var(--green-dark));
      }

      /* ─── CARD BODY ─── */
      .card-body {
        padding: 10px 12px;
      }

      /* ─── INFO GRID ─── */
      .info-grid {
        display: grid;
        gap: 7px;
      }

      .info-row {
        display: flex;
        gap: 8px;
        align-items: flex-start;
        font-size: 13px;
        line-height: 1.5;
      }
      .info-label {
        color: var(--text-light);
        min-width: 90px;
        flex-shrink: 0;
      }
      .info-value {
        color: var(--text);
        font-weight: 600;
        word-break: break-word;
      }

      .info-note {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 10px;
        padding: 7px 11px;
        background: var(--green-pale);
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
      }

      /* ─── SECTION TITLE ─── */
      .section-title {
        font-weight: 700;
        font-size: 13px;
        color: var(--text-mid);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      /* ══════════════════════════════════════════
       ─── ITEM CARD — redesigned for mobile ───
       ══════════════════════════════════════════ */
      .item-card {
        background: var(--white);
        border: 1.5px solid var(--border);
        border-radius: 10px;
        margin-bottom: 8px;
        overflow: hidden;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
        animation: slideIn 0.25s ease;
      }
      .item-card:hover {
        border-color: var(--border-strong);
        box-shadow: var(--shadow-sm);
      }

      /* top strip: index + code + delete button */
      .item-top-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px 6px;
        border-bottom: 1px solid var(--border);
        background: var(--green-pale);
      }

      .item-index {
        font-family: "Outfit", sans-serif;
        font-weight: 800;
        font-size: 11px;
        color: var(--white);
        background: var(--green);
        width: 20px;
        height: 20px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .item-code {
        font-family: "Outfit", sans-serif;
        font-weight: 700;
        font-size: 13px;
        color: var(--green-dark);
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .item-stock-badge {
        font-size: 10px;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 20px;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .item-stock-badge.in-stock {
        background: rgba(30, 143, 30, 0.12);
        color: var(--green-dark);
      }
      .item-stock-badge.out-of-stock {
        background: var(--danger-bg);
        color: var(--danger);
      }

      /* ─── ITEM BODY ─── */
      .item-body {
        padding: 7px 9px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      /* แถวเดียวจบ: ฿ราคา × จำนวน = ยอดรวม (ไม่มี label ลอยข้างบนแล้ว
         ใช้เครื่องหมาย ฿ / × นำหน้าแทน ประหยัดความสูงไปครึ่งแถว) */
      .item-pq-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .item-pq-col {
        display: flex;
        align-items: center;
        gap: 4px;
        min-width: 0;
      }
      .item-pq-col.price-col {
        flex: 1;
        min-width: 56px;
      }
      .item-pq-col.qty-col {
        flex: 0 0 88px;
      }

      /* เครื่องหมายนำหน้า/คั่นในแถวราคา×จำนวน */
      .item-pq-sign {
        font-family: "Outfit", sans-serif;
        font-size: 12px;
        font-weight: 700;
        color: var(--text-muted);
        flex-shrink: 0;
      }

      .item-field-label {
        font-size: 10px;
        color: var(--text-light);
        white-space: nowrap;
        flex-shrink: 0;
      }

      /* total price — ท้ายแถวราคา×จำนวน */
      .item-total-chip {
        font-family: "Outfit", sans-serif;
        font-size: 13px;
        font-weight: 800;
        color: var(--green-dark);
        background: var(--green-light);
        padding: 4px 8px;
        border-radius: 20px;
        white-space: nowrap;
        flex-shrink: 0;
        margin-left: auto;
      }

      /* discount block = แถว input + ปุ่ม "ใช้กับทุกรายการ" อยู่ในกล่องพื้นหลังเดียวกัน */
      .item-disc-block {
        display: flex;
        flex-direction: column;
        gap: 4px;
        background: var(--surface);
        border-radius: 7px;
        padding: 4px 7px;
      }

      /* discount row */
      .item-disc-row {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .disc-inputs-group {
        display: flex;
        align-items: center;
        gap: 4px;
        flex: 1;
      }

      .disc-separator {
        font-size: 11px;
        font-weight: 700;
        color: var(--text-muted);
      }
      .disc-unit {
        font-size: 10px;
        color: var(--text-muted);
      }

      /* ป้ายส่วนลดเป็นบาท — element มีอยู่เสมอเพื่อให้ onFieldChange อัปเดตได้
         แต่ซ่อนตอนส่วนลดเป็น 0 (เคสส่วนใหญ่) ไม่ให้รกโดยไม่มีข้อมูล */
      .item-discount-baht-chip {
        font-size: 10px;
        font-weight: 700;
        color: var(--warning);
        background: var(--warning-bg);
        padding: 2px 7px;
        border-radius: 20px;
        white-space: nowrap;
        margin-left: auto;
      }
      .item-discount-baht-chip.is-hidden {
        display: none;
      }

      /* หมายเหตุยุบเป็นปุ่ม — กางเป็น input ต่อเมื่อผู้ใช้แตะ หรือมีข้อความอยู่แล้ว */
      .item-remark-toggle {
        font-family: "Sarabun", sans-serif;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        background: transparent;
        border: 1px dashed var(--border-strong);
        border-radius: 7px;
        width: 100%;
        height: 26px;
        padding: 0 8px;
        cursor: pointer;
        text-align: left;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .item-remark-toggle:hover {
        background: var(--green-pale);
        color: var(--text-mid);
      }
      .item-remark-toggle[hidden],
      .edit-input.inp-remark[hidden] {
        display: none;
      }

      /* คัดลอกส่วนลดของรายการนี้ไปให้ทุกรายการในใบเดียวกัน (action ครั้งเดียว ไม่ใช่โหมด)
         ซ่อนไว้เป็นค่าตั้งต้น → โผล่เฉพาะตอนผู้ใช้แตะช่องส่วนลดของรายการนั้น
         display:none ทำให้ไม่กินความสูง (และ gap ของ flex ไม่นับด้วย) การ์ดจึงเตี้ยเท่าเดิม */
      .btn-apply-disc-all {
        display: none;
        font-family: "Sarabun", sans-serif;
        font-size: 11px;
        font-weight: 700;
        color: var(--white);
        background: var(--green);
        border: none;
        border-radius: 6px;
        width: 100%;
        height: 28px;
        padding: 0 8px;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        box-shadow: 0 2px 8px rgba(30, 143, 30, 0.28);
        transition:
          background 0.15s,
          opacity 0.15s;
      }
      .btn-apply-disc-all.is-visible {
        display: block;
        animation: discBtnIn 0.18s ease-out;
      }
      .btn-apply-disc-all:hover {
        background: var(--green-dark);
      }
      .btn-apply-disc-all:active {
        opacity: 0.88;
      }
      @keyframes discBtnIn {
        from {
          opacity: 0;
          transform: translateY(-4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ─── EDIT INPUTS ─── */
      .edit-input {
        font-family: "Outfit", sans-serif;
        font-size: 13px;
        font-weight: 600;
        padding: 7px 10px;
        border: 1.5px solid var(--border-strong);
        border-radius: var(--radius-sm);
        background: var(--white);
        color: var(--text);
        width: 100%;
        max-width: 120px;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
        -moz-appearance: textfield;
        appearance: textfield;
        outline: none;
      }
      .edit-input::placeholder {
        color: var(--text-light);
      }
      .edit-input:focus {
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(30, 143, 30, 0.12);
        background: var(--green-pale);
      }
      .edit-input::-webkit-outer-spin-button,
      .edit-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        appearance: none;
        margin: 0;
      }

      /* compact field sizes used inside item cards */
      .edit-input.inp-price {
        width: 100%;
        min-width: 60px;
        height: 30px;
        padding: 0 6px;
        font-size: 12px;
        text-align: right;
        border-radius: 7px;
        max-width: none;
      }
      .edit-input.inp-disc {
        width: 42px;
        min-width: 42px;
        height: 28px;
        padding: 0 4px;
        font-size: 11px;
        text-align: center;
        border-radius: 7px;
        max-width: none;
      }
      .edit-input.inp-remark {
        width: 100%;
        max-width: none;
        height: 28px;
        padding: 0 8px;
        font-size: 11px;
        border-radius: 7px;
        background: var(--white);
        border-color: var(--border);
      }
      .edit-input.inp-remark:focus {
        border-color: var(--green);
        background: var(--green-pale);
      }

      select.edit-input {
        background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%236b8f6b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3E%3C/svg%3E");
        background-position: right 10px center;
        background-repeat: no-repeat;
        background-size: 15px;
        padding-right: 28px;
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        cursor: pointer;
      }

      /* ─── QTY CONTROL ─── */
      .qty-control {
        display: flex;
        align-items: center;
        background: var(--white);
        border: 1.5px solid var(--border-strong);
        border-radius: var(--radius-sm);
        overflow: hidden;
        max-width: 110px;
      }
      .qty-btn {
        background: transparent;
        border: none;
        color: var(--green-dark);
        font-size: 14px;
        font-weight: 700;
        width: 28px;
        height: 28px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        transition: background 0.1s;
      }
      .qty-btn:hover {
        background: var(--green-light);
      }
      .qty-btn:active {
        background: var(--green-light);
      }

      .qty-control .edit-input {
        border: none;
        border-radius: 0;
        text-align: center;
        width: 40px;
        height: 28px;
        padding: 0;
        max-width: none;
        box-shadow: none;
        font-size: 13px;
      }
      .qty-control .edit-input:focus {
        box-shadow: none;
        background: transparent;
      }

      .qty-control.compact {
        width: 100%;
        max-width: none;
        height: 30px;
        border-radius: 7px;
      }
      .qty-control.compact .qty-btn {
        width: 26px;
        height: 28px;
        font-size: 13px;
      }
      .qty-control.compact .edit-input {
        flex: 1;
        width: 100%;
        height: 28px;
        font-size: 12px;
      }

      /* ─── DELETE BUTTON ─── */
      .btn-delete-item {
        font-family: "Sarabun", sans-serif;
        font-size: 12px;
        font-weight: 600;
        padding: 4px 6px;
        border: none;
        background: transparent;
        color: var(--danger);
        cursor: pointer;
        transition: background 0.15s;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 3px;
        border-radius: 5px;
        flex-shrink: 0;
      }
      .btn-delete-item:hover {
        background: var(--danger-bg);
      }

      /* ─── STOCK BADGES (legacy — kept for search dropdown) ─── */
      .prod-stock {
        font-weight: 600;
        padding: 2px 6px;
        border-radius: 6px;
        font-size: 10px;
      }
      .prod-stock.in-stock {
        background: rgba(30, 143, 30, 0.1);
        color: var(--green-dark);
      }
      .prod-stock.out-of-stock {
        background: var(--danger-bg);
        color: var(--danger);
      }

      /* ─── DELIVERY STRIP (วันจัดส่ง — ทั้งใบ) ───
         แถบบางคาดเหนือ .total-bar เพื่อให้อ่านคู่กับยอดรวมเป็นสรุปท้ายใบ */
      .delivery-strip {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
        padding: 7px 14px;
        background: var(--green-pale);
        border-top: 1px solid var(--border);
      }
      .delivery-strip .item-field-label {
        font-size: 11px;
        color: var(--text-mid);
      }

      /* ถ้อยคำเดียวกับที่พิมพ์ลง PDF (ดู deliveryTimeText ใน pdfGenerator.ts)
         สถานะมาจากสต๊อกจริงเสมอ เซลล์แก้ไม่ได้ — แก้ได้แค่จำนวนวัน */
      .delivery-mode-badge {
        font-family: "Outfit", sans-serif;
        font-size: 11px;
        font-weight: 700;
        padding: 3px 9px;
        border-radius: 20px;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .delivery-mode-badge.in-stock {
        background: rgba(30, 143, 30, 0.12);
        color: var(--green-dark);
      }
      .delivery-mode-badge.make-order {
        background: var(--warning-bg);
        color: var(--warning);
      }

      .edit-input.inp-delivery {
        width: 58px;
        min-width: 58px;
        height: 28px;
        padding: 0 6px;
        font-size: 13px;
        text-align: center;
        border-radius: 7px;
        max-width: none;
      }

      .btn-delivery-reset {
        font-family: "Sarabun", sans-serif;
        font-size: 13px;
        font-weight: 700;
        color: var(--green-dark);
        background: var(--white);
        border: 1.5px solid var(--border-strong);
        border-radius: 6px;
        width: 28px;
        height: 28px;
        padding: 0;
        margin-left: auto;
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.15s;
      }
      .btn-delivery-reset:hover {
        background: var(--green-light);
      }

      /* บรรทัดที่ 2 ของ strip — กินเต็มความกว้างเสมอ */
      .delivery-note,
      .delivery-stale {
        width: 100%;
        font-size: 11px;
        line-height: 1.45;
      }
      .delivery-note {
        font-weight: 600;
        color: var(--warning);
      }
      .delivery-stale {
        color: var(--text-muted);
      }

      .btn-delivery-reset[hidden],
      .delivery-note[hidden],
      .delivery-stale[hidden] {
        display: none;
      }

      /* ─── TOTAL BAR ─── */
      .total-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 11px 14px;
        background: var(--green-light);
        border-top: 1.5px solid var(--border);
      }
      .total-label {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-mid);
      }
      .total-value {
        font-family: "Outfit", sans-serif;
        font-size: 15px;
        font-weight: 700;
        color: var(--green-dark);
      }

      /* ─── SAVE STATUS ─── */
      .save-status {
        font-size: 11px;
        font-weight: 600;
        padding: 3px 9px;
        border-radius: 20px;
        transition: all 0.25s;
        display: inline-flex;
        align-items: center;
        gap: 3px;
        margin-left: auto;
      }
      .save-status.saving,
      .save-status.dirty {
        background: rgba(255, 255, 255, 0.2);
        color: #ffffff;
        border: 1px solid rgba(255, 255, 255, 0.4);
      }
      .save-status.saved {
        background: rgba(255, 255, 255, 0.35);
        color: #ffffff;
        border: 1px solid rgba(255, 255, 255, 0.6);
      }
      .save-status.error {
        background: #d42b2b;
        color: #ffffff;
        border: 1px solid #ffffff;
      }

      /* ─── PRODUCT SHEET (bottom sheet เพิ่มสินค้า) ───
         z-index ต้องต่ำกว่า .alert-modal-overlay (2000) เพราะ addProductToQuote
         เด้ง showCustomAlert ตอนสต๊อกไม่พอ ซึ่งต้องอยู่ทับ sheet */
      .sheet-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 30, 0, 0.45);
        z-index: 900;
        display: none;
        align-items: flex-end;
        justify-content: center;
      }
      .sheet-overlay.show {
        display: flex;
      }
      .sheet {
        width: 100%;
        max-width: 520px;
        background: var(--white);
        border-radius: 20px 20px 0 0;
        /* ครึ่งจอพอดี — เห็นการ์ดใบเสนอราคาข้างหลังไปด้วยว่าของที่เพิ่มไปแล้วเข้าใบไหน */
        height: 50vh;
        display: flex;
        flex-direction: column;
        box-shadow: var(--shadow-lg);
        animation: sheetUp 0.24s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes sheetUp {
        from {
          transform: translateY(100%);
        }
        to {
          transform: translateY(0);
        }
      }
      .sheet-handle {
        width: 36px;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin: 10px auto 0;
        flex-shrink: 0;
      }
      .sheet-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px 8px;
        flex-shrink: 0;
      }
      .sheet-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
      }
      .btn-close {
        width: 32px;
        height: 32px;
        border: none;
        border-radius: 50%;
        background: var(--text-mid);
        color: var(--white);
        font-size: 16px;
        font-weight: 700;
        line-height: 1;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: background 0.15s;
      }
      .btn-close:hover {
        background: var(--text);
      }
      .btn-close:active {
        opacity: 0.85;
      }
      .sheet-search {
        padding: 0 14px 10px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .sheet-hint {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 6px;
      }
      .sheet-results {
        flex: 1;
        overflow-y: auto;
        overscroll-behavior: contain;
        padding: 6px 10px 14px;
        -webkit-overflow-scrolling: touch;
      }
      .sheet-empty {
        padding: 22px 10px;
        text-align: center;
        font-size: 12px;
        color: var(--text-light);
      }

      .sheet-result {
        font-family: "Sarabun", sans-serif;
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--white);
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 8px 10px;
        margin-bottom: 6px;
        transition:
          background 0.12s,
          border-color 0.12s;
      }
      /* อยู่ในใบแล้ว — ย้อมสีให้เห็นทันทีว่าหยิบใส่ไปแล้วกี่ชิ้น */
      .sheet-result.in-quote {
        background: var(--green-pale);
        border-color: var(--green-mid);
      }

      .sheet-result-info {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .sheet-result-main,
      .sheet-result-sub {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .sheet-result-main .prod-code {
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .sheet-result-sub .prod-name {
        flex: 1;
        min-width: 0; /* จำเป็นสำหรับ text-overflow:ellipsis ในลูก flex */
      }

      /* ปุ่มเพิ่ม / ตัวนับจำนวน — สลับกันตามว่าสินค้าอยู่ในใบแล้วหรือยัง */
      .sheet-action {
        flex: 0 0 92px;
      }
      .btn-add-cart {
        font-family: "Sarabun", sans-serif;
        font-size: 12px;
        font-weight: 700;
        color: var(--white);
        background: var(--green);
        border: none;
        border-radius: 7px;
        width: 100%;
        height: 30px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-add-cart:hover {
        background: var(--green-dark);
      }
      .btn-add-cart:active {
        opacity: 0.88;
      }
      .sheet-action .qty-control {
        border-color: var(--green-mid);
      }

      /* chip บอกว่าสินค้าจะถูกจัดเข้าใบไหน */
      .target-chip {
        font-family: "Outfit", sans-serif;
        font-size: 10px;
        font-weight: 800;
        padding: 2px 7px;
        border-radius: 20px;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .target-chip.pm {
        background: rgba(30, 143, 30, 0.12);
        color: var(--green-dark);
      }
      .target-chip.tht {
        background: rgba(156, 33, 33, 0.1);
        color: #9c2121;
      }

      /* ─── SEARCH DROPDOWN ─── */
      .search-wrapper {
        position: relative;
        width: 100%;
      }

      .search-results-dropdown {
        position: absolute;
        top: calc(100% + 5px);
        left: 0;
        right: 0;
        background: var(--white);
        border: 1.5px solid var(--border-strong);
        border-radius: var(--radius);
        box-shadow: var(--shadow-lg);
        z-index: 200;
        max-height: 200px;
        overflow-y: auto;
        display: none;
      }
      .search-results-dropdown::-webkit-scrollbar {
        width: 4px;
      }
      .search-results-dropdown::-webkit-scrollbar-track {
        background: transparent;
      }
      .search-results-dropdown::-webkit-scrollbar-thumb {
        background: var(--border-strong);
        border-radius: 99px;
      }

      .dropdown-item {
        padding: 9px 13px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 2px;
        border-bottom: 1px solid var(--border);
        transition: background 0.12s;
      }
      .dropdown-item:last-child {
        border-bottom: none;
      }
      .dropdown-item:hover {
        background: var(--green-light);
      }

      .dropdown-item-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      /* ใช้ร่วมกันทั้ง dropdown ค้นหาบริษัท และแถวผลลัพธ์ใน product sheet */
      .dropdown-item .prod-code,
      .sheet-result .prod-code {
        font-family: "Outfit", sans-serif;
        font-weight: 700;
        font-size: 13px;
        color: var(--green-dark);
      }
      .dropdown-item .prod-price,
      .sheet-result .prod-price {
        font-family: "Outfit", sans-serif;
        font-weight: 700;
        font-size: 13px;
        color: var(--green-dark);
        white-space: nowrap;
      }
      .dropdown-item .prod-name,
      .sheet-result .prod-name {
        font-size: 11px;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* ─── STICKY FOOTER ─── */
      .sticky-footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--white);
        border-top: 2px solid var(--green);
        padding: 10px 14px 14px;
        display: flex;
        gap: 8px;
        z-index: 100;
        box-shadow: 0 -4px 20px rgba(0, 60, 0, 0.1);
      }

      /* ─── BUTTONS ─── */
      .btn {
        font-family: "Sarabun", sans-serif;
        font-weight: 700;
        font-size: 13px;
        padding: 12px 6px;
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        white-space: nowrap;
        transition:
          background 0.15s,
          opacity 0.15s;
        flex: 1;
      }
      .btn:active {
        opacity: 0.88;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-confirm {
        background: var(--green);
        color: var(--white);
        box-shadow: 0 3px 10px rgba(30, 143, 30, 0.22);
      }
      .btn-confirm:hover:not(:disabled) {
        background: var(--green-dark);
      }

      .btn-cancel {
        background: transparent;
        color: var(--danger);
        border: 1.5px solid var(--danger);
      }
      .btn-cancel:hover {
        background: var(--danger);
        color: var(--white);
      }

      /* เพิ่มสินค้า — อยู่ใน footer ให้กดได้ตลอดไม่ว่าเลื่อนจออยู่ตรงไหน
         สีน้ำเงินแยกจากเขียว (บันทึก) / แดง (ยกเลิก) ให้เห็นว่าเป็นคนละงานกัน */
      .btn-add {
        background: var(--blue);
        color: var(--white);
        box-shadow: 0 3px 10px rgba(21, 101, 192, 0.25);
      }
      .btn-add:hover:not(:disabled) {
        background: var(--blue-dark);
      }

      /* ปุ่มเดียวกันเวอร์ชันวางในเนื้อหา (empty state ของใบที่ยังไม่มีสินค้า) */
      .btn.btn-inline {
        flex: 0 0 auto;
        display: inline-flex;
        width: auto;
        margin-top: 12px;
        padding: 9px 18px;
      }

      /* ─── TOAST ─── */
      .toast {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.9);
        padding: 24px 30px;
        border-radius: var(--radius);
        font-size: 15px;
        font-weight: 600;
        z-index: 1000;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: var(--shadow-lg);
        max-width: 90%;
        width: 400px;
        text-align: center;
        pointer-events: none;
      }

      .toast.show {
        opacity: 1;
        visibility: visible;
        transform: translate(-50%, -50%) scale(1);
        pointer-events: auto;
      }

      .toast.success {
        background: var(--green);
        color: var(--white);
      }

      .toast.error {
        background: var(--danger);
        color: var(--white);
      }

      .toast .toast-message {
        margin-bottom: 16px;
        line-height: 1.5;
        /* ข้อความ error หลายบรรทัด (เช่น violation หลายรายการ) ต้องขึ้นบรรทัดจริง */
        white-space: pre-line;
      }

      .toast .toast-close-btn {
        background: rgba(255, 255, 255, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.4);
        color: white;
        padding: 8px 24px;
        border-radius: var(--radius-sm);
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.15s;
        font-family: "Sarabun", sans-serif;
      }

      .toast .toast-close-btn:hover {
        background: rgba(255, 255, 255, 0.4);
      }

      .toast .toast-close-btn:active {
        transform: scale(0.95);
      }

      /* ─── EMPTY STATE ─── */
      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--text-muted);
      }
      .empty-state .icon {
        font-size: 44px;
        margin-bottom: 10px;
        opacity: 0.5;
      }
      .empty-state .msg {
        font-size: 14px;
      }

      .footer-note {
        text-align: center;
        font-size: 11px;
        color: var(--text-light);
        margin-top: 14px;
        margin-bottom: 8px;
      }

      /* ─── REVISION BADGE ─── */
      .revision-banner {
        background: var(--warning-bg);
        border: 1px solid rgba(184, 92, 0, 0.25);
        border-radius: var(--radius-sm);
        padding: 9px 12px;
        margin-bottom: 14px;
        font-size: 13px;
        font-weight: 600;
        color: var(--warning);
        display: flex;
        align-items: center;
        gap: 7px;
      }

      /* ─── ALERT MODAL ─── */
      .alert-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 30, 0, 0.45);
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        opacity: 0;
        transition: opacity 0.22s;
      }
      .alert-modal-overlay.show {
        opacity: 1;
      }

      .alert-modal-card {
        background: var(--white);
        border: 1.5px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow-lg);
        width: 90%;
        max-width: 360px;
        padding: 20px;
        animation: alertPop 0.28s cubic-bezier(0.16, 1, 0.3, 1);
      }

      @keyframes alertPop {
        from {
          transform: scale(0.88);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .alert-modal-header {
        display: flex;
        align-items: center;
        gap: 9px;
        margin-bottom: 10px;
      }
      .alert-modal-icon {
        font-size: 22px;
      }
      .alert-modal-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
      }

      .alert-modal-body {
        font-size: 13px;
        line-height: 1.6;
        color: var(--danger);
        margin-bottom: 16px;
        word-break: break-word;
      }

      .alert-modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .alert-modal-btn {
        font-family: "Sarabun", sans-serif;
        background: var(--green);
        color: var(--white);
        border: none;
        padding: 8px 16px;
        border-radius: var(--radius-sm);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.15s;
      }
      .alert-modal-btn:hover {
        background: var(--green-dark);
      }

      /* ─── CUSTOMER SELECTION ─── */
      .customer-selection-box {
        margin-bottom: 14px;
        border-bottom: 1.5px solid var(--border);
        padding-bottom: 14px;
      }

      /* ─── SEARCH CLEAR BUTTON ─── */
      .search-clear {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        background: var(--border);
        border: none;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: var(--text-mid);
        cursor: pointer;
        z-index: 5;
      }
      .search-wrapper input:not(:placeholder-shown) ~ .search-clear {
        display: flex;
      }
    </style>
  </head>

  <body>
    <!-- Loader -->
    <div id="loaderScreen" class="loader-screen">
      <div class="loader"></div>
      <div class="loader-text" id="loaderText">
        กำลังโหลดข้อมูลใบเสนอราคา...
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Alert Modal -->
    <div id="alertModal" class="alert-modal-overlay" style="display: none">
      <div class="alert-modal-card">
        <div class="alert-modal-header">
          <span class="alert-modal-icon">⚠️</span>
          <h3 class="alert-modal-title">แจ้งเตือนสินค้าพร้อมส่งไม่พอ</h3>
        </div>
        <div class="alert-modal-body" id="alertModalMessage">
          ข้อความเตือน...
        </div>
        <div class="alert-modal-footer">
          <button class="alert-modal-btn" id="alertModalClose">รับทราบ</button>
        </div>
      </div>
    </div>
    <!-- Confirm Modal -->
    <div id="confirmModal" class="alert-modal-overlay" style="display: none">
      <div class="alert-modal-card">
        <div class="alert-modal-header">
          <span class="alert-modal-icon" id="confirmModalIcon">❓</span>
          <h3 class="alert-modal-title" id="confirmModalTitle">
            ยืนยันการดำเนินการ
          </h3>
        </div>
        <div
          class="alert-modal-body"
          id="confirmModalMessage"
          style="color: var(--text); font-size: 13px; line-height: 1.6"
        >
          ข้อความยืนยัน...
        </div>
        <div
          class="alert-modal-footer"
          style="display: flex; justify-content: flex-end; gap: 8px"
        >
          <button
            class="alert-modal-btn"
            id="confirmModalCancel"
            style="background: var(--text-muted)"

            ยกเลิก
          </button>
          <button

    <!-- Save Modal (หลังบันทึกสำเร็จ — ใช้ได้ทุกแพลตฟอร์ม) -->
    <div id="successModal" class="alert-modal-overlay" style="display: none">
      <div class="alert-modal-card">
        <div class="alert-modal-header">
          <span class="alert-modal-icon">💾</span>
          <h3 class="alert-modal-title">บันทึกร่างใบเสนอราคาแล้ว</h3>
        </div>
        <div
          class="alert-modal-body"
          id="successModalBody"
          style="color: var(--text); font-size: 13px; line-height: 1.7"
        ></div>
        <div
          class="alert-modal-footer"
          style="display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap"
        >
          <button
            class="alert-modal-btn"
            id="successModalClose"
            style="background: var(--text-muted)"
          >
            ปิด
          </button>
          <button class="alert-modal-btn" id="successModalCopy">
            📋 คัดลอกข้อความ
          </button>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="container" id="mainContent" style="display: none">
      <div id="quotesContainer"></div>
      <div class="footer-note">Powered by Primus Co., Ltd.</div>
    </div>

    <!-- Product Sheet — ช่องค้นหาสินค้าเดียวของทั้งหน้า -->
    <div class="sheet-overlay" id="productSheetOverlay">
      <div
        class="sheet"
        role="dialog"
        aria-modal="true"
        aria-labelledby="productSheetTitle"
      >
        <div class="sheet-handle"></div>
        <div class="sheet-header">
          <div class="sheet-title" id="productSheetTitle">🛒 เพิ่มสินค้า</div>
          <button class="btn-close" id="productSheetClose" aria-label="ปิด">
            ✕
          </button>
        </div>
        <div class="sheet-search">
          <div class="search-wrapper">
            <input
              type="text"
              class="edit-input"
              id="productSheetInput"
              placeholder="🔍 พิมพ์รุ่น / ชื่อ / แบรนด์..."
              style="max-width: none; width: 100%; font-size: 13px; padding-right: 34px"
            />
            <button class="search-clear" id="productSheetClear">✕</button>
          </div>
          <div class="sheet-hint">

      <!-- อยู่ใน footer ที่ sticky อยู่แล้ว → กดเพิ่มสินค้าได้ตลอดไม่ว่าเลื่อนจออยู่ตรงไหน -->
      <button class="btn btn-add" id="btnOpenProductSheet">+ เพิ่มสินค้า</button>
      <button class="btn btn-confirm" id="btnSave">💾 บันทึก</button>
    </div>

    <!-- LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
      // Override global fetch to automatically inject ngrok skip header
      // ⚠️ ใส่เฉพาะ request ที่ไปโดเมนตัวเอง — ห้ามถอดเงื่อนไข isSameOrigin ออก
      // การยัด custom header ใส่ request ข้ามโดเมนบังคับให้เบราว์เซอร์ยิง preflight (OPTIONS) ก่อน
      // ซึ่งโดเมนนอกไม่ได้เปิด CORS ไว้ให้ → request พังทั้งอัน
      // (เคสจริง: liffsdk.line-scdn.net/xlt/manifest.json ที่ LIFF SDK ใช้โหลดไฟล์แปลภาษา)
      (function() {
        const originalFetch = window.fetch;
        // รับได้ทั้ง string / URL / Request — ตัดสินใจไม่ได้ = ไม่ใส่ header
        // (ยอมเสีย header ดีกว่าทำ CORS พัง)
        const isSameOrigin = (input) => {
          try {
            const href =
              typeof input === "string"
                ? input
                : input instanceof URL
                  ? input.href
                  : input && typeof input.url === "string"
                    ? input.url
                    : "";
            if (!href) return false;
            return (
              new URL(href, window.location.href).origin ===
              window.location.origin
            );
          } catch (e) {
            return false;
          }
        };
        window.fetch = function(url, options = {}) {
          if (!isSameOrigin(url)) return originalFetch(url, options);
          if (!options.headers) {
            options.headers = {};
          }
          if (options.headers instanceof Headers) {
            options.headers.set('ngrok-skip-browser-warning', 'true');
          } else if (Array.isArray(options.headers)) {
            options.headers.push(['ngrok-skip-browser-warning', 'true']);
          } else {
            options.headers['ngrok-skip-browser-warning'] = 'true';
          }
          return originalFetch(url, options);
        };
      })();

      // ข้อความแทนค่าลูกค้าที่ยังไม่มีข้อมูล (ค่าจริงเป็น null — ตรงกับ CUSTOMER_PLACEHOLDER ใน utils/flexTemplates.ts)

      function showCustomConfirm(title, message, options = {}) {

      // คัดลอกข้อความลง clipboard (fallback: textarea + execCommand สำหรับ webview เก่า)
      async function copyToClipboard(text) {
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
            return true;
          }
        } catch (e) {}
        try {
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.select();
          const ok = document.execCommand("copy");
          ta.remove();
          return ok;
        } catch (e) {
          return false;
        }
      }

      // ส่ง trigger เข้าแชท — ยิงจริงทุกแพลตฟอร์มแล้วค่อยดูผล ไม่เดาจาก OS
      //
      // ทดสอบแล้ว: LINE PC เปิดหน้า LIFF ใน "เบราว์เซอร์ภายนอก" เสมอ (LIFF URL เป็น
      // universal/app link เฉพาะ iOS/Android — ดู https://developers.line.biz/en/docs/liff/opening-liff-app/)
      // → isInClient() เป็น false → sendMessages() ใช้บน PC ไม่ได้อย่างถาวร ต้องตกไปใช้ modal คัดลอก
      // ที่ยังยิงอยู่คือทางของมือถือ (และเผื่อ LINE PC รองรับ LIFF browser ในอนาคต)
      //
      // คืน { ok:true } หรือ { ok:false, reason } โดย reason เป็นข้อความพร้อมแสดงผล (มี icon ในตัว)
      // ⚠️ mirror ของ trySendTrigger() ใน product-search.html / register.html — แก้ที่นี่แล้วต้องไป sync ด้วยมือ
      async function trySendTrigger(text) {
        try {
          if (!liff.isInClient())
            return {
              ok: false,
              reason:
                "ℹ️ LINE PC เปิดหน้านี้ในเบราว์เซอร์ภายนอกเสมอ จึงส่งเข้าแชทให้อัตโนมัติไม่ได้ (เป็นข้อจำกัดของ LINE PC ไม่ใช่ข้อผิดพลาด)",
            };
          await liff.sendMessages([{ type: "text", text }]);
          return { ok: true };
        } catch (e) {
          console.error("sendMessages error:", e);
          const code = (e && e.code) || "";
          const msg = (e && e.message) || String(e);
          return {
            ok: false,
            reason: `⚠️ ส่งเข้าแชทอัตโนมัติไม่สำเร็จ: ${code ? `${code} — ${msg}` : msg}`,
          };
        }
      }

      // Modal หลัง "บันทึก" — ตาข่ายรองตอน trySendTrigger() ส่งเข้าแชทไม่สำเร็จ
      // ให้ user คัดลอกข้อความ trigger ไปวางส่งในแชทเอง → บอท reply Flex สรุปร่างใบเสนอราคา
      // (การยืนยันออกเอกสารทำผ่านปุ่มใน Flex นั้นเท่านั้น หน้านี้ไม่ยืนยันเองแล้ว)
      // failReason = สาเหตุที่ส่งอัตโนมัติไม่ได้ โชว์ไว้ให้วินิจฉัยหน้างานโดยไม่ต้องเปิด devtools

          <div style="margin-top:8px;font-size:12px;color:var(--text-muted);">📋 คัดลอกข้อความ → วางส่งในแชท เพื่อดูสรุปร่างใบเสนอราคาและกดยืนยันออกเอกสาร</div>
          <div id="successTriggerBox" style="display:none;margin-top:6px;padding:6px 8px;background:var(--white);border:1px dashed var(--border-strong);border-radius:6px;font-size:11px;color:var(--text);white-space:pre-wrap;word-break:break-word;">${triggerMessage || ""}</div>

        const closeModal = () => {

                sel.removeAllRanges();

        if (btnClose) {

              liff.closeWindow();

        modal.style.display = "flex";
        setTimeout(() => modal.classList.add("show"), 10);

      // ── Toast ──
      function showToast(message, type = "success") {
        // ลบ Toast เดิมถ้ามี
        const existingToast = document.querySelector(".toast");
        if (existingToast && existingToast.id !== "toast") {
          existingToast.remove();
        }

        // ซ่อน toast เดิม (id="toast") ก่อน
        toastEl.classList.remove("show");
        toastEl.style.display = "none";

        // สร้าง Toast ใหม่
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;

        // ข้อความ
        const msgSpan = document.createElement("div");
        msgSpan.className = "toast-message";
        msgSpan.textContent = message;
        toast.appendChild(msgSpan);

        // ปุ่มปิด (เฉพาะ error)
        if (type === "error") {
          const closeBtn = document.createElement("button");
          closeBtn.className = "toast-close-btn";
          closeBtn.textContent = "รับทราบ";
          closeBtn.addEventListener("click", () => {
            toast.classList.remove("show");
            setTimeout(() => toast.remove(), 300);
          });
          toast.appendChild(closeBtn);
        }

        document.body.appendChild(toast);

        // แสดง Toast
        requestAnimationFrame(() => {
          toast.classList.add("show");
        });

        // สำหรับ success: ปิดอัตโนมัติหลังจาก 2.5 วินาที
        if (type === "success") {
          setTimeout(() => {
            toast.classList.remove("show");
            setTimeout(() => toast.remove(), 300);
          }, 2500);
        }
      }

      function formatNumber(n, decimals = 0) {
        return n.toLocaleString("en-US", {
          minimumFractionDigits: decimals,
          maximumFractionDigits: decimals,
        });
      }

      // ยังไม่ได้ผูกลูกค้า = ค่าว่าง (null) ระบบไม่มีลูกค้า default อีกแล้ว
      function parseCustomerMeta(quote) {
        if (!quote)
          return {
            company: "",
            contact: "",
            phone: "",
            email: "",
            address: "",
            delivery: "",
            revise_from: null,
          };
        const fullName = quote.customer_name || "";
        const parts = fullName.split(" | ");
        if (parts.length > 1) {
          const company = parts[0] ? parts[0].trim() : "";
          const contact = parts[1] ? parts[1].trim() : "";
          let meta = {};
          if (parts[2]) {
            try {
              meta = Object.fromEntries(new URLSearchParams(parts[2]));
            } catch (e) {}
          }
          return {
            company,
            contact,
            phone: meta.phone || quote.contact_phone || "",
            email: meta.email || quote.contact_email || "",
            address: meta.address || quote.contact_address || "",
            delivery:
              meta.delivery || meta.address || quote.delivery_address || "",
            revise_from: meta.revise_from || quote.revise_from || null,
          };
        }
        if (quote.contact_name) {
          return {
            company: fullName || "",
            contact: quote.contact_name || "",
            phone: quote.contact_phone || "",
            email: quote.contact_email || "",
            address: quote.contact_address || "",
            delivery: quote.delivery_address || "",
            revise_from: quote.revise_from || null,
          };
        }
        return {
          company: fullName || "",
          contact: "",
          phone: "",
          email: "",
          address: "",
          delivery: "",
          revise_from: null,
        };
      }

      // ⚠️ mirror ของ calcNetPrice()/calcLineTotal() ใน utils/pricing.ts
      // หน้านี้เป็น vanilla JS ไม่มี bundler (ตาม AGENTS.md) จึง import ไม่ได้
      // เป็น duplication จุดเดียวที่ยอมรับโดยตั้งใจ — แก้สูตรที่ utils/pricing.ts แล้วต้องมา sync ที่นี่ด้วยมือ
      function calcItemTotal(item) {
        const net =
          item.price *
          (1 - (item.discount_1 || 0) / 100) *
          (1 - (item.discount_2 || 0) / 100);
        return item.quantity * net;
      }
      function calcQuoteTotal(quote) {
        return quote.items.reduce((s, i) => s + calcItemTotal(i), 0);
      }

      // ── วันจัดส่ง (ระดับใบ) ──
      // delivery_days_auto = ค่าที่ server คำนวณจาก quotation_rules (มากับ /api/quotations)
      // delivery_days_override = ค่าที่เซลล์ตั้งทับไว้ (null = ใช้ค่าอัตโนมัติ)
      // หน้านี้คำนวณค่าอัตโนมัติเองไม่ได้ (กฎอยู่ฝั่ง server) ตัวเลขจึงนิ่งจนกว่าจะบันทึกแล้วโหลดใหม่
      function deliveryAutoDays(quote) {
        const n = Number(quote.delivery_days_auto);
        if (Number.isFinite(n)) return n;
        return quote.delivery_all_in_stock === false ? 7 : 3;
      }

      function deliveryOverrideDays(quote) {
        const v = quote.delivery_days_override;
        if (v === null || v === undefined || v === "") return null;
        const n = Number(v);
        return Number.isFinite(n) ? n : null;
      }

      function hasDeliveryOverride(quote) {
        return deliveryOverrideDays(quote) !== null;
      }

      function deliveryEffectiveDays(quote) {
        const o = deliveryOverrideDays(quote);
        return o === null ? deliveryAutoDays(quote) : o;
      }

      // ถ้อยคำเดียวกับที่พิมพ์ลง PDF (deliveryTimeText ใน pdfGenerator.ts)
      // เซลล์จะได้เห็นคำเดียวกับที่ลูกค้าเห็นในเอกสาร ไม่ต้องแปลในหัว
      function deliveryModeText(quote) {
        return quote.delivery_all_in_stock === false
          ? "Make to order."
          : "In_stock.";
      }

      // ปุ่มรีเซ็ต + ข้อความ "แก้เอง" โผล่เฉพาะตอนมีค่าที่แก้เองค้างอยู่
      function updateDeliveryUI(qIdx) {
        const quote = quotesData[qIdx];
        const box = document.getElementById(`delivery-box-${qIdx}`);
        if (!quote || !box) return;
        const on = hasDeliveryOverride(quote);
        const btn = box.querySelector(".btn-delivery-reset");
        const note = box.querySelector(".delivery-note");
        if (btn) btn.hidden = !on;
        if (note) note.hidden = !on;
      }

      // ── คำนวณวันจัดส่งใหม่ระหว่างแก้ (ยังไม่กดบันทึก) ──
      // กฎ tier ตามจำนวน (เช่น สั่ง ≥10 ชิ้นแล้วสต๊อกไม่พอ → 20 วัน) อยู่ใน quotation_rules
      // ฝั่ง server หน้านี้คำนวณเองไม่ได้ จึงถาม /api/quotations/delivery-preview ซึ่งใช้
      // buildItemSnapshots ชุดเดียวกับตอนบันทึก → เลขที่เห็นตรงกับ Flex สรุปและ PDF เสมอ
      const deliverySigByQuote = {};
      let deliveryRefreshTimer = null;

      // มีผลกับวันจัดส่งแค่ รุ่น · จำนวน · สต๊อก (แก้ราคา/ส่วนลด/หมายเหตุ ไม่ต้องยิง)
      function deliverySignature(quote) {
        return (quote.items || [])
          .map((i) => `${i.model || i.product_code}|${i.quantity}|${i.stock}`)
          .join(";");
      }

      function seedDeliverySignatures() {
        quotesData.forEach((q) => {
          deliverySigByQuote[q.id] = deliverySignature(q);
        });
      }

      function scheduleDeliveryRefresh() {
        if (deliveryRefreshTimer) clearTimeout(deliveryRefreshTimer);
        deliveryRefreshTimer = setTimeout(refreshDeliveryAuto, 450);
      }

      // แถวสถานะใต้ช่องวันจัดส่ง (กำลังคำนวณ / คำนวณไม่สำเร็จ) — ว่าง = ซ่อน
      function setDeliveryStatus(qIdx, text) {
        const box = document.getElementById(`delivery-box-${qIdx}`);
        if (!box) return;
        const el = box.querySelector(".delivery-stale");
        if (!el) return;
        el.textContent = text;
        el.hidden = !text;
      }

      async function refreshDeliveryAuto() {
        const targets = quotesData
          .map((quote, qIdx) => ({ quote, qIdx, sig: deliverySignature(quote) }))
          .filter(({ quote, sig }) => deliverySigByQuote[quote.id] !== sig);
        if (targets.length === 0) return;

        targets.forEach(({ qIdx }) =>
          setDeliveryStatus(qIdx, "⏳ กำลังคำนวณวันจัดส่งใหม่..."),
        );

        await Promise.all(
          targets.map(async ({ quote, qIdx, sig }) => {
            try {
              const resp = await fetchWithTimeout(
                "/api/quotations/delivery-preview",
                {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ items: quote.items }),
                },
                12000,
              );
              if (!resp.ok) throw new Error(`สถานะ ${resp.status}`);
              const data = await resp.json();
              // ระหว่างรอ ผู้ใช้อาจแก้ต่อจนรายการเปลี่ยนไปอีก — ผลลัพธ์ของรอบเก่าใช้ไม่ได้แล้ว
              // ไม่จำ signature ไว้ด้วย เพื่อให้รอบถัดไปยิงซ้ำจนกว่าจะได้ค่าที่ตรงกับของจริง
              if (deliverySignature(quote) !== sig) return;
              deliverySigByQuote[quote.id] = sig;
              quote.delivery_days_auto = data.days;
              quote.delivery_all_in_stock = data.all_in_stock;
              applyDeliveryAuto(qIdx);
              setDeliveryStatus(qIdx, "");
            } catch (err) {
              console.error("Delivery preview error:", err);
              setDeliveryStatus(
                qIdx,
                "⚠️ คำนวณวันจัดส่งใหม่ไม่สำเร็จ — ตัวเลขจะอัปเดตหลังกดบันทึก",
              );
            }
          }),
        );
      }

      // เขียนค่าอัตโนมัติล่าสุดลงหน้าจอโดยไม่ re-render (กัน focus หลุดตอนกำลังพิมพ์จำนวน)
      function applyDeliveryAuto(qIdx) {
        const quote = quotesData[qIdx];
        const box = document.getElementById(`delivery-box-${qIdx}`);
        if (!quote || !box) return;

        const badge = box.querySelector(".delivery-mode-badge");
        if (badge) {
          badge.textContent = deliveryModeText(quote);
          badge.className = `delivery-mode-badge ${
            quote.delivery_all_in_stock === false ? "make-order" : "in-stock"
          }`;
        }
        const note = box.querySelector(".delivery-note");
        if (note)
          note.textContent = `✏️ แก้เอง — ค่าอัตโนมัติ ${deliveryAutoDays(quote)} วัน (จะไม่เปลี่ยนตามสินค้าที่แก้ทีหลัง)`;

        // ช่องที่เซลล์ตั้งค่าเอง หรือกำลังพิมพ์อยู่ ห้ามเขียนทับ
        const input = box.querySelector(".delivery-input");
        if (input && !hasDeliveryOverride(quote) && document.activeElement !== input)
          input.value = deliveryAutoDays(quote);
      }

      function onDeliveryDaysInput(e) {
        const qIdx = parseInt(e.target.dataset.q);
        const quote = quotesData[qIdx];
        if (!quote) return;
        const raw = String(e.target.value).trim();
        if (raw === "") {
          // ลบจนว่าง = กลับไปใช้ค่าอัตโนมัติ (เติมตัวเลขคืนให้ตอน blur)
          quote.delivery_days_override = null;
        } else {
          let n = Math.round(Number(raw));
          if (!Number.isFinite(n)) n = deliveryAutoDays(quote);
          n = Math.max(0, Math.min(3650, n));
          quote.delivery_days_override = n;
          // ให้เห็นทันทีเมื่อพิมพ์เกินช่วงที่ backend รับ (0–3650) แทนโดนปฏิเสธตอนบันทึก
          if (String(n) !== raw) e.target.value = n;
        }
        updateDeliveryUI(qIdx);
        checkDirty();
      }

      function onDeliveryDaysBlur(e) {
        const qIdx = parseInt(e.target.dataset.q);
        const quote = quotesData[qIdx];
        if (!quote) return;
        if (String(e.target.value).trim() === "")
          e.target.value = deliveryAutoDays(quote);
      }

      function onDeliveryReset(e) {
        const qIdx = parseInt(e.currentTarget.dataset.q);
        const quote = quotesData[qIdx];
        if (!quote) return;
        quote.delivery_days_override = null;
        const box = document.getElementById(`delivery-box-${qIdx}`);
        const input = box ? box.querySelector(".delivery-input") : null;
        if (input) input.value = deliveryAutoDays(quote);
        updateDeliveryUI(qIdx);
        checkDirty();
        showToast(`↺ ใช้ค่าอัตโนมัติ ${deliveryAutoDays(quote)} วันแล้ว`);
      }

      // เทียบ state ปัจจุบันกับข้อมูลที่บันทึกล่าสุด → อัปเดตธง hasChanges + ป้ายสถานะบนหัวการ์ด
      // (หน้านี้ไม่บันทึกอัตโนมัติแล้ว ผู้ใช้ต้องกด "บันทึก" เอง จึงต้องเห็นชัดว่ายังมีของค้างไม่ได้บันทึก)
      function checkDirty() {
        hasChanges =
          JSON.stringify(quotesData.map((q) => q.items)) !==
            JSON.stringify(originalData.map((q) => q.items)) ||
          JSON.stringify(quotesData.map((q) => q.customer_name)) !==
            JSON.stringify(originalData.map((q) => q.customer_name)) ||
          JSON.stringify(quotesData.map(deliveryOverrideDays)) !==
            JSON.stringify(originalData.map(deliveryOverrideDays));
        updateAllSaveStatus(
          hasChanges ? "⚠️ ยังไม่ได้บันทึก" : "",
          hasChanges ? "dirty" : "",
        );
        quotesData.forEach((_, i) => updateDeliveryUI(i));
        // ถูกเรียกหลังการแก้ไขทุกชนิด — refreshDeliveryAuto() กรองเองด้วย signature
        // ให้ยิง server เฉพาะตอนที่รุ่น/จำนวน/สต๊อกเปลี่ยนจริง
        scheduleDeliveryRefresh();
      }

      // ── Render ──
      function render() {
        quotesContainer.innerHTML = "";
        if (quotesData.length === 0) {
          quotesContainer.innerHTML = `<div class="empty-state"><div class="icon">📭</div><div class="msg">ไม่พบข้อมูลใบเสนอราคา</div></div>`;
          return;
        }

        const firstQuote = quotesData[0];
        const meta = parseCustomerMeta(firstQuote);
        const isRevision = !!meta.revise_from;

        let revisionIndicatorHtml = "";
        if (isRevision) {
          revisionIndicatorHtml = `
          <div class="revision-banner">
            🔄 แก้ไขใบเสนอราคาเลขที่: <b>${meta.revise_from}</b>
          </div>`;
        }

        const custCard = document.createElement("div");
        custCard.className = "quote-card";
        custCard.innerHTML = `
        <div class="card-header customer-hdr">
          <span>🏢 ข้อมูลลูกค้า / Customer Info</span>
        </div>
        <div class="card-body">
          ${revisionIndicatorHtml}
          <div class="customer-selection-box">
            <div class="section-title" style="font-size:13px; margin-bottom:8px;">🏢 ค้นหาและเลือกลูกค้า</div>
            <div class="search-wrapper" style="margin-bottom:10px;">
              <input type="text" class="edit-input company-search-input" id="company-search-global"
                placeholder="🔍 พิมพ์ชื่อบริษัทเพื่อค้นหา..."
                style="max-width:none; width:100%; font-size:13px; padding-right:34px;"
                value="${meta.company || ""}"
                ${isRevision ? 'disabled style="opacity:0.6;cursor:not-allowed;pointer-events:none;background:var(--green-pale);"' : ""}>
              <button class="search-clear" id="clear-company-global" style="${isRevision ? "display:none !important;" : ""}">✕</button>
              <div class="search-results-dropdown company-search-dropdown" id="company-results-global"></div>
            </div>
            <div class="contact-selection-wrapper">
              <div class="section-title" style="font-size:12px; margin-bottom:4px;">👤 เลือกผู้ติดต่อ</div>
              <select class="edit-input contact-select" id="contact-select-global"
                style="max-width:none; width:100%; font-size:13px;"
                ${isRevision ? 'disabled style="opacity:0.6;cursor:not-allowed;pointer-events:none;background:var(--green-pale);"' : ""}>
                <option value="">-- กำลังโหลดผู้ติดต่อ... --</option>
              </select>
              <div id="contact-warning-global" style="display:none; color:var(--danger); font-size:11px; font-weight:700; margin-top:4px;"></div>
            </div>
          </div>
          <div class="info-grid" id="customer-details-global"></div>
          <div class="info-note" style="margin-top:10px;">⚠️ หากพบข้อมูลผิดพลาด กรุณาติดต่อแอดมิน</div>
        </div>
      `;
        quotesContainer.appendChild(custCard);

        quotesData.forEach((quote, qIdx) => {
          const isTht = quote.quote_company === "THT";
          const label = isTht ? "Themtech (THT)" : "Primus (PM)";
          const headerClass = isTht ? "tht" : "pm";
          const total = calcQuoteTotal(quote);

          const card = document.createElement("div");
          card.className = "quote-card";
          card.innerHTML = `
          <div class="card-header ${headerClass}">
            <span>เสนอราคา - ${label}</span>
            <span class="save-status" id="save-status-${qIdx}"></span>
          </div>
          <div class="card-body" style="padding-top:14px;">
            <div class="section-title">🛒 รายการสินค้า (${quote.items.length} รายการ)</div>
            <div id="items-${qIdx}"></div>
          </div>
          <div class="delivery-strip" id="delivery-box-${qIdx}">
            <span class="delivery-mode-badge ${quote.delivery_all_in_stock === false ? "make-order" : "in-stock"}">${deliveryModeText(quote)}</span>
            <span class="item-field-label">ภายใน</span>
            <input type="number" class="edit-input inp-delivery delivery-input"
              min="0" max="3650" step="1" inputmode="numeric"
              value="${deliveryEffectiveDays(quote)}" data-q="${qIdx}">
            <span class="item-field-label">วัน</span>
            <button type="button" class="btn-delivery-reset" data-q="${qIdx}"
              title="ใช้ค่าอัตโนมัติ" aria-label="ใช้ค่าอัตโนมัติ"
              ${hasDeliveryOverride(quote) ? "" : "hidden"}>↺</button>
            <div class="delivery-note" ${hasDeliveryOverride(quote) ? "" : "hidden"}>
              ✏️ แก้เอง — ค่าอัตโนมัติ ${deliveryAutoDays(quote)} วัน (จะไม่เปลี่ยนตามสินค้าที่แก้ทีหลัง)
            </div>
            <!-- แถวสถานะ: setDeliveryStatus() เติมข้อความตอนกำลังคำนวณ/คำนวณไม่สำเร็จ -->
            <div class="delivery-stale" hidden></div>
          </div>
          <div class="total-bar">
            <span class="total-label">💰 ยอดรวม</span>
            <span class="total-value" id="total-${qIdx}">฿${formatNumber(total, 2)}</span>
          </div>
        `;
          quotesContainer.appendChild(card);

          const deliveryInput = card.querySelector(".delivery-input");
          if (deliveryInput) {
            deliveryInput.addEventListener("input", onDeliveryDaysInput);
            deliveryInput.addEventListener("blur", onDeliveryDaysBlur);
          }
          const deliveryReset = card.querySelector(".btn-delivery-reset");
          if (deliveryReset)
            deliveryReset.addEventListener("click", onDeliveryReset);

          // ปุ่ม "ใช้กับทุกรายการ" โผล่เฉพาะตอนแตะช่องส่วนลดของรายการนั้น
          // ใช้ event delegation ตัวเดียว + toggle class (ห้าม re-render ไม่งั้น focus หลุดกลางคัน)
          // ปุ่มไม่ใช่ .edit-input จึงไม่เข้าเงื่อนไขไหนเลย → กดปุ่มแล้วปุ่มไม่หายไปก่อน click
          // ⚠️ ผูกที่นี่ไม่ใช่ใน renderItems() เพราะ onApplyDiscountToAll เรียก renderItems()
          // ซ้ำบน container ตัวเดิม — ถ้าผูกในนั้นจะได้ listener ซ้อนเพิ่มทุกครั้งที่กด
          const itemsContainer = card.querySelector(`#items-${qIdx}`);
          if (itemsContainer) {
            itemsContainer.addEventListener("focusin", (e) => {
              const t = e.target;
              if (t.classList.contains("item-discount-input"))
                revealApplyButton(qIdx, parseInt(t.dataset.i));
              else if (t.classList.contains("edit-input"))
                revealApplyButton(qIdx, -1);
            });
          }

          renderItems(qIdx);
        });

        const companySearchInput = custCard.querySelector(
          ".company-search-input",
        );
        if (companySearchInput) {
          companySearchInput.addEventListener("input", onCompanySearchInput);
          companySearchInput.addEventListener("focus", onCompanySearchInput);
        }
        const contactSelect = custCard.querySelector(".contact-select");
        if (contactSelect)
          contactSelect.addEventListener("change", onContactSelectChange);

        updateCustomerDetailsUI();
        fetchAndRenderContacts(firstQuote.customer_id, meta.contact);
        // อัปเดตสถานะปุ่มบันทึกทันที (โดยเฉพาะกรณีจำนวนสินค้าเปลี่ยน) ก่อน fetch contacts เสร็จ
        validateContactsAndEnableSave();
        checkDirty();
      }

      function renderItems(qIdx) {
        const container = document.getElementById(`items-${qIdx}`);
        const quote = quotesData[qIdx];
        container.innerHTML = "";

        if (quote.items.length === 0) {
          container.innerHTML = `
          <div class="empty-state" style="padding:20px 16px;">
            <div class="icon">🛒</div>
            <div class="msg">ยังไม่มีสินค้าในใบนี้</div>
            <button type="button" class="btn btn-add btn-inline">+ เพิ่มสินค้า</button>
          </div>`;
          const emptyAddBtn = container.querySelector(".btn-add");
          if (emptyAddBtn)
            emptyAddBtn.addEventListener("click", openProductSheet);
          return;
        }

        quote.items.forEach((item, idx) => {
          const itemTotal = calcItemTotal(item);
          const originalTotal = item.price * item.quantity;
          const discountText = formatNumber(originalTotal - itemTotal, 2);
          const stock = Number(item.stock) || 0;
          const remaining = stock - item.quantity;
          const stockClass = remaining < 0 ? "out-of-stock" : "in-stock";
          const stockText =
            remaining < 0
              ? `ไม่พอคงเหลือ ${stock} ชิ้น`
              : `พร้อมส่ง ${stock}`;

          const hasDiscount = (item.discount_1 || 0) + (item.discount_2 || 0) > 0;
          const hasRemark = !!(item.remark || "").trim();

          const itemEl = document.createElement("div");
          itemEl.className = "item-card";
          itemEl.innerHTML = `
          <!-- TOP BAR: index · code · stock badge · delete -->
          <div class="item-top-bar">
            <span class="item-index">${idx + 1}</span>
            <span class="item-code">${item.model || item.product_code}</span>
            <span class="item-stock-badge ${stockClass}">${stockText}</span>
            <button type="button" class="btn-delete-item" data-q="${qIdx}" data-i="${idx}" title="ลบรายการ">🗑️</button>
          </div>

          <!-- BODY -->
          <div class="item-body">

            <!-- ROW 1: ฿ราคา × จำนวน = ยอดรวม -->
            <div class="item-pq-row">
              <div class="item-pq-col price-col">
                <span class="item-pq-sign">฿</span>
                <input type="number" class="edit-input inp-price item-price-input"
                  min="0" step="any"
                  value="${item.price}"
                  data-q="${qIdx}" data-i="${idx}" data-field="price">
              </div>
              <span class="item-pq-sign">×</span>
              <div class="item-pq-col qty-col">
                <div class="qty-control compact">
                  <button type="button" class="qty-btn btn-minus" data-q="${qIdx}" data-i="${idx}">−</button>
                  <input type="number" class="edit-input qty-input" min="1"
                    value="${item.quantity}" data-q="${qIdx}" data-i="${idx}" data-field="quantity">
                  <button type="button" class="qty-btn btn-plus" data-q="${qIdx}" data-i="${idx}">+</button>
                </div>
              </div>
              <span class="item-total item-total-chip">฿${formatNumber(itemTotal, 2)}</span>
            </div>

            <!-- ROW 2: ส่วนลด (แก้ได้เสมอ — ไม่มีโหมดล็อกอีกแล้ว) -->
            <div class="item-disc-block">
              <div class="item-disc-row">
                <span class="item-field-label" style="flex-shrink:0;">ลด</span>
                <div class="disc-inputs-group">
                  <input type="number" class="edit-input inp-disc item-discount-input"
                    min="0" max="100" step="0.1"
                    value="${item.discount_1 || 0}"
                    data-q="${qIdx}" data-i="${idx}" data-field="discount_1" placeholder="0">
                  <span class="disc-separator">+</span>
                  <input type="number" class="edit-input inp-disc item-discount-input"
                    min="0" max="100" step="0.1"
                    value="${item.discount_2 || 0}"
                    data-q="${qIdx}" data-i="${idx}" data-field="discount_2" placeholder="0">
                  <span class="disc-unit">%</span>
                </div>
                <span class="item-discount-baht item-discount-baht-chip${hasDiscount ? "" : " is-hidden"}">-฿${discountText}</span>
              </div>
              ${
                quote.items.length > 1
                  ? `<button type="button" class="btn-apply-disc-all" data-q="${qIdx}" data-i="${idx}">${applyBtnLabel(quote, item)}</button>`
                  : ""
              }
            </div>

            <!-- ROW 3: หมายเหตุ — ยุบเป็นปุ่มจนกว่าจะแตะ (หรือมีข้อความอยู่แล้ว) -->
            <button type="button" class="item-remark-toggle" data-i="${idx}" ${hasRemark ? "hidden" : ""}>📝 เพิ่มหมายเหตุ</button>
            <input type="text" class="edit-input inp-remark"
              placeholder="📝 หมายเหตุ / รายละเอียดเพิ่มเติม..."
              value="${item.remark || ""}"
              data-q="${qIdx}" data-i="${idx}" data-field="remark" ${hasRemark ? "" : "hidden"}>

          </div>
        `;
          container.appendChild(itemEl);
        });

        container
          .querySelectorAll(".edit-input")
          .forEach((input) => input.addEventListener("input", onFieldChange));
        container
          .querySelectorAll(".btn-delete-item")
          .forEach((btn) => btn.addEventListener("click", onDeleteItem));
        container
          .querySelectorAll(".btn-minus")
          .forEach((btn) => btn.addEventListener("click", onQtyMinus));
        container
          .querySelectorAll(".btn-plus")
          .forEach((btn) => btn.addEventListener("click", onQtyPlus));
        container
          .querySelectorAll(".btn-apply-disc-all")
          .forEach((btn) =>
            btn.addEventListener("click", onApplyDiscountToAll),
          );
        container
          .querySelectorAll(".item-remark-toggle")
          .forEach((btn) => btn.addEventListener("click", onRemarkToggle));
      }

      // กางช่องหมายเหตุ — ใช้ hidden attribute + focus() ห้าม re-render
      // (re-render จะทำลาย input ที่เพิ่งสั่ง focus ไป → คีย์บอร์ดเด้งแล้วหุบทันที)
      function onRemarkToggle(e) {
        const btn = e.currentTarget;
        const input = btn.parentNode.querySelector(".inp-remark");
        if (!input) return;
        btn.hidden = true;
        input.hidden = false;
        input.focus();
      }

      /** ข้อความบนปุ่ม — บอกชัดว่ากดแล้วจะใช้ส่วนลดเท่าไหร่ */
      function applyBtnLabel(quote, item) {
        const d1 = item.discount_1 || 0;
        const d2 = item.discount_2 || 0;
        const pct = d2 > 0 ? `${d1}+${d2}%` : `${d1}%`;
        return `⇩ ใช้ ${pct} กับทุกรายการ (${quote.items.length} รายการ)`;
      }

      /** โชว์ปุ่มของรายการ activeIdx และซ่อนของรายการอื่น (activeIdx = -1 คือซ่อนหมด) */
      function revealApplyButton(qIdx, activeIdx) {
        const container = document.getElementById(`items-${qIdx}`);
        const quote = quotesData[qIdx];
        if (!container || !quote) return;
        container.querySelectorAll(".btn-apply-disc-all").forEach((btn) => {
          const i = parseInt(btn.dataset.i);
          const on = i === activeIdx;
          if (on) btn.textContent = applyBtnLabel(quote, quote.items[i]);
          btn.classList.toggle("is-visible", on);
        });
      }

      function onQtyMinus(e) {
        const input = e.currentTarget.parentNode.querySelector(".qty-input");
        let v = parseInt(input.value) || 1;
        if (v > 1) {
          input.value = v - 1;
          input.dispatchEvent(new Event("input", { bubbles: true }));
        }
      }
      function onQtyPlus(e) {
        const input = e.currentTarget.parentNode.querySelector(".qty-input");
        let v = parseInt(input.value) || 1;
        input.value = v + 1;
        input.dispatchEvent(new Event("input", { bubbles: true }));
      }

      // คัดลอกส่วนลดของรายการที่กดไปให้ทุกรายการในใบเดียวกัน
      // เดิมเป็น "โหมดส่วนลดรวม" (เช็คบ็อกซ์ + input ชุดที่สอง) ซึ่งทำให้มีที่กรอกส่วนลด 2 จุด
      // ตอนนี้เหลือที่กรอกจุดเดียวคือในรายการสินค้า ปุ่มนี้เป็นแค่ action ครั้งเดียว ไม่ล็อกสถานะ
      async function onApplyDiscountToAll(e) {
        // ต้องอ่าน dataset ให้ครบก่อน renderItems() เพราะปุ่มที่เพิ่งกดจะถูกทำลายตอน re-render
        const qIdx = parseInt(e.currentTarget.dataset.q);
        const iIdx = parseInt(e.currentTarget.dataset.i);
        const quote = quotesData[qIdx];
        const src = quote.items[iIdx];
        if (!src) return;
        const d1 = src.discount_1 || 0;
        const d2 = src.discount_2 || 0;

        // ถามก่อนเฉพาะเมื่อมีชิ้นอื่นที่ส่วนลดไม่ตรง — กันเผลอทับค่าที่ตั้งแยกไว้
        const willOverwrite = quote.items.some(
          (it, i) =>
            i !== iIdx &&
            ((it.discount_1 || 0) !== d1 || (it.discount_2 || 0) !== d2),
        );
        if (willOverwrite) {
          const ok = await showCustomConfirm(
            "ใช้ส่วนลดกับทุกรายการ",
            `ตั้งส่วนลด ${d1}+${d2}% ให้ครบทั้ง ${quote.items.length} รายการในใบนี้? ส่วนลดที่ตั้งไว้แยกรายชิ้นจะถูกเขียนทับ`,
            { okText: "ใช้กับทุกรายการ", icon: "🏷️" },
          );
          if (!ok) return;
        }

        quote.items.forEach((it) => {
          it.discount_1 = d1;
          it.discount_2 = d2;
        });

        renderItems(qIdx);
        const totalEl = document.getElementById(`total-${qIdx}`);
        if (totalEl)
          totalEl.textContent = `฿${formatNumber(calcQuoteTotal(quote), 2)}`;
        checkDirty();
        showToast(
          `🏷️ ใช้ส่วนลด ${d1}+${d2}% กับ ${quote.items.length} รายการแล้ว`,
          "success",
        );
      }

      function onFieldChange(e) {
        const qIdx = parseInt(e.target.dataset.q);
        const iIdx = parseInt(e.target.dataset.i);
        const field = e.target.dataset.field;
        if (field === "remark") {
          quotesData[qIdx].items[iIdx].remark = e.target.value;
          checkDirty();
          return;
        }
        let val = parseFloat(e.target.value) || 0;
        if (field === "quantity") {
          val = Math.max(1, Math.round(val));
          const item = quotesData[qIdx].items[iIdx];
          if (
            item.quantity <= (Number(item.stock) || 0) &&
            val > (Number(item.stock) || 0)
          ) {
            showCustomAlert(
              `สินค้าไม่เพียงพอ (พร้อมส่ง ${item.stock} ชิ้น)`,
            );
          }
          item.quantity = val;
        } else if (field === "price") {
          val = Math.max(0, val);
          quotesData[qIdx].items[iIdx].price = val;
        } else if (field === "discount_1") {
          val = Math.max(0, Math.min(100, val));
          quotesData[qIdx].items[iIdx].discount_1 = val;
        } else if (field === "discount_2") {
          val = Math.max(0, Math.min(100, val));
          quotesData[qIdx].items[iIdx].discount_2 = val;
        }

        const totalEl = document.getElementById(`total-${qIdx}`);
        if (totalEl)
          totalEl.textContent = `฿${formatNumber(calcQuoteTotal(quotesData[qIdx]), 2)}`;

        const itemTotal = calcItemTotal(quotesData[qIdx].items[iIdx]);
        const itemCard = e.target.closest(".item-card");
        if (itemCard) {
          const el = itemCard.querySelector(".item-total");
          if (el) el.textContent = `฿${formatNumber(itemTotal, 2)}`;
          const item = quotesData[qIdx].items[iIdx];
          const discEl = itemCard.querySelector(".item-discount-baht");
          if (discEl) {
            discEl.textContent = `-฿${formatNumber(item.price * item.quantity - itemTotal, 2)}`;
            // ป้ายนี้อยู่ใน DOM เสมอ แต่ซ่อนตอนไม่มีส่วนลด — ต้องสลับตามที่พิมพ์สด ๆ
            discEl.classList.toggle(
              "is-hidden",
              (item.discount_1 || 0) + (item.discount_2 || 0) <= 0,
            );
          }
          const stock = Number(item.stock) || 0;
          const stockEl = itemCard.querySelector(".item-stock-badge");
          if (stockEl) {
            const rem = stock - item.quantity;
            stockEl.className = `item-stock-badge ${rem < 0 ? "out-of-stock" : "in-stock"}`;
            stockEl.textContent =
              rem < 0 ? `ไม่พอคงเหลือ ${stock} ชิ้น` : `พร้อมส่ง ${stock}`;
          }
          // ปุ่มบอกตัวเลขที่จะถูกใช้ ต้องขยับตามที่พิมพ์สด ๆ
          if (field === "discount_1" || field === "discount_2") {
            const applyBtn = itemCard.querySelector(".btn-apply-disc-all");
            if (applyBtn)
              applyBtn.textContent = applyBtnLabel(quotesData[qIdx], item);
          }

        checkDirty();
      }

      // fetch ที่มี timeout กันหน้าค้างไม่รู้จบเมื่อ backend ช้า/ตัน (default 20 วิ)
      async function fetchWithTimeout(url, options = {}, ms = 20000) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), ms);
        try {
          return await fetch(url, { ...options, signal: controller.signal });
        } finally {
          clearTimeout(timer);
        }
      }
